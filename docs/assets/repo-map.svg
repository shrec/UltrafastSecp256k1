<text x="742" y="294" font-size="13" font-weight="400" fill="#334155">CUDA, OpenCL, and Metal acceleration for</text>
<text x="742" y="311" font-size="13" font-weight="400" fill="#334155">public-data workloads.</text>
<text x="742" y="362" font-size="12" font-weight="700" fill="#475569">Primary paths</text>
<text x="754" y="384" font-size="12" fill="#0f172a">- cuda/</text>
<text x="754" y="400" font-size="12" fill="#0f172a">- opencl/</text>
<text x="754" y="416" font-size="12" fill="#0f172a">- metal/</text>
