<text class="dim" x="340" y="196" text-anchor="middle" dominant-baseline="central" fill="#BA7517">CUDA 21,222 · OpenCL 5,340 · Metal 1,774</text>
<line x1="260" y1="212" x2="420" y2="212" stroke="#EF9F27" stroke-width="0.5" stroke-dasharray="3 2"/>
<text class="sub" x="340" y="232" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Batch verify · ZK proofs</text>
<text class="sub" x="340" y="252" text-anchor="middle" dominant-baseline="central" fill="#854F0B">BIP-324 · BIP-32 scans</text>
<text class="sub" x="340" y="272" text-anchor="middle" dominant-baseline="central" fill="#854F0B">RTX · AMD · Apple GPU</text>
<text class="sub" x="340" y="292" text-anchor="middle" dominant-baseline="central" fill="#854F0B">No secrets — public data only</text>

<!-- ═══════════════════════════════════════════════
     EMBEDDED / SBC
═══════════════════════════════════════════════ -->
<rect x="450" y="100" width="190" height="218" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="h1" x="545" y="122" text-anchor="middle" dominant-baseline="central" fill="#27500A">Embedded / SBC</text>
<line x1="465" y1="138" x2="625" y2="138" stroke="#97C459" stroke-width="0.5"/>
<text class="sub" x="545" y="158" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">ESP32-S3 · C6 · P4</text>
<text class="sub" x="545" y="178" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">STM32 · Raspberry Pi</text>
<text class="sub" x="545" y="198" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">WASM · Browser · Node.js</text>
<line x1="465" y1="214" x2="625" y2="214" stroke="#97C459" stroke-width="0.5" stroke-dasharray="3 2"/>
<text class="sub" x="545" y="234" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">bare-metal · no OS</text>
<text class="sub" x="545" y="254" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">5,494 lines examples</text>
<text class="sub" x="545" y="274" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">Selftest() mandatory</text>
<text class="sub" x="545" y="294" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">esp_timer · JTAG · UART</text>

<!-- arrow: engines → API -->
<line x1="340" y1="319" x2="340" y2="335" class="ln" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════════════
     API SURFACE
═══════════════════════════════════════════════ -->
<rect x="40" y="337" width="290" height="84" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="h1" x="185" y="361" text-anchor="middle" dominant-baseline="central" fill="#085041">libsecp256k1 shim</text>
<text class="sub" x="185" y="385" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">3,571 lines · drop-in replacement</text>
<text class="dim" x="185" y="405" text-anchor="middle" dominant-baseline="central" fill="#1D9E75">Bitcoin Core · Dash · Litecoin · BCH · Doge</text>

<rect x="350" y="337" width="290" height="84" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="h1" x="495" y="361" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Bindings / FFI</text>
<text class="sub" x="495" y="385" text-anchor="middle" dominant-baseline="central" fill="#185FA5">6,096 lines</text>
<text class="dim" x="495" y="405" text-anchor="middle" dominant-baseline="central" fill="#378ADD">C# · Python · Rust · JavaScript</text>

<!-- ═══════════════════════════════════════════════
     SEPARATOR — CAAS IS INDEPENDENT
═══════════════════════════════════════════════ -->
<line x1="40" y1="440" x2="640" y2="440" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="6 3"/>
<rect x="196" y="430" width="288" height="20" rx="4" fill="#F4F3F0"/>
<text class="dim" x="340" y="440" text-anchor="middle" dominant-baseline="central" fill="#888780">CAAS — independent test harness · validates all layers above</text>

<!-- dashed upward arrows: CAAS tests engines -->
<line x1="135" y1="436" x2="135" y2="422" class="ln2" marker-end="url(#arr-up)"/>
<line x1="340" y1="436" x2="340" y2="422" class="ln2" marker-end="url(#arr-up)"/>
<line x1="545" y1="436" x2="545" y2="422" class="ln2" marker-end="url(#arr-up)"/>

<!-- ═══════════════════════════════════════════════
     CAAS CONTAINER
═══════════════════════════════════════════════ -->
<rect x="40" y="452" width="600" height="322" rx="12" fill="#FFF8F5" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="5 3"/>
