<svg width="100%" viewBox="0 0 680 800" xmlns="http://www.w3.org/2000/svg" role="img">
<title>UltrafastSecp256k1 architecture</title>
<desc>Complete architecture: shared algorithm core feeds three independent engines (CPU, GPU, Embedded/SBC), exposed via API surface. CAAS is a separate independent test harness that validates all layers.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-up" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .h1  { font-size: 14px; font-weight: 600; }
  .h2  { font-size: 13px; font-weight: 600; }
  .sub { font-size: 12px; font-weight: 400; }
  .dim { font-size: 11px; font-weight: 400; }
  .ln  { stroke: #888780; fill: none; stroke-width: 1.5; }
  .ln2 { stroke: #BA7517; fill: none; stroke-width: 1; stroke-dasharray: 4 3; }
</style>

<!-- ═══════════════════════════════════════════════
     SHARED ALGORITHM CORE
═══════════════════════════════════════════════ -->
<rect x="40" y="20" width="600" height="62" rx="10" fill="#F4F3F0" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="h1" x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Shared algorithm core</text>
<text class="sub" x="340" y="64" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">field.hpp · scalar.hpp · point.hpp · ct/ — compiled per target</text>

<!-- arrows: shared core → 3 engines -->
<line x1="135" y1="83" x2="135" y2="98" class="ln" marker-end="url(#arr)"/>
<line x1="340" y1="83" x2="340" y2="98" class="ln" marker-end="url(#arr)"/>
<line x1="545" y1="83" x2="545" y2="98" class="ln" marker-end="url(#arr)"/>

<!-- ═══════════════════════════════════════════════
     CPU ENGINE
═══════════════════════════════════════════════ -->
<rect x="40" y="100" width="190" height="218" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="h1" x="135" y="122" text-anchor="middle" dominant-baseline="central" fill="#3C3489">CPU engine</text>
<line x1="55" y1="138" x2="215" y2="138" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="sub" x="135" y="158" text-anchor="middle" dominant-baseline="central" fill="#534AB7">53,656 lines</text>
<text class="sub" x="135" y="178" text-anchor="middle" dominant-baseline="central" fill="#534AB7">x86 · ARM64 · RISC-V</text>
<text class="sub" x="135" y="198" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Assembly: 3,971 lines</text>
<line x1="55" y1="214" x2="215" y2="214" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="3 2"/>
<text class="sub" x="135" y="234" text-anchor="middle" dominant-baseline="central" fill="#534AB7">CT signing · ZK proofs</text>
<text class="sub" x="135" y="254" text-anchor="middle" dominant-baseline="central" fill="#534AB7">BIP-352 · MuSig2 · FROST</text>
<text class="sub" x="135" y="274" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Selftest() — native</text>
<text class="sub" x="135" y="294" text-anchor="middle" dominant-baseline="central" fill="#534AB7">ElligatorSwift · BIP-324</text>

<!-- ═══════════════════════════════════════════════
     GPU ENGINE
═══════════════════════════════════════════════ -->
<rect x="245" y="100" width="190" height="218" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="h1" x="340" y="122" text-anchor="middle" dominant-baseline="central" fill="#633806">GPU engine</text>
