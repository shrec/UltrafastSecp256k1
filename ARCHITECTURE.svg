<rect x="190" y="42" width="1220" height="112" rx="24" fill="#E8E6E2" class="box"/><text x="800" y="88" text-anchor="middle" class="title">Shared algorithm core</text><text x="800" y="120" text-anchor="middle" class="subtitle">field.hpp • scalar.hpp • point.hpp • ct/* — compiled per target</text><line x1="390" y1="154" x2="390" y2="190" class="arrow"/><line x1="800" y1="154" x2="800" y2="190" class="arrow"/><line x1="1210" y1="154" x2="1210" y2="190" class="arrow"/><rect x="90" y="190" width="430" height="330" rx="24" fill="#ECEBFF" class="box"/><line x1="124" y1="270" x2="486" y2="270" class="divider"/><rect x="585" y="190" width="430" height="330" rx="24" fill="#FFF0D7" class="box"/><line x1="619" y1="270" x2="981" y2="270" class="divider"/><rect x="1080" y="190" width="430" height="330" rx="24" fill="#EAF3D9" class="box"/><line x1="1114" y1="270" x2="1476" y2="270" class="divider"/><text x="305" y="238" text-anchor="middle" class="title" fill="#3759C7" style="fill:#3759C7">CPU engine</text><text x="305" y="279" text-anchor="middle" class="body" style="fill:#5361CE">53,656 lines</text><text x="305" y="319" text-anchor="middle" class="body2" style="fill:#4F59B9">x86 • ARM64 • RISC-V</text><text x="305" y="353" text-anchor="middle" class="body2" style="fill:#4F59B9">Assembly: 3,971 lines</text><text x="305" y="387" text-anchor="middle" class="body2" style="fill:#4F59B9">CT signing • ZK proofs</text><text x="305" y="421" text-anchor="middle" class="body2" style="fill:#4F59B9">BIP-352 • MuSig2 • FROST</text><text x="305" y="455" text-anchor="middle" class="body2" style="fill:#4F59B9">Selftest() — native</text><text x="305" y="489" text-anchor="middle" class="body2" style="fill:#4F59B9">ElligatorSwift • BIP-324</text><text x="800" y="238" text-anchor="middle" class="title" style="fill:#A56300">GPU engine</text><text x="800" y="277" text-anchor="middle" class="body" style="fill:#B17011">CUDA • OpenCL • Metal</text><text x="800" y="307" text-anchor="middle" class="body2" style="fill:#B17011">28,336 lines total</text><text x="800" y="322" text-anchor="middle" class="small" style="fill:#B77D2F">CUDA 21,222 • OpenCL 5,340</text><text x="800" y="350" text-anchor="middle" class="small" style="fill:#B77D2F">Metal 1,774</text><line x1="630" y1="353" x2="970" y2="353" class="dashed" style="stroke:#D5B487"/><text x="800" y="386" text-anchor="middle" class="body2" style="fill:#9B6611">Batch verify • ZK proofs</text><text x="800" y="422" text-anchor="middle" class="body2" style="fill:#9B6611">BIP-324 • BIP-32 scans</text><text x="800" y="458" text-anchor="middle" class="body2" style="fill:#9B6611">RTX • AMD • Apple GPU</text><text x="800" y="494" text-anchor="middle" class="body2" style="fill:#9B6611">No secrets — public data only</text><text x="1295" y="238" text-anchor="middle" class="title" style="fill:#3D6B1E">Embedded / SBC</text><text x="1295" y="280" text-anchor="middle" class="body2" style="fill:#4E772D">ESP32-S3 • C6 • P4</text><text x="1295" y="314" text-anchor="middle" class="body2" style="fill:#4E772D">STM32 • Raspberry Pi</text><text x="1295" y="348" text-anchor="middle" class="body2" style="fill:#4E772D">WASM • Browser • Node.js</text><text x="1295" y="382" text-anchor="middle" class="body2" style="fill:#4E772D">bare-metal • no OS</text><text x="1295" y="416" text-anchor="middle" class="body2" style="fill:#4E772D">5,494 lines examples</text><text x="1295" y="450" text-anchor="middle" class="body2" style="fill:#4E772D">Selftest() mandatory</text><text x="1295" y="484" text-anchor="middle" class="body2" style="fill:#4E772D">esp_timer • JTAG • UART</text><line x1="305" y1="520" x2="305" y2="562" class="arrow"/><line x1="800" y1="520" x2="800" y2="562" class="arrow"/><line x1="1295" y1="520" x2="1295" y2="562" class="arrow"/><rect x="215" y="566" width="520" height="154" rx="24" fill="#DEF5EF" class="box"/><rect x="865" y="566" width="520" height="154" rx="24" fill="#E3EEF8" class="box"/><text x="475" y="620" text-anchor="middle" class="title" style="fill:#196B58">libsecp256k1 shim</text><text x="475" y="659" text-anchor="middle" class="body" style="fill:#2E8872">3,571 lines • drop-in replacement</text><text x="475" y="694" text-anchor="middle" class="body2" style="fill:#3B957C">Bitcoin Core • Dash • Litecoin • BCH • Doge</text><text x="1125" y="620" text-anchor="middle" class="title" style="fill:#2C5F97">Bindings / FFI</text><text x="1125" y="659" text-anchor="middle" class="body" style="fill:#4D7AAF">6,096 lines</text><text x="1125" y="694" text-anchor="middle" class="body2" style="fill:#5B89BF">C# • Python • Rust • JavaScript</text><line x1="390" y1="720" x2="390" y2="760" class="dashed"/><line x1="800" y1="720" x2="800" y2="760" class="dashed"/><line x1="1210" y1="720" x2="1210" y2="760" class="dashed"/><rect x="512" y="742" width="576" height="38" rx="19" fill="#FFF6DD" stroke="#E7CB8B" stroke-width="1.5"/><text x="800" y="766" text-anchor="middle" class="pilltext">CAAS — independent test harness • validates all layers above</text><rect x="90" y="790" width="1420" height="670" rx="28" fill="#FFF5ED" class="box"/><text x="800" y="846" text-anchor="middle" class="caasTitle">CAAS — Continuous Audit-as-a-Service</text><text x="800" y="868" text-anchor="middle" class="caasSub">114,458 lines • 232 exploit PoC • 80 audit modules • 51 CI workflows</text><text x="800" y="898" text-anchor="middle" class="caasSub">dev tool only — never ships to production</text><rect x="120" y="920" width="400" height="150" rx="22" fill="#E6F7F0" stroke="rgba(31,38,48,0.08)" stroke-width="1.2"/><text x="320.0" y="966" text-anchor="middle" class="sectionTitle" style="fill:#1F7B5D">Formal verification</text><text x="320.0" y="1004" text-anchor="middle" class="sectionBody">Cryptol — 39 properties</text><text x="320.0" y="1033" text-anchor="middle" class="sectionBodySmall">Field • Point • ECDSA • Schnorr</text><rect x="600" y="920" width="400" height="150" rx="22" fill="#FFF0ED" stroke="rgba(31,38,48,0.08)" stroke-width="1.2"/><text x="800.0" y="966" text-anchor="middle" class="sectionTitle" style="fill:#C55340">CT verification</text><text x="800.0" y="1004" text-anchor="middle" class="sectionBody">LLVM ct-verif • Valgrind</text><text x="800.0" y="1033" text-anchor="middle" class="sectionBodySmall">dudect (Welch t-test) • 5 pipelines</text><rect x="1080" y="920" width="400" height="150" rx="22" fill="#EEF5FF" stroke="rgba(31,38,48,0.08)" stroke-width="1.2"/><text x="1280.0" y="966" text-anchor="middle" class="sectionTitle" style="fill:#4B77C8">Static analysis</text><text x="1280.0" y="1004" text-anchor="middle" class="sectionBody">CodeQL • Clang SA</text><text x="1280.0" y="1033" text-anchor="middle" class="sectionBodySmall">Facebook Infer (bi-abduction)</text><rect x="120" y="1105" width="400" height="150" rx="22" fill="#FFF4E8" stroke="rgba(31,38,48,0.08)" stroke-width="1.2"/><text x="320.0" y="1151" text-anchor="middle" class="sectionTitle" style="fill:#C1651B">Adversarial PoC</text><text x="320.0" y="1189" text-anchor="middle" class="sectionBody">232 exploit PoC tests</text><text x="320.0" y="1218" text-anchor="middle" class="sectionBodySmall">CVE classes • Wycheproof • RFC 6979</text><rect x="600" y="1105" width="400" height="150" rx="22" fill="#FFF8E6" stroke="rgba(31,38,48,0.08)" stroke-width="1.2"/><text x="800.0" y="1151" text-anchor="middle" class="sectionTitle" style="fill:#A67A00">Fuzzing</text><text x="800.0" y="1189" text-anchor="middle" class="sectionBody">11 fuzzer harnesses</text><text x="800.0" y="1218" text-anchor="middle" class="sectionBodySmall">libFuzzer • AFL++ • custom seeds</text><rect x="1080" y="1105" width="400" height="150" rx="22" fill="#F4EFFF" stroke="rgba(31,38,48,0.08)" stroke-width="1.2"/><text x="1280.0" y="1151" text-anchor="middle" class="sectionTitle" style="fill:#7258C7">Differential</text><text x="1280.0" y="1189" text-anchor="middle" class="sectionBody">1.3M ops nightly</text><text x="1280.0" y="1218" text-anchor="middle" class="sectionBodySmall">vs libsecp256k1 • random inputs</text><rect x="120" y="1290" width="400" height="150" rx="22" fill="#F8F6F0" stroke="rgba(31,38,48,0.08)" stroke-width="1.2"/><text x="320.0" y="1336" text-anchor="middle" class="sectionTitle" style="fill:#7F6A34">Research monitor</text><text x="320.0" y="1374" text-anchor="middle" class="sectionBody">arXiv • NVD • daily scan</text><text x="320.0" y="1403" text-anchor="middle" class="sectionBodySmall">CVE/ePrint auto-triage → issues</text><rect x="600" y="1290" width="400" height="150" rx="22" fill="#EEF5FF" stroke="rgba(31,38,48,0.08)" stroke-width="1.2"/><text x="800.0" y="1336" text-anchor="middle" class="sectionTitle" style="fill:#3766C3">Audit pipeline</text><text x="800.0" y="1374" text-anchor="middle" class="sectionBody">6 stages • fail-fast</text><text x="800.0" y="1403" text-anchor="middle" class="sectionBodySmall">scanner → traceability → gate → bundle</text><rect x="1080" y="1290" width="400" height="150" rx="22" fill="#F0F8E7" stroke="rgba(31,38,48,0.08)" stroke-width="1.2"/><text x="1280.0" y="1336" text-anchor="middle" class="sectionTitle" style="fill:#5C8A27">Audit bundle</text><text x="1280.0" y="1374" text-anchor="middle" class="sectionBody">export + verify</text><text x="1280.0" y="1403" text-anchor="middle" class="sectionBodySmall">reproducible • pinned • signed</text><text x="800" y="1494" text-anchor="middle" class="small">Runtime engine, compatibility shim, bindings, and CAAS are separate layers with different review scopes.</text></svg>