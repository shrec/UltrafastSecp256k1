name: GCC -fanalyzer

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 5 * * 1'   # Weekly Monday 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: gcc-analyzer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gcc-analyzer:
    name: GCC -fanalyzer (inter-procedural path analysis)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install GCC 14 + ninja
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 ninja-build

      - name: Configure with -fanalyzer
        run: |
          cmake -S . -B build/analyzer \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_FLAGS="-fanalyzer -fanalyzer-verbosity=2" \
            -DCMAKE_CXX_FLAGS="-fanalyzer -fanalyzer-verbosity=2" \
            -DSECP256K1_BUILD_TESTS=OFF \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_USE_ASM=OFF

      - name: Build with GCC -fanalyzer (treat analyzer warnings as errors)
        run: |
          # -Wno-analyzer-* to suppress known false-positive classes:
          #   -Wno-analyzer-use-of-uninitialized-value: triggers on inline asm/SIMD paths
          #     GCC cannot track initialization through __builtin_ calls on all codepaths
          #   -Wno-analyzer-malloc-leak: GCC cannot see RAII destructors across TUs
          cmake --build build/analyzer -j$(nproc) 2>&1 \
            | grep -E "(warning|error|note):.*analyzer" \
            | grep -v "Wno-analyzer" \
            | tee analyzer-warnings.txt
          echo "=== GCC -fanalyzer findings ==="
          wc -l analyzer-warnings.txt
          # Fail if any non-suppressed analyzer findings remain
          if grep -q "warning:.*\[CWE\|warning:.*-Wanalyzer-" analyzer-warnings.txt 2>/dev/null; then
            echo "::error::GCC -fanalyzer found reliability/security issues (see log above)"
            exit 1
          fi
          echo "GCC -fanalyzer: clean"

      - name: Upload analyzer warnings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gcc-analyzer-warnings
          path: analyzer-warnings.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Advisory full analyzer output
        if: always()
        continue-on-error: true
        run: |
          cmake --build build/analyzer --clean-first -j$(nproc) 2>&1 \
            | grep -E "(warning|note):.*-Wanalyzer" \
            | head -100 \
          || true
