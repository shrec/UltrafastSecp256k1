# tsan.yml — Dedicated ThreadSanitizer gate for C7 thread-safety invariant
#
# Proves that the documented contract holds under TSan:
#   "Separate ufsecp_ctx instances are safe to use concurrently across threads."
#
# Runs the multi-threaded stress test (test_c_abi_thread_stress) and the full
# test suite under Clang TSan.  Any data race detected by TSan → hard CI fail.

name: TSan

on:
  push:
    branches: [main, dev]
  workflow_run:
    workflows: ["Pipeline / Phase 1 — Fast Gates"]
    types: [completed]
    branches: [main, dev]

    paths:
      - 'cpu/**'
      - 'gpu/**'
      - 'opencl/**'
      - 'metal/**'
      - 'cuda/**'
      - 'include/**'
      - 'audit/**'
      - 'CMakeLists.txt'
      - '.github/workflows/tsan.yml'
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: tsan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tsan:
    name: ThreadSanitizer (Clang-17)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-17 lld-17 ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-tsan-${{ hashFiles('cpu/src/**', 'cpu/include/**', 'include/**') }}
          restore-keys: |
            ccache-tsan-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=200M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure with TSan
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_BUILD_JAVA=OFF

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: "C7: Thread stress test (separate contexts, TSan)"
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1:history_size=4
        run: |
          echo "## TSan — C7 Thread Safety" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ./build/audit/test_c_abi_thread_stress_standalone 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Full test suite under TSan
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1:history_size=4
        # Exclude: ct_sidechannel (long), py_* (no TSan instrumentation), selftest (redundant)
        run: ctest --test-dir build --output-on-failure -j"$(nproc)" -E "^(ct_sidechannel|selftest|unified_audit|py_)" --timeout 900
