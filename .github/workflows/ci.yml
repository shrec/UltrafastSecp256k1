# =============================================================================
# CI — Release blocking platform chain
#
# Dispatched by ci-orchestrator.yml Phase 2.  All jobs hard-fail on any
# build/audit/correctness failure — no continue-on-error masking.
# Advisory/experimental platforms live in ci-advisory.yml.
# =============================================================================
name: CI

on:
  workflow_dispatch:
    inputs:
      orchestrator_sha:
        required: false
        type: string
      orchestrator_run:
        required: false
        type: string
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'workingdocs/**'
      - 'README*'
      - 'CHANGELOG*'
      - 'LICENSE*'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
      - '.github/copilot-instructions.md'
      - '.github/agents/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # 00 — Discord commit notification
  # ===========================================================================
  discord-commit-notify:
    name: "00 / Discord Commit Notify"
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    if: github.event_name == 'push'
    env:
      WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_COMMITS }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - name: Notify Discord
        if: env.WEBHOOK != ''
        env:
          REPO:    ${{ github.repository }}
          BRANCH:  ${{ github.ref_name }}
          AUTHOR:  ${{ github.event.head_commit.author.name || 'unknown' }}
          MESSAGE: ${{ github.event.head_commit.message || '(no message)' }}
          SHA:     ${{ github.sha }}
        run: |
          SHORT="${SHA:0:7}"
          URL="https://github.com/${REPO}/commit/${SHA}"
          MSG=$(echo "$MESSAGE" | head -1 | cut -c1-200)
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          JSON="{\"embeds\":[{\"title\":\"New commit on ${BRANCH}\",\"url\":\"${URL}\",\"color\":7506394,\"description\":\"[\`${SHORT}\`](${URL}) ${MSG}\",\"fields\":[{\"name\":\"Branch\",\"value\":\"${BRANCH}\",\"inline\":true},{\"name\":\"Author\",\"value\":\"${AUTHOR}\",\"inline\":true}],\"footer\":{\"text\":\"UltrafastSecp256k1\"},\"timestamp\":\"${NOW}\"}]}"
          curl -sS -H "Content-Type: application/json" -d "$JSON" "$WEBHOOK"

  # ===========================================================================
  # 01 — Static Analysis
  # ===========================================================================
  static-analysis:
    name: "Static Analysis"
    needs: [discord-commit-notify]
    if: always() && (needs.discord-commit-notify.result == 'success' || needs.discord-commit-notify.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
      - name: Install audit deps
        run: python3 -m pip install --require-hashes -r .github/requirements/audit-deps.txt
      - name: Repo map check
        run: python3 tools/render_repo_map.py --check
      - name: Exploit wiring parity
        run: python3 ci/check_exploit_wiring.py
      - name: Canonical data + doc sync
        run: |
          python3 ci/build_canonical_data.py --dry-run
          python3 ci/sync_docs_from_canonical.py --dry-run
          python3 ci/sync_module_count.py --dry-run
      - name: Code quality check
        run: |
          python3 ci/audit_test_quality_scanner.py --json -o static_analysis_scanner.json
          python3 ci/run_code_quality.py --fail-on-regression
      - name: Exploit traceability join
        run: python3 ci/exploit_traceability_join.py
      - name: Build project graph (needed for source graph quality)
        run: python3 ci/build_project_graph.py --rebuild
      - name: Source graph quality
        run: python3 ci/check_source_graph_quality.py
      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: static-analysis-${{ github.run_id }}
          path: static_analysis_scanner.json
          retention-days: 30
          if-no-files-found: warn

  # ===========================================================================
  # Linux GCC (gcc-13 and gcc-14, Release and Debug)
  # ===========================================================================
  linux-gcc:
    name: "Linux / ${{ matrix.compiler }} / ${{ matrix.build_type }}"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
            build_type: Release
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
            build_type: Debug
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            build_type: Release
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            build_type: Debug
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.compiler == 'gcc-14' && 'g++-14' || 'g++-13' }} ccache ninja-build
      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('src/cpu/src/**', 'include/**') }}
          restore-keys: ccache-${{ matrix.compiler }}-${{ matrix.build_type }}-
      - name: CMake configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v2 \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=ON \
            -DSECP256K1_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j$(nproc) --timeout 300 -E '^(ct_sidechannel|py_|exploit_gpu_)'

  # ===========================================================================
  # Linux Clang-17
  # ===========================================================================
  linux-clang:
    name: "Linux / clang-17 / ${{ matrix.build_type }}"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 lld-17 ccache ninja-build
      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cache/ccache
          key: ccache-clang-17-${{ matrix.build_type }}-${{ hashFiles('src/cpu/src/**', 'include/**') }}
          restore-keys: ccache-clang-17-${{ matrix.build_type }}-
      - name: CMake configure
        env:
          CC: clang-17
          CXX: clang++-17
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v2 \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=ON \
            -DSECP256K1_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j$(nproc) --timeout 300 -E '^(ct_sidechannel|py_|exploit_gpu_)'

  # ===========================================================================
  # Android NDK (arm64-v8a)
  # ===========================================================================
  android:
    name: "Android / arm64-v8a"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        with:
          ndk-version: r27c
      - name: CMake configure
        run: |
          cmake -S bindings/android -B out/build -G Ninja \
            "-DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Verify artifacts
        run: |
          LIB=$(find out/build -name "libfastsecp256k1.a" | head -1)
          if [ -z "$LIB" ]; then
            echo "::error::libfastsecp256k1.a not found"
            exit 1
          fi
          echo "Library: $LIB  size=$(du -h "$LIB" | cut -f1)"

  # ===========================================================================
  # Coverage (push only)
  # ===========================================================================
  coverage:
    name: "Coverage / clang-17"
    needs: [static-analysis]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 llvm-17 lld-17 ninja-build
      - name: CMake configure
        env:
          CC: clang-17
          CXX: clang++-17
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fprofile-instr-generate -fcoverage-mapping" \
            -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping" \
            -DCMAKE_EXE_LINKER_FLAGS="-fprofile-instr-generate" \
            -DSECP256K1_USE_ASM=OFF \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test (with profiling)
        env:
          LLVM_PROFILE_FILE: "out/build/%p-%m.profraw"
        run: ctest --test-dir out/build --output-on-failure -j$(nproc) --timeout 300 -E '^ct_sidechannel'
      - name: Collect LLVM coverage
        run: |
          find out/build -name '*.profraw' -print0 \
            | xargs -0 llvm-profdata-17 merge -sparse -o coverage.profdata
          OBJECTS=()
          while IFS= read -r bin; do
            if llvm-cov-17 show --instr-profile=coverage.profdata "$bin" >/dev/null 2>&1; then
              OBJECTS+=("-object=$bin")
            fi
          done < <(find out/build -maxdepth 8 -type f -executable 2>/dev/null)
          llvm-cov-17 export --format=lcov \
            --instr-profile=coverage.profdata \
            "${OBJECTS[@]}" \
            --ignore-filename-regex='(tests/|bench/|examples/|audit/|compat/|/usr/)' \
            > coverage.lcov
      - name: Upload to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          files: coverage.lcov
          flags: cpu
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # CI Verdict
  # ===========================================================================
  ci-verdict:
    name: "CI / Final Verdict"
    needs:
      - discord-commit-notify
      - static-analysis
      - linux-gcc
      - linux-clang
      - android
      - coverage
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - name: Evaluate results
        run: |
          FAILED=0
          check() {
            local name="$1" result="$2" required="${3:-1}"
            echo "$name: $result"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              if [ "$required" = "1" ]; then
                echo "::error::$name → $result"
                FAILED=1
              else
                echo "::warning::$name → $result (non-blocking)"
              fi
            fi
          }
          # ALL jobs hard-fail — no advisory masking. Any failure or
          # cancellation in any platform job turns ci-verdict red.
          check "static-analysis"   "${{ needs.static-analysis.result }}"
          check "linux-gcc"         "${{ needs.linux-gcc.result }}"
          check "linux-clang"       "${{ needs.linux-clang.result }}"
          check "android"           "${{ needs.android.result }}"
          check "coverage"          "${{ needs.coverage.result }}"
          [ "$FAILED" -eq 0 ] || { echo "::error::One or more required jobs failed"; exit 1; }
          echo "::notice::All required jobs passed"
        shell: bash
