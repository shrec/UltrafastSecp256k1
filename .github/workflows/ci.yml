# =============================================================================
# CI — Inline v3.68 — no reusable platform-chain.yml
# =============================================================================
name: CI

# push trigger removed — ci-orchestrator.yml handles push ordering.
# ci.yml remains active for: pull_request (fast feedback), workflow_dispatch.
on:
  workflow_dispatch:
    inputs:
      orchestrator_sha:
        required: false
        type: string
      orchestrator_run:
        required: false
        type: string
      phase:
        required: false
        type: string
        default: 'all'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'workingdocs/**'
      - 'README*'
      - 'CHANGELOG*'
      - 'LICENSE*'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
      - '.github/copilot-instructions.md'
      - '.github/agents/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # 00 — Discord commit notification
  # ===========================================================================
  discord-commit-notify:
    name: "00 / Discord Commit Notify"
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    if: github.event_name == 'push'
    env:
      WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_COMMITS }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - name: Notify Discord
        if: env.WEBHOOK != ''
        env:
          REPO:    ${{ github.repository }}
          BRANCH:  ${{ github.ref_name }}
          AUTHOR:  ${{ github.event.head_commit.author.name || 'unknown' }}
          MESSAGE: ${{ github.event.head_commit.message || '(no message)' }}
          SHA:     ${{ github.sha }}
        run: |
          SHORT="${SHA:0:7}"
          URL="https://github.com/${REPO}/commit/${SHA}"
          MSG=$(echo "$MESSAGE" | head -1 | cut -c1-200)
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          JSON="{\"embeds\":[{\"title\":\"New commit on ${BRANCH}\",\"url\":\"${URL}\",\"color\":7506394,\"description\":\"[\`${SHORT}\`](${URL}) ${MSG}\",\"fields\":[{\"name\":\"Branch\",\"value\":\"${BRANCH}\",\"inline\":true},{\"name\":\"Author\",\"value\":\"${AUTHOR}\",\"inline\":true}],\"footer\":{\"text\":\"UltrafastSecp256k1\"},\"timestamp\":\"${NOW}\"}]}"
          curl -sS -H "Content-Type: application/json" -d "$JSON" "$WEBHOOK"

  # ===========================================================================
  # 01 — Static Analysis
  # ===========================================================================
  static-analysis:
    name: "Static Analysis"
    needs: [discord-commit-notify]
    if: always() && (needs.discord-commit-notify.result == 'success' || needs.discord-commit-notify.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
      - name: Install audit deps
        run: python3 -m pip install --require-hashes -r .github/requirements/audit-deps.txt
      - name: Repo map check
        run: python3 tools/render_repo_map.py --check
      - name: Exploit wiring parity
        run: python3 ci/check_exploit_wiring.py
      - name: Canonical data + doc sync
        run: |
          python3 ci/build_canonical_data.py --dry-run
          python3 ci/sync_docs_from_canonical.py --dry-run
          python3 ci/sync_module_count.py --dry-run
      - name: Code quality check
        run: |
          python3 ci/audit_test_quality_scanner.py --json -o static_analysis_scanner.json
          python3 ci/run_code_quality.py --fail-on-regression
      - name: Exploit traceability join
        run: python3 ci/exploit_traceability_join.py
      - name: Build project graph (needed for source graph quality)
        run: python3 ci/build_project_graph.py --rebuild
      - name: Source graph quality
        run: python3 ci/check_source_graph_quality.py
      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: static-analysis-${{ github.run_id }}
          path: static_analysis_scanner.json
          retention-days: 30
          if-no-files-found: warn

  # ===========================================================================
  # Linux GCC (gcc-13 and gcc-14, Release and Debug)
  # ===========================================================================
  linux-gcc:
    name: "Linux / ${{ matrix.compiler }} / ${{ matrix.build_type }}"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
            build_type: Release
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
            build_type: Debug
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            build_type: Release
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            build_type: Debug
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.compiler == 'gcc-14' && 'g++-14' || 'g++-13' }} ccache ninja-build
      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('src/cpu/src/**', 'include/**') }}
          restore-keys: ccache-${{ matrix.compiler }}-${{ matrix.build_type }}-
      - name: CMake configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v2 \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=ON \
            -DSECP256K1_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j$(nproc) --timeout 300 -E '^(ct_sidechannel|py_|exploit_gpu_)'

  # ===========================================================================
  # Linux Clang-17
  # ===========================================================================
  linux-clang:
    name: "Linux / clang-17 / ${{ matrix.build_type }}"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 lld-17 ccache ninja-build
      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cache/ccache
          key: ccache-clang-17-${{ matrix.build_type }}-${{ hashFiles('src/cpu/src/**', 'include/**') }}
          restore-keys: ccache-clang-17-${{ matrix.build_type }}-
      - name: CMake configure
        env:
          CC: clang-17
          CXX: clang++-17
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v2 \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=ON \
            -DSECP256K1_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j$(nproc) --timeout 300 -E '^(ct_sidechannel|py_|exploit_gpu_)'

  # ===========================================================================
  # Linux Sanitizers (ASan/TSan/MSan)
  # ===========================================================================
  linux-sanitizers:
    name: "Linux / ${{ matrix.sanitizer }}"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: asan
            san_flags: "-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
            link_flags: "-fsanitize=address,undefined"
          - sanitizer: tsan
            san_flags: "-fsanitize=thread -fno-omit-frame-pointer"
            link_flags: "-fsanitize=thread"
          - sanitizer: msan
            san_flags: "-fsanitize=memory -fno-omit-frame-pointer -fsanitize-memory-track-origins=2 -stdlib=libc++"
            link_flags: "-fsanitize=memory -stdlib=libc++ -lc++abi"
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 lld-17 libc++-17-dev libc++abi-17-dev ccache ninja-build
      - name: CMake configure
        env:
          CC: clang-17
          CXX: clang++-17
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="${{ matrix.san_flags }}" \
            -DCMAKE_CXX_FLAGS="${{ matrix.san_flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.link_flags }}" \
            -DSECP256K1_USE_ASM=OFF \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j$(nproc) --timeout 900 -E '^(ct_sidechannel|unified_audit|selftest|batch_randomness|py_)'

  # ===========================================================================
  # Linux ARM64 (cross-compile)
  # ===========================================================================
  linux-arm64:
    name: "Linux / arm64 (cross)"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++-13-aarch64-linux-gnu libc6-arm64-cross libc6-dev-arm64-cross \
            qemu-user-static ninja-build ccache
      - name: CMake configure
        env:
          CC: aarch64-linux-gnu-gcc-13
          CXX: aarch64-linux-gnu-g++-13
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DSECP256K1_BUILD_METAL=OFF \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=ON \
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Smoke test (QEMU)
        run: |
          SELFTEST=$(find out/build -name run_selftest -type f | head -1)
          if [ -n "$SELFTEST" ]; then
            timeout 360 qemu-aarch64-static -L /usr/aarch64-linux-gnu "$SELFTEST" smoke
          else
            echo "::warning::run_selftest not found — skipping QEMU smoke test"
          fi

  # ===========================================================================
  # Windows (MSVC)
  # ===========================================================================
  windows:
    name: "Windows / MSVC"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: CMake configure
        run: |
          cmake -S . -B out/build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DSECP256K1_BUILD_TESTS=ON `
            -DSECP256K1_BUILD_BENCH=ON `
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build --config Release -j $env:NUMBER_OF_PROCESSORS
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j $env:NUMBER_OF_PROCESSORS --timeout 300 --build-config Release -E '^ct_sidechannel'

  # ===========================================================================
  # macOS (apple-clang)
  # ===========================================================================
  macos:
    name: "macOS / apple-clang"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: CMake configure
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=ON \
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build -j$(sysctl -n hw.logicalcpu)
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j$(sysctl -n hw.logicalcpu) --timeout 300 -E '^(ct_sidechannel|secp256k1_metal_audit|gpu_ops_equivalence|gpu_ecdsa_snark_witness|gpu_bip352_scan)'

  # ===========================================================================
  # WASM (Emscripten)
  # ===========================================================================
  wasm:
    name: "WASM / Emscripten"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    # Advisory: WASM lacks x86-64 asm so it uses portable arithmetic; recent
    # perf work introduced a 2G/3G KAT mismatch under investigation. Mark
    # advisory so it does not block the rest of the platform matrix.
    continue-on-error: true
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021
        with:
          version: 3.1.51
          actions-cache-folder: emsdk-cache
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
      - name: CMake configure
        run: |
          emcmake cmake -S bindings/wasm -B out/build \
            -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test (KAT equivalence)
        run: |
          if [ -f out/build/kat/wasm_kat_test.js ]; then
            node out/build/kat/wasm_kat_test.js
          else
            echo "::warning::wasm_kat_test.js not found — skipping KAT test"
          fi

  # ===========================================================================
  # Android NDK (arm64-v8a)
  # ===========================================================================
  android:
    name: "Android / arm64-v8a"
    needs: [static-analysis]
    if: always() && needs.static-analysis.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        with:
          ndk-version: r27c
      - name: CMake configure
        run: |
          cmake -S bindings/android -B out/build -G Ninja \
            "-DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Verify artifacts
        run: |
          LIB=$(find out/build -name "libfastsecp256k1.a" | head -1)
          if [ -z "$LIB" ]; then
            echo "::error::libfastsecp256k1.a not found"
            exit 1
          fi
          echo "Library: $LIB  size=$(du -h "$LIB" | cut -f1)"

  # ===========================================================================
  # Coverage (push only)
  # ===========================================================================
  coverage:
    name: "Coverage / clang-17"
    needs: [static-analysis]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 llvm-17 lld-17 ninja-build
      - name: CMake configure
        env:
          CC: clang-17
          CXX: clang++-17
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fprofile-instr-generate -fcoverage-mapping" \
            -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping" \
            -DCMAKE_EXE_LINKER_FLAGS="-fprofile-instr-generate" \
            -DSECP256K1_USE_ASM=OFF \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test (with profiling)
        env:
          LLVM_PROFILE_FILE: "out/build/%p-%m.profraw"
        run: ctest --test-dir out/build --output-on-failure -j$(nproc) --timeout 300 -E '^ct_sidechannel'
      - name: Collect LLVM coverage
        run: |
          find out/build -name '*.profraw' -print0 \
            | xargs -0 llvm-profdata-17 merge -sparse -o coverage.profdata
          OBJECTS=()
          while IFS= read -r bin; do
            if llvm-cov-17 show --instr-profile=coverage.profdata "$bin" >/dev/null 2>&1; then
              OBJECTS+=("-object=$bin")
            fi
          done < <(find out/build -maxdepth 8 -type f -executable 2>/dev/null)
          llvm-cov-17 export --format=lcov \
            --instr-profile=coverage.profdata \
            "${OBJECTS[@]}" \
            --ignore-filename-regex='(tests/|bench/|examples/|audit/|compat/|/usr/)' \
            > coverage.lcov
      - name: Upload to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          files: coverage.lcov
          flags: cpu
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # CI Verdict
  # ===========================================================================
  ci-verdict:
    name: "CI / Final Verdict"
    needs:
      - discord-commit-notify
      - static-analysis
      - linux-gcc
      - linux-clang
      - linux-sanitizers
      - linux-arm64
      - windows
      - macos
      - wasm
      - android
      - coverage
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - name: Evaluate results
        run: |
          FAILED=0
          check() {
            local name="$1" result="$2" required="${3:-1}"
            echo "$name: $result"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              if [ "$required" = "1" ]; then
                echo "::error::$name → $result"
                FAILED=1
              else
                echo "::warning::$name → $result (non-blocking)"
              fi
            fi
          }
          check "static-analysis"   "${{ needs.static-analysis.result }}"
          check "linux-gcc"         "${{ needs.linux-gcc.result }}"
          check "linux-clang"       "${{ needs.linux-clang.result }}"
          check "linux-sanitizers"  "${{ needs.linux-sanitizers.result }}"
          check "linux-arm64"       "${{ needs.linux-arm64.result }}"
          check "windows"           "${{ needs.windows.result }}"
          check "macos"             "${{ needs.macos.result }}"
          check "wasm"              "${{ needs.wasm.result }}"
          check "android"           "${{ needs.android.result }}"
          check "coverage"          "${{ needs.coverage.result }}" 0
          [ "$FAILED" -eq 0 ] || { echo "::error::One or more required jobs failed"; exit 1; }
          echo "::notice::All required jobs passed"
        shell: bash
