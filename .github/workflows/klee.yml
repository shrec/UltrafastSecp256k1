# ============================================================================
# KLEE Symbolic Execution
# ============================================================================
# KLEE exhaustively explores execution paths by treating inputs as symbolic
# variables. Unlike random fuzzing, KLEE can prove the absence of bugs on
# all paths up to a given depth/budget.
#
# We target the parser-boundary and input-validation layer:
#   - ufsecp_pubkey_parse (all 33-byte compressed inputs)
#   - ufsecp_seckey_verify (all 32-byte scalars)
#   - DER signature parser (malformed input rejection)
#
# NOTE: We do NOT use 'container:' because GitHub Actions (actions/checkout,
# actions/upload-artifact) require write access to runner temp paths which
# the klee user inside klee/klee:3.0 does not have.  Instead we pull the
# image and run KLEE via explicit 'docker run' commands so that checkout and
# artifact upload happen on the host runner.
# ============================================================================
name: KLEE Symbolic Execution

on:
  push:
    branches: [main, dev]
    paths:
      - 'cpu/src/**'
      - 'cpu/include/**'
      - 'include/ufsecp/ufsecp.h'
      - 'include/ufsecp/ufsecp_impl.cpp'
      - '.github/workflows/klee.yml'
  schedule:
    # Weekly — Monday 02:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      klee_max_time:
        description: 'Max time per target in seconds (default: 120)'
        required: false
        default: '120'
      klee_max_depth:
        description: 'Max symbolic execution depth (default: 100)'
        required: false
        default: '100'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  klee:
    name: KLEE symbolic execution
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Pull KLEE Docker image
        run: docker pull klee/klee:3.0

      - name: Write KLEE harnesses
        run: |
          mkdir -p /tmp/klee-work
          # docker run klee user needs write access to this directory
          chmod 777 /tmp/klee-work

          cat > /tmp/klee-work/klee_pubkey_parse.cpp << 'EOF'
          #include <klee/klee.h>
          #include <cstdint>
          #include <cstring>
          #include <cstddef>

          static bool field_is_in_range(const uint8_t x[32]) {
              static const uint8_t P[32] = {
                  0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,
                  0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,
                  0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,
                  0xFF,0xFF,0xFF,0xFE,0xFF,0xFF,0xFC,0x2F
              };
              for (int i = 0; i < 32; ++i) {
                  if (x[i] < P[i]) return true;
                  if (x[i] > P[i]) return false;
              }
              return false;
          }

          static int pubkey_parse_model(const uint8_t input[33]) {
              uint8_t prefix = input[0];
              if (prefix != 0x02 && prefix != 0x03) return -1;
              const uint8_t* x = input + 1;
              if (!field_is_in_range(x)) return -2;
              return 0;
          }

          int main() {
              uint8_t input[33];
              klee_make_symbolic(input, sizeof(input), "pubkey_bytes");
              int result = pubkey_parse_model(input);
              if (input[0] != 0x02 && input[0] != 0x03) {
                  klee_assert(result == -1);
              }
              return 0;
          }
          EOF

          cat > /tmp/klee-work/klee_seckey_verify.cpp << 'EOF'
          #include <klee/klee.h>
          #include <cstdint>
          #include <cstring>

          static const uint8_t N[32] = {
              0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,
              0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFE,
              0xBA,0xAE,0xDC,0xE6,0xAF,0x48,0xA0,0x3B,
              0xBF,0xD2,0x5E,0x8C,0xD0,0x36,0x41,0x41
          };

          static int seckey_verify_model(const uint8_t k[32]) {
              bool all_zero = true;
              for (int i = 0; i < 32; ++i) if (k[i]) { all_zero = false; break; }
              if (all_zero) return -1;
              for (int i = 0; i < 32; ++i) {
                  if (k[i] < N[i]) return 0;
                  if (k[i] > N[i]) return -2;
              }
              return -2;
          }

          int main() {
              uint8_t key[32];
              klee_make_symbolic(key, sizeof(key), "seckey");
              int result = seckey_verify_model(key);
              bool all_zero = true;
              for (int i = 0; i < 32; ++i) if (key[i]) { all_zero = false; break; }
              if (all_zero) { klee_assert(result != 0); }
              bool eq_n = true;
              for (int i = 0; i < 32; ++i) if (key[i] != N[i]) { eq_n = false; break; }
              if (eq_n) { klee_assert(result != 0); }
              return 0;
          }
          EOF

          cat > /tmp/klee-work/klee_der_parse.cpp << 'EOF'
          #include <klee/klee.h>
          #include <cstdint>
          #include <cstring>
          #include <cstddef>

          static int der_parse_model(const uint8_t* der, size_t len) {
              if (len < 8 || len > 72) return -1;
              if (der[0] != 0x30) return -2;
              size_t total = der[1];
              if (total + 2 != len) return -3;
              if (der[2] != 0x02) return -4;
              size_t r_len = der[3];
              if (r_len == 0 || r_len > 33 || 4 + r_len >= len) return -5;
              if (der[4 + r_len] != 0x02) return -6;
              size_t s_len = der[5 + r_len];
              if (s_len == 0 || s_len > 33) return -7;
              if (5 + r_len + s_len != len) return -8;
              if (r_len > 1 && der[4] == 0x00 && (der[5] & 0x80) == 0) return -9;
              if (s_len > 1 && der[5 + r_len] == 0x00 && (der[6 + r_len] & 0x80) == 0) return -10;
              return 0;
          }

          #define SIG_LEN 72

          int main() {
              uint8_t sig[SIG_LEN];
              klee_make_symbolic(sig, sizeof(sig), "der_sig");
              size_t len;
              klee_make_symbolic(&len, sizeof(len), "sig_len");
              klee_assume(len >= 8 && len <= SIG_LEN);
              der_parse_model(sig, len);
              return 0;
          }
          EOF

      - name: Compile harnesses to LLVM bitcode
        run: |
          for src in /tmp/klee-work/*.cpp; do
            name=$(basename "$src" .cpp)
            echo "=== Compiling $name ==="
            docker run --rm \
              -v /tmp/klee-work:/work \
              klee/klee:3.0 \
              clang++ -std=c++17 -emit-llvm -O0 -g \
                -I /home/klee/klee_build/include \
                "/work/${name}.cpp" -c -o "/work/${name}.bc"
            echo "  -> /tmp/klee-work/${name}.bc"
          done
          ls -la /tmp/klee-work/*.bc

      - name: Run KLEE on each harness
        env:
          KLEE_MAX_TIME: ${{ github.event.inputs.klee_max_time || '120' }}
          KLEE_MAX_DEPTH: ${{ github.event.inputs.klee_max_depth || '100' }}
        run: |
          mkdir -p /tmp/klee-results
          chmod 777 /tmp/klee-results
          TOTAL_ERRORS=0

          for bc in /tmp/klee-work/*.bc; do
            name=$(basename "$bc" .bc)
            echo ""
            echo "=== KLEE: $name ==="
            mkdir -p "/tmp/klee-results/${name}"

            docker run --rm \
              -v /tmp/klee-work:/work \
              -v /tmp/klee-results:/results \
              klee/klee:3.0 \
              klee \
                --output-dir="/results/${name}" \
                --max-time="${KLEE_MAX_TIME}s" \
                --max-depth="${KLEE_MAX_DEPTH}" \
                --emit-all-errors \
                --only-output-states-covering-new \
                "/work/${name}.bc" 2>&1 | tee "/tmp/klee-results/${name}.log" || true

            ASSERTS=$(find "/tmp/klee-results/${name}" -name "*.assert.err" 2>/dev/null | wc -l)
            echo "  Assertion violations: $ASSERTS"
            if [ "$ASSERTS" -gt 0 ]; then
              echo "::error::KLEE found $ASSERTS assertion violations in $name"
              TOTAL_ERRORS=$((TOTAL_ERRORS + ASSERTS))
            fi

            docker run --rm \
              -v /tmp/klee-results:/results \
              klee/klee:3.0 \
              klee-stats "/results/${name}" 2>/dev/null || true
          done

          echo ""
          echo "Total assertion violations: $TOTAL_ERRORS"
          if [ "$TOTAL_ERRORS" -gt 0 ]; then
            echo "::error::KLEE detected $TOTAL_ERRORS assertion violation(s)"
            exit 1
          fi
          echo "::notice::KLEE: no assertion violations found"

      - name: Upload KLEE results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: klee-results
          path: /tmp/klee-results/
          retention-days: 30
