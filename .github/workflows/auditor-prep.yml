name: Auditor Prep

on:
  workflow_dispatch:
    inputs:
      with_package:
        description: Include full audit evidence package
        required: false
        type: boolean
        default: false
      build_dir:
        description: Build directory used for full package generation
        required: false
        type: string
        default: build-audit
      traceability_build:
        description: Build directory passed to generate_traceability.sh
        required: false
        type: string
        default: build

permissions:
  contents: read

concurrency:
  group: auditor-prep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auditor-prep:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install base tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++-13

      - name: Prepare external audit artifacts
        run: |
          args=(
            --output-dir external-audit-artifacts
            --traceability-build "${{ inputs.traceability_build }}"
          )
          if [[ "${{ inputs.with_package }}" == "true" ]]; then
            args+=(--with-package --build-dir "${{ inputs.build_dir }}")
          fi
          bash scripts/external_audit_prep.sh "${args[@]}"

      - name: Upload external audit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: external-audit-artifacts
          path: external-audit-artifacts/
          retention-days: 30