name: Auditor Prep

on:
  workflow_dispatch:
    inputs:
      with_package:
        description: Include full audit evidence package
        required: false
        type: boolean
        default: false
      build_dir:
        description: Build directory used for full package generation
        required: false
        type: string
        default: build-audit
      traceability_build:
        description: Build directory passed to generate_traceability.sh
        required: false
        type: string
        default: build

permissions:
  contents: read

concurrency:
  group: auditor-prep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auditor-prep:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install base tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++-13

      - name: Prepare external audit artifacts
        run: |
          args=(
            --output-dir external-audit-artifacts
            --traceability-build "${{ inputs.traceability_build }}"
          )
          if [[ "${{ inputs.with_package }}" == "true" ]]; then
            args+=(--with-package --build-dir "${{ inputs.build_dir }}")
          fi
          bash ci/external_audit_prep.sh "${args[@]}"

      - name: Embed CAAS gate state in artifact
        # M-7 fix: external auditors need to know whether the commit being
        # packaged passed CAAS gates. If the gate script exists and fails,
        # the step fails (real gate failure ≠ UNKNOWN). UNKNOWN is only used
        # when the script is genuinely absent from this checkout.
        run: |
          if [ -f ci/audit_gate.py ]; then
            python3 ci/audit_gate.py --json \
              -o external-audit-artifacts/caas_gate_state.json
          else
            echo '{"verdict":"UNKNOWN","note":"audit_gate.py not present in this checkout"}' \
              > external-audit-artifacts/caas_gate_state.json
          fi
          if [ -f ci/check_exploit_wiring.py ]; then
            python3 ci/check_exploit_wiring.py --json \
              > external-audit-artifacts/exploit_wiring_state.json
          else
            echo '{"result":"UNKNOWN","note":"check_exploit_wiring.py not present in this checkout"}' \
              > external-audit-artifacts/exploit_wiring_state.json
          fi

      - name: Upload external audit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # M-7 fix: append run_id to prevent re-runs on the same commit from
          # overwriting each other (previously all runs produced the same artifact
          # name, making it impossible to retrieve a specific run's bundle).
          name: external-audit-artifacts-${{ github.run_id }}
          path: external-audit-artifacts/
          retention-days: 90