name: Formal Verification (Z3 + Lean 4)

on:
  push:
    branches: [dev, main]
    paths:
      - 'src/cpu/src/ct_field.cpp'
      - 'audit/formal/**'
  pull_request:
    paths:
      - 'src/cpu/src/ct_field.cpp'
      - 'audit/formal/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: formal-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  z3-safegcd:
    name: SafeGCD Z3 SMT Proofs
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Z3 solver
        run: pip install --require-hashes -r .github/requirements/formal-verification.txt

      - name: Run SafeGCD formal proofs
        run: python3 audit/formal/safegcd_z3_proof.py

      - name: Append proof summary
        if: always()
        run: |
          echo '## Formal Verification — SafeGCD Z3 SMT' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python3 audit/formal/safegcd_z3_proof.py 2>&1 | tail -5 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  lean-safegcd:
    name: SafeGCD Lean 4 Proofs
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/v4.0.0/elan-init.sh -o /tmp/elan-init.sh
          echo "4bacca9502cb89736fe63d2685abc2947cfbf34dc87673504f1bb4c43eda9264  /tmp/elan-init.sh" | sha256sum -c -
          sh /tmp/elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build Lean 4 proofs
        working-directory: audit/formal/lean
        run: lake build

      - name: Append Lean proof summary
        if: always()
        working-directory: audit/formal/lean
        run: |
          echo '## Formal Verification — SafeGCD Lean 4' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          lake build 2>&1 | tail -10 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
