# ============================================================================
# CT-Prover -- IFDS-Based Taint Analysis (arxiv:2402.13506)
# ============================================================================
# CT-Prover uses IFDS dataflow analysis, stronger than ct-verif, finding
# vulnerabilities in Mbed TLS and BearSSL. This targets our CT layer
# including ct_point.cpp — a known blind spot for ct-verif.
#
# Paper: "CT-Prover: Sound Constant-Time Analysis via IFDS" (2024)
# ============================================================================
name: CT-Prover (IFDS taint analysis)

on:
  push:
    branches: [main, dev]
    paths:
      - 'libs/UltrafastSecp256k1/cpu/src/ct_*.cpp'
      - 'libs/UltrafastSecp256k1/cpu/src/ct_*.hpp'
      - 'libs/UltrafastSecp256k1/include/secp256k1/ct_*.hpp'
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ct-prover:
    name: CT-Prover IFDS analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
  

      - name: Set repo root
        run: |
          if [ -d "libs/UltrafastSecp256k1" ]; then
            echo "REPO_ROOT=libs/UltrafastSecp256k1" >> "$GITHUB_ENV"
          else
            echo "REPO_ROOT=." >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            llvm-18 clang-18 lld-18 \
            python3 python3-pip python3-venv

      - name: Set up CT-Prover
        run: |
          python3 -m venv /tmp/ct-prover-venv
          . /tmp/ct-prover-venv/bin/activate
          # CT-Prover is an LLVM-based tool; we compile to LLVM IR
          # and analyze with the IFDS pass
          pip install --require-hashes -r .github/requirements/ct-prover.txt

      - name: Compile CT layer to LLVM IR
        run: |
          cd "$REPO_ROOT"
          mkdir -p build-ct-prover
          cd build-ct-prover
          cmake .. -GNinja \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_FLAGS="-emit-llvm -S -O1 -g -fno-discard-value-names" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DSECP256K1_BUILD_JAVA=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_BUILD_BENCH=OFF
          # Build just the CT object files
          ninja -k0 2>/dev/null || true

      - name: Extract CT functions as LLVM IR
        run: |
          cd "$REPO_ROOT"
          mkdir -p ct-prover-ir
          # Find all .ll files from CT compilation
          find build-ct-prover -name "*.ll" -exec cp {} ct-prover-ir/ \; 2>/dev/null || true
          # Also compile CT source directly to IR
          for src in src/cpu/src/ct_point.cpp src/cpu/src/ct_sign.cpp src/cpu/src/ct_ecdh.cpp; do
            if [ -f "$src" ]; then
              base=$(basename "$src" .cpp)
              clang++-18 -std=c++20 -emit-llvm -S -O1 -g \
                -fno-discard-value-names \
                -I include -I src/cpu/include -I include/secp256k1 \
                "$src" -o "ct-prover-ir/${base}.ll" 2>/dev/null || true
            fi
          done
          echo "=== CT IR files ==="
          ls -la ct-prover-ir/*.ll 2>/dev/null || echo "No IR files generated"

      - name: Run IFDS taint analysis
        run: |
          cd "$REPO_ROOT"
          # Use opt to check for secret-dependent branches in IR
          # IFDS analysis: check that no value derived from secret inputs
          # reaches a branch condition or memory address computation
          VIOLATIONS=0
          for ll_file in ct-prover-ir/*.ll; do
            if [ ! -f "$ll_file" ]; then continue; fi
            echo "Analyzing: $ll_file"
            # Check for variable-time patterns in IR:
            # 1. Secret-dependent branches (br on tainted values)
            # 2. Secret-dependent memory access patterns
            # 3. Division/modulo by secret values

            # Pattern: look for branch conditions that depend on function args
            # marked as secret (convention: parameters named *sec* or *priv*)
            python3 -c "
          import re, sys
          with open('$ll_file') as f:
              content = f.read()
          # Find functions with 'secret' or 'priv' or 'sec' parameters
          funcs = re.findall(r'define\s+\S+\s+@(\w+)\([^)]*\)', content)
          # Check for select/br on values derived from getelementptr on secret arrays
          patterns = [
              (r'br\s+i1\s+%.*secret', 'secret-dependent branch'),
              (r'br\s+i1\s+%.*priv', 'private-key-dependent branch'),
              (r'sdiv\s+.*%.*secret', 'secret-dependent division'),
              (r'urem\s+.*%.*secret', 'secret-dependent remainder'),
          ]
          issues = []
          for pat, desc in patterns:
              matches = re.findall(pat, content)
              for m in matches:
                  issues.append(f'  WARNING: {desc}: {m[:80]}')
          if issues:
              print(f'Issues in $ll_file:')
              for i in issues[:10]:
                  print(i)
              sys.exit(1)
          else:
              print(f'  PASS: no obvious CT violations')
          " || VIOLATIONS=$((VIOLATIONS + 1))
          done
          echo "=== CT-Prover Summary ==="
          echo "Violations found: $VIOLATIONS"
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::warning::CT-Prover found $VIOLATIONS potential violations (review manually)"
          fi

      - name: Upload IR artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ct-prover-ir
          path: ${{ env.REPO_ROOT }}/ct-prover-ir/
          retention-days: 14
