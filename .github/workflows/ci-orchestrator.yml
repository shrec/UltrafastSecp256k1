name: CI Orchestrator

# Single push entry point. Python script dispatches + polls child workflows
# in the correct order. No cross-workflow needs: hacks required.
on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'include/**'
      - 'audit/**'
      - 'ci/**'
      - 'compat/**'
      - 'bindings/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: write  # needed to dispatch and read workflow runs

concurrency:
  group: ci-orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrate:
    name: "CI Orchestrator"
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Run CI orchestrator
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME:   ${{ github.ref_name }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
        run: python3 ci/orchestrate_ci.py
