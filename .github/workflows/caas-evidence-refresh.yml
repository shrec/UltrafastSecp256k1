name: CAAS Evidence Refresh

# Refreshes the suite-root assurance_report.json plus the library-side
# EXTERNAL_AUDIT_BUNDLE.json / .sha256 / SECURITY_AUTONOMY_KPI.json so that
# the audit_sla_check.py 30-day max_stale_evidence_days SLO never silently
# trips (CAAS Hardening TODO H-1).
#
# Safe: only commits when something actually changed, and only on dev.

on:
  # Daily refresh at 04:30 UTC. Documented in docs/CAAS_HARDENING_TODO.md (H-1)
  # and depended on by audit_sla_check.py max_stale_evidence_days SLO.
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:
    inputs:
      force_commit:
        description: 'Commit even if no JSON changed (touches mtime via no-op edit)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Top-level permissions restricted to read-only (Scorecard
# TokenPermissionsID). Only the `refresh` job needs contents:write in
# order to push the refreshed evidence JSONs back to dev, so that scope
# is granted at the job level below.
permissions:
  contents: read

concurrency:
  group: caas-evidence-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh CAAS evidence on dev
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    if: github.repository == 'shrec/UltrafastSecp256k1'
    # Needs write to push refreshed evidence JSONs back to the dev branch.
    permissions:
      contents: write
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Verify bot token is configured
        # CAAS_BOT_TOKEN must be a PAT with bypass permissions for the dev branch
        # protection rules. GITHUB_TOKEN cannot push through branch protection, so
        # the refresh silently fails on push without the PAT. Fail fast here instead.
        run: |
          if [ -z "${{ secrets.CAAS_BOT_TOKEN }}" ]; then
            echo "::error::CAAS_BOT_TOKEN secret is not configured."
            echo "::error::The evidence refresh requires a PAT that can bypass branch protection on dev."
            echo "::error::Configure CAAS_BOT_TOKEN as a repository secret with bypass permissions."
            exit 1
          fi

      - name: Checkout dev
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: dev
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.CAAS_BOT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: sudo apt-get install -y --no-install-recommends ninja-build g++-13

      - name: Build shared library (required by gates inside the bundle)
        run: |
          cmake -S . -B build-audit -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DBUILD_TESTING=OFF \
            -DSECP256K1_BUILD_PROTOCOL_TESTS=OFF \
            -DSECP256K1_BUILD_FUZZ_TESTS=OFF
          cmake --build build-audit --target ufsecp_shared -j $(nproc)

      - name: Build project graph
        run: python3 ci/build_project_graph.py --rebuild

      - name: Build source graph
        run: python3 tools/source_graph_kit/source_graph.py build -i

      - name: Regenerate suite-root assurance_report.json
        id: assurance_report
        # The library script writes wherever -o points. The suite-root file
        # is what audit_sla_check.py treats as the "assurance_report" SLO
        # input (scope=suite).
        run: |
          python3 ci/export_assurance.py -o assurance_report.json
          # F-27 fix: use a more reliable monorepo detection heuristic.
          # `../../` always exists on Linux; the AGENTS.md check was the only guard
          # and would break if that file was renamed. Instead, check for the parent
          # workspace's pyproject.toml or CMakeLists.txt at a known relative path,
          # or fall back to checking AGENTS.md still (belt-and-suspenders).
          _suite_root="$(cd ../.. && pwd)"
          if [ -f "${_suite_root}/AGENTS.md" ] || \
             [ -f "${_suite_root}/pyproject.toml" ] || \
             [ -f "${_suite_root}/CMakeLists.txt" ]; then
            if [ "$(basename "${_suite_root}")" != "$(basename "$(cd .. && pwd)")" ]; then
              cp assurance_report.json "${_suite_root}/assurance_report.json" \
                || echo "::warning::Failed to copy assurance_report.json to suite root ${_suite_root}"
            fi
          fi

      - name: Regenerate external audit bundle
        id: bundle_verify
        run: |
          python3 ci/external_audit_bundle.py
          BUNDLE_VERIFY_JSON="${{ runner.temp }}/bundle_verify.json"
          python3 ci/verify_external_audit_bundle.py --json > "$BUNDLE_VERIFY_JSON"
          python3 - "$BUNDLE_VERIFY_JSON" <<'EOF'
          import json, sys
          with open(sys.argv[1]) as f:
              r = json.load(f)
          if not r.get('overall_pass', False):
              print('::error::Bundle verify FAILED — aborting evidence refresh commit')
              sys.exit(1)
          else:
              print('::notice::Bundle verify PASS')
          EOF

      - name: Refresh security autonomy KPI snapshot
        id: autonomy_kpi
        run: |
          python3 ci/security_autonomy_check.py --json -o docs/SECURITY_AUTONOMY_KPI.json

      - name: Check exploit wiring (OBS-2 — ensure bundle reflects wiring state)
        id: exploit_wiring
        run: python3 ci/check_exploit_wiring.py

      - name: Regenerate audit dashboard (H-9)
        # Hard-fail: render_audit_dashboard.py only reads local JSON + git log
        # and must always succeed. A failure here means a schema regression in
        # one of its input files; allowing a stale dashboard to be committed
        # silently was masking the bug.
        run: python3 ci/render_audit_dashboard.py -o docs/AUDIT_DASHBOARD.md

      - name: Restore audit trend DB cache
        id: trend_cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: out/artifact_analyzer.db
          key: audit-trend-db-${{ runner.os }}-${{ hashFiles('ci/artifact_analyzer.py') }}
          restore-keys: audit-trend-db-${{ runner.os }}-

      - name: Ingest audit reports into trend DB and export timeline
        # Wire artifact_analyzer.py into the nightly refresh so audit quality
        # trends are tracked automatically across runs (MEDIUM-6 fix).
        # The DB is cached across runs; the exported timeline JSON is committed.
        continue-on-error: true
        run: |
          mkdir -p out
          python3 ci/artifact_analyzer.py \
            --db out/artifact_analyzer.db \
            ingest assurance_report.json docs/SECURITY_AUTONOMY_KPI.json \
            || echo "::warning::artifact_analyzer ingest skipped (report schema mismatch)"
          python3 ci/artifact_analyzer.py \
            --db out/artifact_analyzer.db \
            export --format timeline \
            --output docs/AUDIT_TREND_TIMELINE.json \
            || echo "::warning::artifact_analyzer timeline export skipped"
          # AA-05 fix: validate timeline JSON before it can be committed.
          # A failed export may produce an empty or truncated file; committing
          # it would corrupt the trend history visible in dashboards.
          if [ -f docs/AUDIT_TREND_TIMELINE.json ]; then
            python3 -c "
import json, sys
try:
    d = json.load(open('docs/AUDIT_TREND_TIMELINE.json'))
except Exception as e:
    print(f'::warning::AUDIT_TREND_TIMELINE.json is invalid JSON: {e}')
    sys.exit(0)
# Accept both list-of-events and {events:[...]} envelope formats
events = d if isinstance(d, list) else d.get('events', d.get('runs', []))
if not isinstance(events, list) or len(events) == 0:
    print('::warning::AUDIT_TREND_TIMELINE.json has no events — removing to avoid committing empty timeline')
    import os; os.remove('docs/AUDIT_TREND_TIMELINE.json')
" || true
          fi

      - name: Regenerate exploit traceability join (G-9b)
        run: |
          python3 ci/exploit_traceability_join.py --emit-join

      - name: Show diff
        run: |
          git --no-pager diff --stat -- \
            assurance_report.json \
            docs/EXTERNAL_AUDIT_BUNDLE.json \
            docs/EXTERNAL_AUDIT_BUNDLE.sha256 \
            docs/SECURITY_AUTONOMY_KPI.json \
            docs/AUDIT_DASHBOARD.md \
            docs/EXPLOIT_TRACEABILITY_JOIN.md \
            docs/AUDIT_TREND_TIMELINE.json \
            || true

      - name: Upload refreshed artifacts (diagnostic fallback if push fails)
        # B-4 fix: if the git push fails (PAT revoked, branch protection error),
        # regenerated evidence would otherwise be lost with no way to inspect it.
        # Upload as a GitHub Actions artifact so the data is always recoverable.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: caas-evidence-refresh-${{ github.run_id }}
          path: |
            assurance_report.json
            docs/EXTERNAL_AUDIT_BUNDLE.json
            docs/EXTERNAL_AUDIT_BUNDLE.sha256
            docs/SECURITY_AUTONOMY_KPI.json
            docs/AUDIT_DASHBOARD.md
            docs/EXPLOIT_TRACEABILITY_JOIN.md
            docs/EVIDENCE_CHAIN.json
          if-no-files-found: warn
          retention-days: 90

      - name: Commit and push if changed
        id: commit_push
        env:
          GH_TOKEN: ${{ secrets.CAAS_BOT_TOKEN }}
          FORCE_COMMIT: ${{ github.event.inputs.force_commit }}
          CAAS_HMAC_KEY: ${{ secrets.CAAS_HMAC_KEY }}
        run: |
          set -e
          git config user.name  "caas-bot"
          git config user.email "caas-bot@users.noreply.github.com"

          # M-1 fix: determine verdict from the outcomes of the gate steps.
          # Previously this was hardcoded "pass" unconditionally, meaning the
          # evidence chain recorded PASS even when bundle verify or autonomy
          # check failed. Now we propagate the real gate state.
          # F-14 fix: also check assurance_report step — a failed export_assurance.py
          # run should not produce a "pass" evidence chain entry.
          GATE_VERDICT="pass"
          if [ "${{ steps.bundle_verify.outcome }}" != "success" ] || \
             [ "${{ steps.autonomy_kpi.outcome }}" != "success" ] || \
             [ "${{ steps.exploit_wiring.outcome }}" != "success" ] || \
             [ "${{ steps.assurance_report.outcome }}" != "success" ]; then
            GATE_VERDICT="fail"
            echo "::warning::One or more gate steps failed; recording verdict=fail in evidence chain"
          fi

          # Record this refresh run in the evidence chain BEFORE checking what changed,
          # so the chain entry is always included in the commit (if anything else changed).
          # --commit pins the chain record to the audited HEAD SHA (FINDING-13 fix: previously
          # used git rev-parse HEAD at write time, which could differ from the audited commit
          # when commits are pushed between the schedule trigger and the actual run).
          if ! python3 ci/evidence_governance.py record \
            --who "caas-evidence-refresh" \
            --what "nightly-evidence-refresh" \
            --verdict "$GATE_VERDICT" \
            --commit "${{ github.sha }}" \
            --reason "automated-nightly-$(date -u +%Y-%m-%d)"; then
            echo "::error::evidence chain write failed during nightly refresh — chain integrity compromised"
            exit 1
          fi

          CHANGED=0
          for f in assurance_report.json \
                   docs/EXTERNAL_AUDIT_BUNDLE.json \
                   docs/EXTERNAL_AUDIT_BUNDLE.sha256 \
                   docs/SECURITY_AUTONOMY_KPI.json \
                   docs/AUDIT_DASHBOARD.md \
                   docs/EXPLOIT_TRACEABILITY_JOIN.md \
                   docs/EVIDENCE_CHAIN.json; do
            if [ -f "$f" ] && ! git diff --quiet -- "$f"; then
              git add "$f"
              CHANGED=1
            fi
          done

          if [ "$CHANGED" -eq 0 ] && [ "${FORCE_COMMIT}" != "true" ]; then
            echo "::notice::No evidence changed; nothing to commit"
            exit 0
          fi

          git commit -m "[bot] CAAS evidence refresh ($(date -u +%Y-%m-%d))" \
                     -m "Automated nightly refresh of CAAS evidence artifacts so the audit_sla_check.py max_stale_evidence_days SLO cannot silently trip. Includes audit dashboard (H-9), exploit traceability join (G-9b), and evidence chain record. See docs/CAAS_HARDENING_TODO.md (H-1)."

          git push origin dev
