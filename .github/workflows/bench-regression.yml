# ============================================================================
# Performance Regression Gate -- Per-Commit Benchmark Check
# ============================================================================
# Runs benchmarks on every push to main/dev and on PRs that touch perf-sensitive
# paths. Fails if any operation regresses >100% (i.e. is more than 2x slower)
# compared to the previous stored baseline.
#
# Separate from benchmark.yml (dashboard) -- this one BLOCKS merges.
# Uses github-action-benchmark with fail-on-alert: true.
# ============================================================================

name: Perf Regression Gate

on:
  schedule:
    # Weekly unconditional run — catches regressions introduced by audit/ci/bindings/docs commits
    # that are excluded from the push path filter below.
    - cron: '0 3 * * 0'
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/bench-regression.yml'
      - '.github/scripts/parse_benchmark.py'
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/bench-regression.yml'
      - '.github/scripts/parse_benchmark.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bench-regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bench-gate:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write       # needed to push baseline to gh-pages on push events
      pull-requests: write  # needed to comment on PRs when regression detected

    steps:
    - name: Harden the runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false


    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq ninja-build cmake

    - name: Clone libsecp256k1 (for apple-to-apple comparison)
      run: |
        git clone --depth 1 https://github.com/bitcoin-core/secp256k1.git \
          "$GITHUB_WORKSPACE/_libsecp256k1"

    - name: Configure (Release)
      run: |
        cmake -S . -B build/bench-gate \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_TESTING=ON \
          -DSECP256K1_USE_ASM=ON \
          -DSECP256K1_MARCH=x86-64-v2 \
          -DLIBSECP_SRC_DIR="$GITHUB_WORKSPACE/_libsecp256k1/src"

    - name: Build
      run: cmake --build build/bench-gate -j$(nproc)

    - name: Run benchmark suite
      run: |
        mkdir -p /tmp/benchmark_results
        ./build/bench-gate/cpu/bench_unified --quick 2>&1 | tee /tmp/benchmark_results/raw_output.txt
        python3 .github/scripts/parse_benchmark.py \
          /tmp/benchmark_results/raw_output.txt \
          /tmp/benchmark_results/benchmark.json

    - name: Store baseline + check regression (push to main/dev or manual dispatch)
      # Stores the result to gh-pages and FAILS the job if any operation is
      # >100% slower (i.e. >2x), expressed as alert-threshold: '200%' in the
      # github-action-benchmark vocabulary (200% of baseline duration = 2x).
      # Threshold is generous because push events run on shared CI runners
      # with high variance; the baseline auto-updates on each push anyway.
      # auto-push: true is required so future runs have a baseline to compare.
      # workflow_dispatch also stores so you can bootstrap/reset the baseline manually.
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1
      with:
        name: 'Perf Regression Gate'
        tool: 'customSmallerIsBetter'
        output-file-path: /tmp/benchmark_results/benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        alert-threshold: '200%'
        comment-on-alert: true
        fail-on-alert: true
        benchmark-data-dir-path: 'dev/bench-gate'

    - name: PR comparison (alert + block on regression)
      # Compares PR benchmark against the stored baseline from push events.
      # Does NOT store (auto-push: false) -- only the push to main/dev updates baseline.
      # BLOCKS PR if regression exceeds threshold.
      # Threshold: alert-threshold '200%' in github-action-benchmark = any
      # operation that runs >2x as long as the baseline (>100% slower) fails.
      if: github.event_name == 'pull_request'
      uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1
      with:
        name: 'Perf Regression Gate'
        tool: 'customSmallerIsBetter'
        output-file-path: /tmp/benchmark_results/benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: false
        alert-threshold: '200%'
        comment-on-alert: true
        fail-on-alert: true
        benchmark-data-dir-path: 'dev/bench-gate'

    - name: Summary
      if: always()
      run: |
        echo "## Benchmark Regression Gate" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Event:** \`${{ github.event_name }}\`  **Threshold:** alert-threshold '200%' = any op running >2x baseline (>100% slower) fails." >> $GITHUB_STEP_SUMMARY
        if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "**Baseline:** stored to \`dev/bench-gate\` on gh-pages (auto-push: true)" >> $GITHUB_STEP_SUMMARY
        else
          echo "**Baseline:** read-only comparison (PR — baseline not updated)" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        head -50 /tmp/benchmark_results/raw_output.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
