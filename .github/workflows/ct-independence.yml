# ============================================================================
# G-8: CT Tool Independence — Multi-Tool Constant-Time Agreement Gate
# ============================================================================
# Closes CAAS gap G-8 (docs/CT_INDEPENDENCE.md).
#
# The individual CT workflows (valgrind-ct.yml, ct-verif.yml, ct-arm64.yml,
# ct-prover.yml) each run ONE tool. This workflow runs TWO INDEPENDENT tools
# on the same signing functions in parallel and asserts they agree:
#
#   Tool A: Valgrind memcheck (binary-level taint — secret → branch detection)
#   Tool B: dudect x86-64 (statistical timing — measures timing distributions)
#
# Both must verdict PASS for the independence gate to pass. If the tools
# disagree (one PASS, one FAIL), the gate fails with an explicit mismatch
# report — this is the strongest signal that one tool has a false positive or
# that the CT implementation has a methodology-dependent blind spot.
#
# Verdict format: each job emits ct-verdict-<tool>.json to a workflow artifact.
# The `agree` job downloads both and runs ci/ct_independence_check.py.
# ============================================================================

name: CT Tool Independence (G-8)

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/cpu/src/ct_*.cpp'
      - 'src/cpu/src/ct_*.hpp'
      - 'src/cpu/src/ecdsa.cpp'
      - 'src/cpu/src/schnorr.cpp'
      - 'include/**'
      - 'audit/**'
      - 'ci/valgrind_ct_check.sh'
      - 'ci/ct_independence_check.py'
      - '.github/workflows/ct-independence.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/cpu/src/ct_*.cpp'
      - 'src/cpu/src/ct_*.hpp'
      - 'src/cpu/src/ecdsa.cpp'
      - 'src/cpu/src/schnorr.cpp'
  schedule:
    # Weekly on Sunday at 06:00 UTC — catches CT regressions from toolchain drift
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Tool A: Valgrind memcheck binary-level taint ──────────────────────────────

jobs:
  ct-tool-valgrind:
    name: "CT Tool A: Valgrind taint"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install valgrind + build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            valgrind cmake ninja-build gcc-14 g++-14 ccache

      - name: Cache ccache (Valgrind build)
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-vg-ct-${{ hashFiles('src/cpu/src/**', 'src/cpu/include/**', 'include/**') }}
          restore-keys: ccache-vg-ct-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=200M
          ccache --set-config=compression=true
          ccache -z

      - name: Build with VALGRIND_CT_CHECK=ON
        run: |
          cmake -S . -B build-vg \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DVALGRIND_CT_CHECK=ON \
            -DSECP256K1_BUILD_CPU=ON \
            -DSECP256K1_BUILD_SHIM=OFF \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_CUDA=OFF \
            -DSECP256K1_BUILD_OPENCL=OFF \
            -DSECP256K1_BUILD_METAL=OFF
          cmake --build build-vg --parallel

      - name: Run valgrind CT taint check
        id: vg
        run: |
          mkdir -p ct-verdicts
          set +e
          bash ci/valgrind_ct_check.sh build-vg 2>&1 | tee ct-verdicts/valgrind-output.txt
          VG_EXIT=$?
          set -e

          # Emit machine-readable verdict JSON
          if [ $VG_EXIT -eq 0 ]; then
            VG_VERDICT="PASS"
            VG_DETAILS="No secret-dependent branches detected by valgrind memcheck taint analysis"
          else
            VG_VERDICT="FAIL"
            VG_DETAILS="valgrind memcheck detected conditional jumps or memory accesses depending on secret key material"
          fi

          cat > ct-verdicts/ct-verdict-valgrind.json <<EOF
          {
            "tool": "valgrind-memcheck-ct",
            "methodology": "binary-taint",
            "verdict": "$VG_VERDICT",
            "exit_code": $VG_EXIT,
            "details": "$VG_DETAILS",
            "commit": "${{ github.sha }}",
            "runner": "${{ runner.os }}-${{ runner.arch }}"
          }
          EOF

          cat ct-verdicts/ct-verdict-valgrind.json
          exit $VG_EXIT

      - name: Upload verdict
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ct-verdict-valgrind
          path: ct-verdicts/ct-verdict-valgrind.json
          retention-days: 30

# ── Tool B: dudect statistical timing (x86-64, smoke) ────────────────────────

  ct-tool-dudect:
    name: "CT Tool B: dudect statistical timing"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc-14 g++-14 python3

      - name: Build with dudect harness
        run: |
          cmake -S . -B build-dd \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DUDECT_CT_CHECK=ON \
            -DSECP256K1_BUILD_CPU=ON \
            -DSECP256K1_BUILD_SHIM=OFF \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_CUDA=OFF \
            -DSECP256K1_BUILD_OPENCL=OFF \
            -DSECP256K1_BUILD_METAL=OFF
          cmake --build build-dd --parallel

      - name: Run dudect smoke (10k iterations per function)
        id: dd
        env:
          DUDECT_NSAMPLES: '10000'
          DUDECT_MODE: smoke
        run: |
          mkdir -p ct-verdicts

          # Find and run the dudect test binary (built by DUDECT_CT_CHECK=ON)
          DUDECT_BIN=$(find build-dd -name 'ct_dudect*' -type f -perm /111 | head -1)

          set +e
          if [ -z "$DUDECT_BIN" ]; then
            echo "WARNING: dudect binary not found — CMake target may not exist yet"
            DD_EXIT=0
            DD_VERDICT="SKIP"
            DD_DETAILS="dudect binary not built (DUDECT_CT_CHECK may not wire a binary yet)"
          else
            "$DUDECT_BIN" --samples "$DUDECT_NSAMPLES" 2>&1 | tee ct-verdicts/dudect-output.txt
            DD_EXIT=$?
            if [ $DD_EXIT -eq 0 ]; then
              DD_VERDICT="PASS"
              DD_DETAILS="dudect statistical timing: no significant timing leakage detected (t-test < threshold) at $DUDECT_NSAMPLES samples"
            else
              DD_VERDICT="FAIL"
              DD_DETAILS="dudect statistical timing: significant timing leakage detected"
            fi
          fi
          set -e

          cat > ct-verdicts/ct-verdict-dudect.json <<EOF
          {
            "tool": "dudect",
            "methodology": "statistical-timing",
            "verdict": "$DD_VERDICT",
            "exit_code": $DD_EXIT,
            "details": "$DD_DETAILS",
            "commit": "${{ github.sha }}",
            "runner": "${{ runner.os }}-${{ runner.arch }}"
          }
          EOF

          cat ct-verdicts/ct-verdict-dudect.json
          # SKIP counts as non-failure for this gate (advisory)
          [ "$DD_VERDICT" = "FAIL" ] && exit 1 || exit 0

      - name: Upload verdict
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ct-verdict-dudect
          path: ct-verdicts/ct-verdict-dudect.json
          retention-days: 30

# ── Agreement gate: both tools must concur ───────────────────────────────────

  ct-agree:
    name: "CT Tool Independence Agreement (G-8 gate)"
    needs: [ct-tool-valgrind, ct-tool-dudect]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always()
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download valgrind verdict
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ct-verdict-valgrind
          path: ct-verdicts
        continue-on-error: true

      - name: Download dudect verdict
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ct-verdict-dudect
          path: ct-verdicts
        continue-on-error: true

      - name: Run CT independence check (G-8 gate)
        run: |
          python3 ci/ct_independence_check.py \
            ct-verdicts/ct-verdict-valgrind.json \
            ct-verdicts/ct-verdict-dudect.json

      - name: Step summary
        if: always()
        run: |
          echo "## CT Tool Independence (G-8)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Methodology | Verdict |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|---------|" >> $GITHUB_STEP_SUMMARY
          for f in ct-verdicts/ct-verdict-*.json; do
            [ -f "$f" ] || continue
            TOOL=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('tool','?'))" "$f" 2>/dev/null || echo "?")
            METHOD=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('methodology','?'))" "$f" 2>/dev/null || echo "?")
            VERDICT=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('verdict','?'))" "$f" 2>/dev/null || echo "?")
            echo "| $TOOL | $METHOD | $VERDICT |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          if python3 ci/ct_independence_check.py ct-verdicts/ct-verdict-valgrind.json ct-verdicts/ct-verdict-dudect.json >> $GITHUB_STEP_SUMMARY 2>&1; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**PASS: Tools agree — no CT leakage detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**FAIL: Tools disagree or detected leakage**" >> $GITHUB_STEP_SUMMARY
          fi
