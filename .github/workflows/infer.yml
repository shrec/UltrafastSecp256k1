name: Facebook Infer

on:
  push:
    branches: [main, dev]
  workflow_run:
    workflows: ["Pipeline / Phase 1 — Fast Gates"]
    types: [completed]
    branches: [main, dev]

  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * 1'   # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: infer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  infer:
    name: Facebook Infer (bi-abduction + null-deref)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Infer + build tools
        run: |
          # Infer 1.2.0 — pinned release for reproducibility
          INFER_VERSION="1.2.0"
          INFER_ARCHIVE="infer-linux-x86_64-v${INFER_VERSION}.tar.xz"
          INFER_URL="https://github.com/facebook/infer/releases/download/v${INFER_VERSION}/${INFER_ARCHIVE}"
          curl -sSL "${INFER_URL}" -o "${INFER_ARCHIVE}"
          tar -xJf "${INFER_ARCHIVE}"
          echo "$PWD/infer-linux-x86_64-v${INFER_VERSION}/bin" >> "$GITHUB_PATH"
          rm -f "${INFER_ARCHIVE}"
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 clang++-18 ninja-build

      - name: Configure (generate compile_commands.json)
        run: |
          cmake -S . -B build/infer \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DSECP256K1_BUILD_TESTS=OFF \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_USE_ASM=OFF

      - name: Run Infer (capture phase via compilation database)
        run: |
          infer capture \
            --compilation-database build/infer/compile_commands.json
          echo "Infer capture complete"

      - name: Run Infer (analyze phase)
        run: |
          infer analyze \
            --keep-going \
            --jobs "$(nproc)" \
            --disable-issue-type DEAD_STORE \
            --disable-issue-type INEFFICIENT_KEYSET_ITERATOR
          echo "Infer analyze complete"

      - name: Report Infer findings
        run: |
          echo "=== Infer findings ==="
          if [ -f infer-out/report.json ]; then
            python3 - <<'PYEOF'
          import json, sys
          with open("infer-out/report.json") as f:
              bugs = json.load(f)
          # Filter to files in our source dirs (skip external/build)
          SOURCE_DIRS = ("cpu/", "include/", "cuda/", "opencl/", "bindings/")
          relevant = [b for b in bugs
                      if any(b.get("file","").startswith(d) for d in SOURCE_DIRS)]
          by_type = {}
          for b in relevant:
              by_type.setdefault(b["bug_type"], []).append(b)
          for bt, entries in sorted(by_type.items()):
              for e in entries:
                  print(f"[{bt}] {e['file']}:{e['line']} — {e['qualifier'][:120]}")
          print(f"\nTotal relevant findings: {len(relevant)}")
          # Hard-fail on NULL_DEREFERENCE, RESOURCE_LEAK, USE_AFTER_FREE, MEMORY_LEAK
          hard_types = {"NULL_DEREFERENCE", "RESOURCE_LEAK",
                        "USE_AFTER_FREE", "MEMORY_LEAK", "BUFFER_OVERRUN_U5"}
          hard = [b for b in relevant if b["bug_type"] in hard_types]
          if hard:
              print(f"\n::error::Infer found {len(hard)} hard-fail issue(s):")
              for b in hard:
                  print(f"  [{b['bug_type']}] {b['file']}:{b['line']}")
              sys.exit(1)
          print("Infer: clean (no hard-fail issues)")
          PYEOF
          else
            echo "(no infer-out/report.json — no bugs found)"
          fi

      - name: Upload Infer report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: infer-report
          path: infer-out/report.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Advisory — full Infer output (non-blocking)
        if: always()
        continue-on-error: true
        run: |
          infer report 2>/dev/null | head -100 || true
          echo "=== Full infer-out/report.json (first 50 entries) ==="
          python3 -c "
          import json, sys
          try:
              bugs = json.load(open('infer-out/report.json'))
              for b in bugs[:50]:
                  print(f\"{b.get('bug_type','?')} {b.get('file','?')}:{b.get('line','?')}\")
          except Exception as e:
              print(f'(no report: {e})')
          " || true
