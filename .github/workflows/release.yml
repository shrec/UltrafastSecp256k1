          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" "${PKG}/composer.json"

          # Copy C header (for PHP FFI definition loading)
          mkdir -p "${PKG}/include"
          cp include/ufsecp/ufsecp.h "${PKG}/include/"
