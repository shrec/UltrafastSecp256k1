  # ==========================================================================
  # 15) Package bindings -- React Native (npm + Android/iOS native libs)
  # ==========================================================================
  pack-react-native:
    needs: [release-caas-gate, build-desktop, build-android, build-ios]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: native-dist

      - name: Build React Native package
        run: |
          VERSION="${RELEASE_VERSION#v}"
          cd bindings/react-native

          # Use ufsecp manifest
          cp package.ufsecp.json package.json

          # Inject version from git tag
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" package.json

          # Copy prebuilt native libs into platform dirs
          mkdir -p prebuilds

          for PLAT in android-arm64 android-armv7 android-x64; do
            ARTIFACT_DIR="../../native-dist/UltrafastSecp256k1-${{ env.RELEASE_TAG }}-${PLAT}"
            if [ ! -d "$ARTIFACT_DIR" ]; then
              echo "  SKIP: ${PLAT}"
              continue
            fi
            mkdir -p "prebuilds/${PLAT}"
            TMPDIR=$(mktemp -d)
            if ls "${ARTIFACT_DIR}"/*.tar.gz 1>/dev/null 2>&1; then
              tar xf "${ARTIFACT_DIR}"/*.tar.gz -C "$TMPDIR"
            elif ls "${ARTIFACT_DIR}"/*.zip 1>/dev/null 2>&1; then
              unzip -o "${ARTIFACT_DIR}"/*.zip -d "$TMPDIR"
            fi
            find "$TMPDIR" -maxdepth 6 \
              \( -name "libufsecp.so" -o -name "libufsecp.so.*" \) \
              -exec cp {} "prebuilds/${PLAT}/" \; 2>/dev/null || true
            rm -rf "$TMPDIR"
          done

          # iOS XCFramework
          IOS_DIR="../../native-dist/UltrafastSecp256k1-${{ env.RELEASE_TAG }}-ios-xcframework"
          if [ -d "$IOS_DIR" ]; then
            mkdir -p prebuilds/ios
            TMPDIR=$(mktemp -d)
            tar xf "${IOS_DIR}"/*.tar.gz -C "$TMPDIR" 2>/dev/null || true
            find "$TMPDIR" -name "*.xcframework" -type d -exec cp -r {} prebuilds/ios/ \; 2>/dev/null || true
            find "$TMPDIR" -name "*.a" -exec cp {} prebuilds/ios/ \; 2>/dev/null || true
            rm -rf "$TMPDIR"
          fi

          echo "=== Prebuilds ==="
          find prebuilds/ -type f 2>/dev/null || echo "(none)"

          npm pack
          echo "=== React Native package ==="
          ls -la react-native-ufsecp-*.tgz

      - name: Upload React Native package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ufsecp-react-native
          path: bindings/react-native/react-native-ufsecp-*.tgz
          retention-days: 30

      - name: Publish to GitHub Packages (npm -- React Native)
        continue-on-error: true
        run: |
          cd bindings/react-native
          sed -i 's/"name": "react-native-ufsecp"/"name": "@shrec\/react-native-ufsecp"/' package.json
          echo "@shrec:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npmjs.com (public registry -- React Native)
        continue-on-error: true
        run: |
          cd bindings/react-native
          # Restore original unscoped name for npmjs.com
          sed -i 's/"name": "@shrec\/react-native-ufsecp"/"name": "react-native-ufsecp"/' package.json
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ==========================================================================
  # 16) Package bindings -- Swift (Package.swift + sources + native libs)
  # ==========================================================================
  pack-swift:
    needs: [release-caas-gate, build-desktop, build-ios]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: native-dist

      - name: Build Swift package
        run: |
          VERSION="${RELEASE_VERSION#v}"
          PKG="ufsecp-swift-${VERSION}"
          mkdir -p "${PKG}/native"

          # Copy Swift binding sources (use ufsecp manifest)
          cp bindings/swift/Package.ufsecp.swift "${PKG}/Package.swift"
          cp -r bindings/swift/Sources/Ufsecp "${PKG}/Sources/Ufsecp" 2>/dev/null || true
          cp -r bindings/swift/Sources/CUfsecp "${PKG}/Sources/CUfsecp" 2>/dev/null || true
          mkdir -p "${PKG}/Sources/CUfsecp"
          mkdir -p "${PKG}/Sources/Ufsecp"

          # Copy C headers into the CUfsecp module
          cp include/ufsecp/ufsecp.h "${PKG}/Sources/CUfsecp/" 2>/dev/null || true
          cp include/ufsecp/ufsecp_error.h "${PKG}/Sources/CUfsecp/" 2>/dev/null || true
          cp include/ufsecp/ufsecp_version.h "${PKG}/Sources/CUfsecp/" 2>/dev/null || true

          # macOS native lib
          MACOS_DIR="native-dist/UltrafastSecp256k1-${{ env.RELEASE_TAG }}-macos-arm64"
          if [ -d "$MACOS_DIR" ]; then
            mkdir -p "${PKG}/native/macos-arm64"
            TMPDIR=$(mktemp -d)
            if ls "${MACOS_DIR}"/*.tar.gz 1>/dev/null 2>&1; then
              tar xf "${MACOS_DIR}"/*.tar.gz -C "$TMPDIR"
            fi
            find "$TMPDIR" -maxdepth 6 -name "libufsecp.dylib" \
              -exec cp {} "${PKG}/native/macos-arm64/" \; 2>/dev/null || true
            rm -rf "$TMPDIR"
          fi

          # iOS XCFramework
          IOS_DIR="native-dist/UltrafastSecp256k1-${{ env.RELEASE_TAG }}-ios-xcframework"
          if [ -d "$IOS_DIR" ]; then
            mkdir -p "${PKG}/native/ios"
            TMPDIR=$(mktemp -d)
            tar xf "${IOS_DIR}"/*.tar.gz -C "$TMPDIR" 2>/dev/null || true
            find "$TMPDIR" -name "*.xcframework" -type d -exec cp -r {} "${PKG}/native/ios/" \; 2>/dev/null || true
            rm -rf "$TMPDIR"
          fi

          echo "=== Swift package contents ==="
          find "${PKG}" -type f | sort
          tar czf "${PKG}.tar.gz" "${PKG}"
          ls -la "${PKG}.tar.gz"

      - name: Upload Swift package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ufsecp-swift
          path: ufsecp-swift-*.tar.gz
          retention-days: 30

  # ==========================================================================
  # 17) Package -- C/C++ headers + native libs (all platforms)
  # ==========================================================================
  pack-c-headers:
    needs: [release-caas-gate, build-desktop, build-linux-arm64]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download desktop artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: native-dist

      - name: Build C/C++ SDK package
        run: |
          VERSION="${RELEASE_VERSION#v}"
          PKG="ufsecp-c-${VERSION}"

          # Copy public C API headers
          mkdir -p "${PKG}/include"
          cp include/ufsecp/ufsecp.h "${PKG}/include/"
          cp include/ufsecp/ufsecp_error.h "${PKG}/include/"
          cp include/ufsecp/ufsecp_version.h "${PKG}/include/"

          # Copy example if present
          if [ -d include/ufsecp/examples ]; then
            cp -r include/ufsecp/examples "${PKG}/examples"
          fi

          # Copy pkg-config template
          cp include/ufsecp/ufsecp.pc.in "${PKG}/" 2>/dev/null || true

          # Extract native libs per platform
          for PLAT in linux-x64 linux-arm64 macos-arm64 win-x64; do
            ARTIFACT_DIR="native-dist/UltrafastSecp256k1-${{ env.RELEASE_TAG }}-${PLAT}"
            if [ ! -d "$ARTIFACT_DIR" ]; then
              echo "  SKIP: ${PLAT}"
              continue
            fi
            mkdir -p "${PKG}/lib/${PLAT}"
            TMPDIR=$(mktemp -d)
            if ls "${ARTIFACT_DIR}"/*.tar.gz 1>/dev/null 2>&1; then
              tar xf "${ARTIFACT_DIR}"/*.tar.gz -C "$TMPDIR"
            elif ls "${ARTIFACT_DIR}"/*.zip 1>/dev/null 2>&1; then
              unzip -o "${ARTIFACT_DIR}"/*.zip -d "$TMPDIR"
            fi
            find "$TMPDIR" -maxdepth 6 \
              \( -name "libufsecp.so" -o -name "libufsecp.so.*" \
              -o -name "ufsecp.dll" -o -name "ufsecp.lib" \
              -o -name "libufsecp.dylib" -o -name "libufsecp.a" \) \
              -exec cp {} "${PKG}/lib/${PLAT}/" \; 2>/dev/null || true
            rm -rf "$TMPDIR"
          done

          echo "=== C SDK package contents ==="
          find "${PKG}" -type f | sort
          tar czf "${PKG}.tar.gz" "${PKG}"
          ls -la "${PKG}.tar.gz"

      - name: Upload C SDK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ufsecp-c-headers
          path: ufsecp-c-*.tar.gz
          retention-days: 30

  # ==========================================================================
  # 18) Create GitHub Release (collects ALL artifacts)
  # ==========================================================================
  release:
    needs: [release-caas-gate, sync-docs, build-desktop, build-linux-arm64, build-android, build-ios, build-wasm, pack-python, pack-npm, pack-nuget, pack-gem, pack-java, pack-go, pack-rust, pack-dart, pack-php, pack-react-native, pack-swift, pack-c-headers]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Extract section for this version from CHANGELOG.md
          VERSION="${RELEASE_VERSION#v}"
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found && /^---$/ { exit }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi

          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: List collected artifacts
        run: find dist -type f | sort

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.whl' \
            -o -name '*.nupkg' -o -name '*.tgz' -o -name '*.gem' -o -name '*.jar' \) \
            | sort | while read -r f; do
              sha256sum "$f" | sed 's|  \./[^/]*/|  |; s|  \./|  |'
            done > ../SHA256SUMS
          cd ..
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.whl
            dist/**/*.nupkg
            dist/**/*.tgz
            dist/**/*.gem
            dist/**/*.jar
            dist/**/*.deb
            dist/**/*.rpm

      # -- Cosign keyless signing (Sigstore) --
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3.8.0

      - name: Sign release artifacts with cosign
        run: |
          echo "cosign version: $(cosign version 2>&1 | head -1)"

          # Sign the SHA256SUMS manifest itself -- HARD FAIL if this fails.
          # SHA256SUMS signature is the root of trust for the entire release.
          echo "Signing: SHA256SUMS"
          cosign sign-blob --yes SHA256SUMS \
            --bundle SHA256SUMS.sigstore
          echo "  [OK] SHA256SUMS signed"

          # Verify the signature immediately (fail-fast integrity check)
          cosign verify-blob SHA256SUMS \
            --bundle SHA256SUMS.sigstore \
            --certificate-identity-regexp='.*' \
            --certificate-oidc-issuer-regexp='.*'
          echo "  [OK] SHA256SUMS signature verified"

          # Sign individual release archives -- HARD FAIL if any signing fails.
          # Every release artifact MUST be signed.
          # NOTE: uses process substitution (not pipe) so failures propagate
          # to the current shell and variables are preserved.
          SIGNED=0
          FAILED=0
          cd dist
          while IFS= read -r -d '' f; do
            echo "Signing: $f"
            if cosign sign-blob --yes "$f" \
                --bundle "${f}.sigstore"; then
              SIGNED=$((SIGNED + 1))
            else
              echo "::error::Failed to sign artifact: $f"
              FAILED=$((FAILED + 1))
            fi
          done < <(find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.whl' \
            -o -name '*.nupkg' -o -name '*.tgz' -o -name '*.gem' -o -name '*.jar' \) -print0)
          cd ..

          echo "Signed: $SIGNED artifacts"
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Failed to sign $FAILED artifact(s) -- release BLOCKED"
            exit 1
          fi
          if [ "$SIGNED" -eq 0 ]; then
            echo "::error::No artifacts found to sign -- release BLOCKED"
            exit 1
          fi
          echo "=== Cosign: all $SIGNED artifacts signed successfully ==="
          ls -la SHA256SUMS.sigstore

      # -- Verification Artifacts --
      - name: Generate verification artifacts
        run: |
          # Selftest report JSON (build a minimal test binary that dumps JSON)
          echo '#include "secp256k1/selftest.hpp"
          #include <cstdio>
          int main() {
            auto r = secp256k1::fast::selftest_report(secp256k1::fast::SelftestMode::ci, 0);
            printf("%s\n", r.to_json().c_str());
            return r.all_passed ? 0 : 1;
          }' > /tmp/selftest_json_gen.cpp

          # Build against the library we already built
          if [ -f build/lib/libfastsecp256k1.a ] || [ -f build/libfastsecp256k1.a ]; then
            LIB=$(find build -name 'libfastsecp256k1.a' -print -quit 2>/dev/null || true)
            if [ -n "$LIB" ]; then
              ${CXX:-g++} -std=c++20 -O2 \
                -I src/cpu/include -I staging/include \
                /tmp/selftest_json_gen.cpp "$LIB" \
                -o /tmp/selftest_json_gen 2>/dev/null && \
              /tmp/selftest_json_gen > selftest_report.json 2>/dev/null || \
              echo '{"error":"selftest binary build failed","all_passed":null}' > selftest_report.json
            else
              echo '{"error":"library not found","all_passed":null}' > selftest_report.json
            fi
          else
            echo '{"error":"library not found","all_passed":null}' > selftest_report.json
          fi

          # Generate verification transparency report (auto-stamps version, date, counts)
          python3 ci/generate_verification_report.py \
            -o verification_report.md \
            --version "${RELEASE_VERSION#v}" || \
            cp docs/AUDIT_READINESS_REPORT_v1.md verification_report.md

          # Generate traceability matrix (Phase IV, Task 4.1.4)
          if [ -x ci/generate_traceability.sh ]; then
            echo "Generating traceability report..."
            bash ci/generate_traceability.sh 2>/dev/null || \
              echo '{"error":"traceability generation failed"}' > traceability_report.json
          fi

          echo "=== Verification artifacts ==="
          ls -la selftest_report.json verification_report.md traceability_report.json 2>/dev/null || true

      # -- SBOM generation (CycloneDX) --
      - name: Generate SBOM
        run: |
          VERSION="${RELEASE_VERSION#v}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > sbom.cdx.json <<'SBOM_HEREDOC'
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.6",
            "version": 1,
            "metadata": {
              "timestamp": "TIMESTAMP_PLACEHOLDER",
              "component": {
                "type": "library",
                "name": "UltrafastSecp256k1",
                "version": "VERSION_PLACEHOLDER",
                "purl": "pkg:github/shrec/UltrafastSecp256k1@vVERSION_PLACEHOLDER",
                "licenses": [{"license": {"id": "MIT"}}]
              }
            },
            "components": [
              {"type": "library", "name": "fastsecp256k1", "version": "VERSION_PLACEHOLDER", "scope": "required"},
              {"type": "library", "name": "ufsecp", "version": "VERSION_PLACEHOLDER", "scope": "optional"}
            ],
            "dependencies": [{"ref": "UltrafastSecp256k1", "dependsOn": []}]
          }
          SBOM_HEREDOC
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g; s/TIMESTAMP_PLACEHOLDER/${TIMESTAMP}/g" sbom.cdx.json

      # -- GPU evidence bundle (P4: release evidence) --
      - name: Collect GPU validation evidence
        run: |
          mkdir -p gpu_evidence
          # Fetch latest GPU CI artifact for this commit (if available)
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/gpu-selfhosted.yml/runs?head_sha=${{ github.sha }}&status=completed&per_page=1" \
            --jq '.workflow_runs[0].id' 2>/dev/null || echo "")
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            echo "Found GPU CI run: $RUN_ID"
            gh run download "$RUN_ID" -D gpu_evidence --repo "${{ github.repository }}" 2>/dev/null || true
          else
            echo "No GPU CI run found for ${{ github.sha }} -- generating placeholder"
            echo '{"status":"no_gpu_ci_run","commit":"${{ github.sha }}"}' > gpu_evidence/gpu_status.json
          fi
          ls -la gpu_evidence/ 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete pre-existing release (if any)
        if: github.event_name != 'workflow_dispatch'
        run: |
          gh release delete "${{ env.RELEASE_TAG }}" --yes 2>/dev/null || true
          # Brief pause to let GitHub API propagate the deletion,
          # avoiding 404 on asset update when action-gh-release
          # encounters stale asset metadata from a deleted release.
          sleep 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "UltrafastSecp256k1 ${{ env.RELEASE_TAG }}"
          body: ${{ steps.notes.outputs.NOTES }}
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-rc') || contains(env.RELEASE_TAG, '-beta') || contains(env.RELEASE_TAG, '-alpha') }}
          fail_on_unmatched_files: false
          # NOTE: dist/**/* already includes .sigstore files created by
          # the cosign step -- do NOT add dist/**/*.sigstore separately
          # or action-gh-release will hit 404 trying to PATCH duplicate
          # assets.
          files: |
            dist/**/*
            SHA256SUMS
            SHA256SUMS.sigstore
            sbom.cdx.json
            selftest_report.json
            traceability_report.json
            verification_report.md
            gpu_evidence/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord (release)
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_RELEASES }}
          TAG:     ${{ env.RELEASE_TAG }}
          REPO:    ${{ github.repository }}
          STATUS:  ${{ job.status }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "No webhook configured, skipping"; exit 0; fi
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PYTHON=$(command -v python3 || command -v python)
          JSON=$(NOW="$NOW" "$PYTHON" -c "
          import json, os
          tag    = os.environ['TAG']
          repo   = os.environ['REPO']
          status = os.environ['STATUS']
          now    = os.environ.get('NOW', '')
          color  = 3066993 if status == 'success' else 15158332
          url    = f'https://github.com/{repo}/releases/tag/{tag}'
          desc   = f'**Tag:** \`{tag}\`\n**Status:** {status}\n\n[View Release]({url})'
          payload = {'embeds': [{'title': f'UltrafastSecp256k1 {tag} Released',
            'url': url, 'color': color, 'description': desc,
            'footer': {'text': 'UltrafastSecp256k1 CI'}, 'timestamp': now}]}
          print(json.dumps(payload))
          ")
          CURL=$(command -v curl || { echo "::error::curl not found on PATH"; exit 1; })
          "$CURL" -sS -H "Content-Type: application/json" -d "$JSON" "$WEBHOOK"
