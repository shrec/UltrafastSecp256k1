# preflight.yml -- Pre-commit quality gate
# Runs preflight.py checks on every push/PR to main/dev.
# Hard-fail: --security, --abi, --freshness, validate_assurance.py
# Advisory: --coverage (may flag gaps that are acknowledged in FEATURE_ASSURANCE_LEDGER),
#           --changed (informational only, no blocking threshold)

name: Preflight

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # full history for git diff

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Build project graph
        run: python3 scripts/build_project_graph.py --rebuild

      - name: Build source graph
        run: python3 tools/source_graph_kit/source_graph.py build -i

      - name: Preflight -- Security invariants (hard-fail)
        run: python3 scripts/preflight.py --security

      - name: Preflight -- CUDA/MSVC portability (hard-fail)
        run: python3 scripts/preflight.py --cuda-msvc

      - name: Preflight -- ABI surface (hard-fail)
        run: python3 scripts/preflight.py --abi

      - name: Preflight -- Coverage gaps (advisory)
        run: python3 scripts/preflight.py --coverage || true

      - name: Preflight -- Graph freshness (hard-fail)
        run: python3 scripts/preflight.py --freshness

      - name: Preflight -- Changed files impact (advisory)
        run: python3 scripts/preflight.py --changed || true

      - name: Preflight -- Code quality gate (hard-fail on regression)
        run: python3 scripts/preflight.py --bug-scan

      - name: Python audit infrastructure self-test (hard-fail)
        run: python3 scripts/test_audit_scripts.py --quick

      - name: Assurance docs validation (hard-fail)
        run: python3 scripts/validate_assurance.py

      # -----------------------------------------------------------------------
      # CAAS gates — all four stages run here as a fast preflight guard.
      # The dedicated caas.yml workflow runs them as separate blocking jobs;
      # we include them here so a single preflight job also catches regressions.
      # -----------------------------------------------------------------------

      - name: Install build dependencies (needed by CAAS P0 harnesses)
        run: sudo apt-get install -y --no-install-recommends ninja-build g++-13

      - name: Build shared library (needed by CAAS P0 harnesses)
        run: |
          cmake -S . -B build-audit -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DBUILD_TESTING=OFF \
            -DSECP256K1_BUILD_PROTOCOL_TESTS=OFF \
            -DSECP256K1_BUILD_FUZZ_TESTS=OFF
          cmake --build build-audit --target ufsecp_shared -j $(nproc)

      - name: CAAS Stage 0 — Exploit Wiring Parity (hard-fail)
        # Enforces the Conversion Standard: every audit/test_exploit_*.cpp file
        # that exposes a *_run() entry point must be registered in
        # unified_audit_runner.cpp. Added 2026-04-17 after BUG-A1 where 16
        # on-disk PoCs bypassed the aggregated audit verdict.
        run: python3 scripts/check_exploit_wiring.py

      - name: CAAS Stage 1 — Static Analysis (hard-fail, 0 findings required)
        run: |
          python3 scripts/audit_test_quality_scanner.py --json -o caas_scanner.json
          python3 - <<'EOF'
          import json, sys
          with open("caas_scanner.json") as f:
              report = json.load(f)
          total = report.get("total_findings", 0)
          if total > 0:
              for fnd in report.get("findings", []):
                  print(f"  [{fnd['severity'].upper()}] {fnd['file']}:{fnd['line']} {fnd['label']}: {fnd['description']}")
              print(f"FAIL: {total} finding(s) — audit scanner must report 0", file=sys.stderr)
              sys.exit(1)
          print(f"PASS: 0 findings")
          EOF

      - name: CAAS Stage 2 — Audit Gate P0–P18 (hard-fail)
        run: python3 scripts/audit_gate.py --json -o caas_audit_gate.json

      - name: CAAS Stage 3 — Security Autonomy 100/100 (hard-fail)
        run: |
          python3 scripts/security_autonomy_check.py --json -o caas_autonomy.json
          python3 - <<'EOF'
          import json, sys
          with open("caas_autonomy.json") as f:
              report = json.load(f)
          score = report.get("autonomy_score", 0)
          ready = report.get("autonomy_ready", False)
          if not ready or score < 100:
              print(f"FAIL: autonomy score {score}/100 (ready={ready})", file=sys.stderr)
              sys.exit(1)
          print(f"PASS: {score}/100")
          EOF

      - name: Export assurance report (JSON)
        run: python3 scripts/export_assurance.py -o assurance_report.json

      - name: Coverage gaps summary
        run: python3 scripts/query_graph.py gaps || true

      - name: Upload assurance artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: preflight-reports
          path: |
            assurance_report.json
          retention-days: 30
