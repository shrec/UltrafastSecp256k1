# ===========================================================================
# Unified Audit Report -- CI Workflow
# ===========================================================================
#
# Builds and runs the unified_audit_runner on Linux + Windows.
# Generates audit_report.json + audit_report.txt as downloadable artifacts.
#
# Triggers:
#   - Weekly schedule (Monday 06:00 UTC)
#   - Manual dispatch (workflow_dispatch)
#   - On release tags
# ===========================================================================
name: Audit Report

on:
  workflow_dispatch:
    inputs:
      section:
        description: 'Run only this section (empty = all)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  # =========================================================================
  # Linux (GCC-13, Release)
  # =========================================================================
  linux-gcc:
    name: Audit (Linux GCC-13)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      audit_artifact_id: ${{ steps.upload_reports.outputs.artifact-id }}
    permissions:
      security-events: write
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build g++-13

      - name: Configure
        run: |
          cmake -S . -B build-audit -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DBUILD_TESTING=ON \
            -DSECP256K1_BUILD_PROTOCOL_TESTS=ON \
            -DSECP256K1_BUILD_FUZZ_TESTS=ON

      - name: Build
        run: cmake --build build-audit -j $(nproc)

      - name: Create output directory
        run: mkdir -p out/audit-output

      - name: Run unified audit runner
        run: |
          SECTION_ARG=""
          if [ -n "${{ github.event.inputs.section }}" ]; then
            SECTION_ARG="--section ${{ github.event.inputs.section }}"
          fi
          ./build-audit/audit/unified_audit_runner \
            --report-dir ./out/audit-output \
            --sarif \
            $SECTION_ARG

      - name: Run auditor-mode automation (advisory)
        # H-4 fix: always() ensures gap report is generated even when the audit
        # runner exits non-zero, so external auditors always see coverage gaps.
        if: always()
        run: |
          python3 ci/auditor_mode.py \
            --output-dir ./out/audit-output/auditor-mode

      - name: Run CAAS gate + autonomy for bundle completeness
        # Produces caas_audit_gate.json, caas_autonomy.json, caas_scanner.json so
        # the 90-day artifact bundle contains the full gate state for retrospective
        # audits (FINDING-10 fix: gate reports previously expired in 30d).
        # C-1 fix: capture each gate exit code; fail the step if any gate fails.
        # || true was silently green-lighting real gate failures.
        if: always()
        run: |
          set +e
          GATE_RC=0
          # H-5 fix: capture build_project_graph.py exit code — a stale/broken
          # graph must fail the step, not silently let gates run against bad data.
          # (Windows MSVC job already captured this; Linux parity fix.)
          python3 ci/build_project_graph.py --rebuild; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          python3 ci/check_exploit_wiring.py; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          python3 ci/audit_test_quality_scanner.py --json \
            -o out/audit-output/caas_scanner.json; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          python3 ci/audit_gate.py --json \
            -o out/audit-output/caas_audit_gate.json; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          python3 ci/security_autonomy_check.py --json \
            -o out/audit-output/caas_autonomy.json; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          set -e
          if [ "$GATE_RC" -ne 0 ]; then
            echo "::error::One or more CAAS gates failed (exit $GATE_RC) — see above for details"
            exit "$GATE_RC"
          fi

      - name: Upload audit reports
        id: upload_reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: audit-report-linux-gcc13-${{ github.run_id }}
          path: |
            out/audit-output/audit_report.json
            out/audit-output/audit_report.txt
            out/audit-output/audit_report.sarif
            out/audit-output/auditor-mode/auditor_mode_report.json
            out/audit-output/auditor-mode/auditor_mode_report.txt
            out/audit-output/caas_scanner.json
            out/audit-output/caas_audit_gate.json
            out/audit-output/caas_autonomy.json
          retention-days: 90

      - name: Validate SARIF before upload
        if: always() && github.event_name != 'pull_request'
        run: |
          python3 -c "
          import json, sys
          try:
            d = json.load(open('out/audit-output/audit_report.sarif'))
            assert 'runs' in d and isinstance(d['runs'], list), 'missing runs[]'
            print('SARIF validation OK')
          except Exception as e:
            print(f'SARIF validation FAILED: {e}', file=sys.stderr)
            sys.exit(1)
          "

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && github.event_name != 'pull_request'
        id: sarif_upload
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: out/audit-output/audit_report.sarif
          category: audit-runner

      - name: Surface SARIF upload outcome
        if: always() && github.event_name != 'pull_request'
        run: |
          if [ "${{ steps.sarif_upload.outcome }}" != "success" ]; then
            echo "::error::SARIF upload failed (outcome=${{ steps.sarif_upload.outcome }}) — Code Scanning view may be stale"
          else
            echo "::notice::SARIF upload OK"
          fi

      - name: Print summary
        if: always()
        run: |
          echo "## Audit Report (Linux GCC-13)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat out/audit-output/audit_report.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Report not generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Auditor-Mode Gap Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat out/audit-output/auditor-mode/auditor_mode_report.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Auditor-mode report not generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Linux (Clang-17, Release)
  # =========================================================================
  linux-clang:
    name: Audit (Linux Clang-17)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      audit_artifact_id: ${{ steps.upload_reports.outputs.artifact-id }}
    permissions:
      security-events: write
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build clang-17

      - name: Configure
        run: |
          cmake -S . -B build-audit -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DBUILD_TESTING=ON \
            -DSECP256K1_BUILD_PROTOCOL_TESTS=ON \
            -DSECP256K1_BUILD_FUZZ_TESTS=ON

      - name: Build
        run: cmake --build build-audit -j $(nproc)

      - name: Create output directory
        run: mkdir -p out/audit-output

      - name: Run unified audit runner
        run: |
          SECTION_ARG=""
          if [ -n "${{ github.event.inputs.section }}" ]; then
            SECTION_ARG="--section ${{ github.event.inputs.section }}"
          fi
          ./build-audit/audit/unified_audit_runner \
            --report-dir ./out/audit-output \
            --sarif \
            $SECTION_ARG

      - name: Run auditor-mode automation (advisory)
        # H-4 fix: always() ensures gap report is generated even when the audit
        # runner exits non-zero, so external auditors always see coverage gaps.
        if: always()
        run: |
          python3 ci/auditor_mode.py \
            --output-dir ./out/audit-output/auditor-mode

      - name: Run CAAS gate + autonomy for bundle completeness (Clang-17)
        # OBS-3 fix: linux-gcc produces CAAS gate reports for the 90-day artifact
        # but linux-clang did not. Now both jobs produce the same gate report set
        # so cross-compiler audit artifacts are symmetric and comparable.
        if: always()
        run: |
          set +e
          GATE_RC=0
          # H-5 fix: capture build_project_graph.py exit code (parity with Windows MSVC).
          python3 ci/build_project_graph.py --rebuild; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          python3 ci/check_exploit_wiring.py; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          python3 ci/audit_test_quality_scanner.py --json \
            -o out/audit-output/caas_scanner.json; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          python3 ci/audit_gate.py --json \
            -o out/audit-output/caas_audit_gate.json; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          python3 ci/security_autonomy_check.py --json \
            -o out/audit-output/caas_autonomy.json; rc=$?; [ $rc -ne 0 ] && GATE_RC=$rc
          set -e
          if [ "$GATE_RC" -ne 0 ]; then
            echo "::error::One or more CAAS gates failed (Clang-17, exit $GATE_RC)"
            exit "$GATE_RC"
          fi

      - name: Upload audit reports
        id: upload_reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: audit-report-linux-clang17-${{ github.run_id }}
          path: |
            out/audit-output/audit_report.json
            out/audit-output/audit_report.txt
            out/audit-output/audit_report.sarif
            out/audit-output/auditor-mode/auditor_mode_report.json
            out/audit-output/auditor-mode/auditor_mode_report.txt
            out/audit-output/caas_scanner.json
            out/audit-output/caas_audit_gate.json
            out/audit-output/caas_autonomy.json
          retention-days: 90

      - name: Validate SARIF before upload
        if: always() && github.event_name != 'pull_request'
        run: |
          python3 -c "
          import json, sys
          try:
            d = json.load(open('out/audit-output/audit_report.sarif'))
            assert 'runs' in d and isinstance(d['runs'], list), 'missing runs[]'
            print('SARIF validation OK')
          except Exception as e:
            print(f'SARIF validation FAILED: {e}', file=sys.stderr)
            sys.exit(1)
          "

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && github.event_name != 'pull_request'
        id: sarif_upload
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: out/audit-output/audit_report.sarif
          category: audit-runner-clang

      - name: Surface SARIF upload outcome
        if: always() && github.event_name != 'pull_request'
        run: |
          if [ "${{ steps.sarif_upload.outcome }}" != "success" ]; then
            echo "::error::SARIF upload failed (outcome=${{ steps.sarif_upload.outcome }}) — Code Scanning view may be stale"
          else
            echo "::notice::SARIF upload OK"
          fi

      - name: Print summary
        if: always()
        run: |
          echo "## Audit Report (Linux Clang-17)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat out/audit-output/audit_report.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Report not generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Auditor-Mode Gap Report (Clang-17)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat out/audit-output/auditor-mode/auditor_mode_report.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Auditor-mode report not generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Windows (MSVC, Release)
  # =========================================================================
  windows-msvc:
    name: Audit (Windows MSVC)
    runs-on: windows-latest
    timeout-minutes: 60
    outputs:
      audit_artifact_id: ${{ steps.upload_reports.outputs.artifact-id }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure
        run: |
          cmake -S . -B build-audit -G "Visual Studio 17 2022" -A x64 `
            -DBUILD_TESTING=ON `
            -DSECP256K1_BUILD_PROTOCOL_TESTS=ON `
            -DSECP256K1_BUILD_FUZZ_TESTS=ON

      - name: Build
        run: cmake --build build-audit --config Release -j

      - name: Create output directory
        run: New-Item -ItemType Directory -Force -Path out/audit-output | Out-Null

      - name: Run unified audit runner
        shell: pwsh
        run: |
          $section = "${{ github.event.inputs.section }}"
          $args = @("--report-dir", ".\out/audit-output", "--sarif")
          if ($section) { $args += @("--section", $section) }
          & .\build-audit\audit\Release\unified_audit_runner.exe @args
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Audit runner failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Run auditor-mode automation (advisory)
        # H-4 fix: always() ensures gap report is generated even when the audit
        # runner exits non-zero, so external auditors always see coverage gaps.
        if: always()
        shell: pwsh
        run: |
          python3 ci/auditor_mode.py `
            --output-dir out/audit-output/auditor-mode

      - name: Run CAAS gate + autonomy for bundle completeness (Windows MSVC)
        # B-2 fix: mirror the Linux jobs so Windows audit artifacts contain the
        # same CAAS gate reports (caas_scanner.json, caas_audit_gate.json,
        # caas_autonomy.json). Required for symmetric cross-platform audit bundles.
        if: always()
        shell: pwsh
        run: |
          $GATE_RC = 0
          # F-02 fix: capture build_project_graph.py exit code — a stale/broken
          # graph must fail the step, not silently let gates run against bad data.
          python3 ci/build_project_graph.py --rebuild; if ($LASTEXITCODE -ne 0) { $GATE_RC = $LASTEXITCODE }
          python3 ci/check_exploit_wiring.py; if ($LASTEXITCODE -ne 0) { $GATE_RC = $LASTEXITCODE }
          python3 ci/audit_test_quality_scanner.py --json -o out/audit-output/caas_scanner.json
          if ($LASTEXITCODE -ne 0) { $GATE_RC = $LASTEXITCODE }
          python3 ci/audit_gate.py --json -o out/audit-output/caas_audit_gate.json
          if ($LASTEXITCODE -ne 0) { $GATE_RC = $LASTEXITCODE }
          python3 ci/security_autonomy_check.py --json -o out/audit-output/caas_autonomy.json
          if ($LASTEXITCODE -ne 0) { $GATE_RC = $LASTEXITCODE }
          if ($GATE_RC -ne 0) {
            Write-Output "::error::One or more CAAS gates failed (Windows MSVC, exit $GATE_RC)"
            exit $GATE_RC
          }

      - name: Upload audit reports
        id: upload_reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: audit-report-windows-msvc-${{ github.run_id }}
          path: |
            out/audit-output/audit_report.json
            out/audit-output/audit_report.txt
            out/audit-output/audit_report.sarif
            out/audit-output/auditor-mode/auditor_mode_report.json
            out/audit-output/auditor-mode/auditor_mode_report.txt
            out/audit-output/caas_scanner.json
            out/audit-output/caas_audit_gate.json
            out/audit-output/caas_autonomy.json
          retention-days: 90

      - name: Upload SARIF to GitHub Code Scanning
        # continue-on-error mirrors the Linux jobs — quota failures shouldn't
        # block the report job. Surface outcome in the next step.
        if: always() && github.event_name != 'pull_request'
        id: sarif_upload
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: out/audit-output/audit_report.sarif
          category: audit-runner-msvc
        continue-on-error: true

      - name: Surface SARIF upload outcome
        if: always() && github.event_name != 'pull_request'
        shell: pwsh
        run: |
          if ("${{ steps.sarif_upload.outcome }}" -ne "success") {
            Write-Output "::error::SARIF upload failed (outcome=${{ steps.sarif_upload.outcome }}) — Code Scanning view may be stale"
          } else {
            Write-Output "::notice::SARIF upload OK"
          }

      - name: Print summary
        if: always()
        shell: pwsh
        run: |
          "## Audit Report (Windows MSVC)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          '```' | Out-File -Append $env:GITHUB_STEP_SUMMARY
          if (Test-Path out/audit-output/audit_report.txt) {
            Get-Content out/audit-output/audit_report.txt | Out-File -Append $env:GITHUB_STEP_SUMMARY
          } else {
            "Report not generated" | Out-File -Append $env:GITHUB_STEP_SUMMARY
          }
          '```' | Out-File -Append $env:GITHUB_STEP_SUMMARY


  # =========================================================================
  # Publish audit artifacts to gh-pages (public logs)
  # =========================================================================
  publish-artifacts:
    name: Publish Audit Artifacts (gh-pages)
    needs: verdict
    runs-on: ubuntu-24.04
    if: always()
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Prepare artifact workspace
        run: mkdir -p audit-artifacts

      - name: Download Linux GCC artifact
        if: needs.verdict.outputs.linux_gcc_artifact_id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.verdict.outputs.linux_gcc_artifact_id }}
          path: audit-artifacts/audit-report-linux-gcc13

      - name: Download Linux Clang artifact
        if: needs.verdict.outputs.linux_clang_artifact_id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.verdict.outputs.linux_clang_artifact_id }}
          path: audit-artifacts/audit-report-linux-clang17

      - name: Download Windows MSVC artifact
        if: needs.verdict.outputs.windows_msvc_artifact_id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.verdict.outputs.windows_msvc_artifact_id }}
          path: audit-artifacts/audit-report-windows-msvc

      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Stage artifacts
        run: |
          set -u
          mapfile -t ARTIFACT_DIRS < <(find audit-artifacts -mindepth 1 -maxdepth 1 -type d -name 'audit-report-*' | sort)
          if [ ${#ARTIFACT_DIRS[@]} -eq 0 ]; then
            echo "::notice::No audit artifacts were downloaded; skipping gh-pages publish"
            exit 0
          fi

          DATE=$(date -u +%Y%m%d)
          RUN_ID=${GITHUB_RUN_ID}
          DEST="gh-pages/audit/${DATE}/${RUN_ID}"
          mkdir -p "$DEST"
          cp -r "${ARTIFACT_DIRS[@]}" "$DEST"/
          echo "${DATE}/${RUN_ID}" > "gh-pages/audit/latest.txt"

      - name: Commit and push
        run: |
          cd gh-pages
          git add audit
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git commit -m "Publish audit artifacts (${GITHUB_RUN_ID})"
          git push
  # =========================================================================
  # Aggregate verdict
  # =========================================================================
  verdict:
    name: Audit Verdict
    needs: [linux-gcc, linux-clang, windows-msvc]
    runs-on: ubuntu-latest
    if: always()
    outputs:
      linux_gcc_artifact_id: ${{ needs.linux-gcc.outputs.audit_artifact_id }}
      linux_clang_artifact_id: ${{ needs.linux-clang.outputs.audit_artifact_id }}
      windows_msvc_artifact_id: ${{ needs.windows-msvc.outputs.audit_artifact_id }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - name: Prepare artifact workspace
        run: mkdir -p audit-artifacts

      - name: Download Linux GCC report
        if: needs.linux-gcc.outputs.audit_artifact_id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.linux-gcc.outputs.audit_artifact_id }}
          path: audit-artifacts/audit-report-linux-gcc13

      - name: Download Linux Clang report
        if: needs.linux-clang.outputs.audit_artifact_id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.linux-clang.outputs.audit_artifact_id }}
          path: audit-artifacts/audit-report-linux-clang17

      - name: Download Windows MSVC report
        if: needs.windows-msvc.outputs.audit_artifact_id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.windows-msvc.outputs.audit_artifact_id }}
          path: audit-artifacts/audit-report-windows-msvc

      - name: Aggregate verdict
        env:
          LINUX_GCC_RESULT: ${{ needs.linux-gcc.result }}
          LINUX_CLANG_RESULT: ${{ needs.linux-clang.result }}
          WINDOWS_MSVC_RESULT: ${{ needs.windows-msvc.result }}
        run: |
          set -u
          python3 ci/audit_verdict.py \
            --artifact-root audit-artifacts \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --required-platform linux-gcc13 \
            --platform "audit-report-linux-gcc13=$LINUX_GCC_RESULT" \
            --platform "audit-report-linux-clang17=$LINUX_CLANG_RESULT" \
            --platform "audit-report-windows-msvc=$WINDOWS_MSVC_RESULT"

