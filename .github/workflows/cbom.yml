# ============================================================================
# CBOM -- Cryptographic Bill of Materials (CycloneDX)
# ============================================================================
# EU Cyber Resilience Act + NIST SSDF requirement for enumerating all
# cryptographic primitives, algorithms, key sizes, and their usage.
# Generates a CycloneDX CBOM document for each release.
# ============================================================================
name: CBOM (Cryptographic Bill of Materials)

on:
  push:
    branches: [main, dev]
    paths:
      - 'libs/UltrafastSecp256k1/cpu/src/**'
      - 'libs/UltrafastSecp256k1/include/**'
      - 'libs/UltrafastSecp256k1/gpu/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cbom:
    name: Generate CBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3 python3-pip
          pip3 install --require-hashes -r .github/requirements/cbom.txt

      - name: Generate CBOM
        run: |
          cd libs/UltrafastSecp256k1

          python3 -c "
          import json, datetime, uuid

          cbom = {
              'bomFormat': 'CycloneDX',
              'specVersion': '1.6',
              'serialNumber': f'urn:uuid:{uuid.uuid4()}',
              'version': 1,
              'metadata': {
                  'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
                  'component': {
                      'type': 'library',
                      'name': 'UltrafastSecp256k1',
                      'version': '3.3.x',
                      'description': 'High-performance secp256k1 elliptic curve library'
                  },
                  'tools': [{'name': 'cbom-generator', 'version': '1.0'}]
              },
              'components': [],
              'cryptoProperties': []
          }

          # Enumerate all cryptographic algorithms used
          algorithms = [
              {
                  'name': 'secp256k1-ECDSA',
                  'type': 'signature',
                  'curve': 'secp256k1',
                  'keySize': 256,
                  'standards': ['SEC 2', 'ANSI X9.62'],
                  'implementation': 'src/cpu/src/ecdsa.cpp',
                  'constantTime': True
              },
              {
                  'name': 'secp256k1-Schnorr',
                  'type': 'signature',
                  'curve': 'secp256k1',
                  'keySize': 256,
                  'standards': ['BIP-340'],
                  'implementation': 'src/cpu/src/ct_sign.cpp',
                  'constantTime': True
              },
              {
                  'name': 'secp256k1-ECDH',
                  'type': 'key-exchange',
                  'curve': 'secp256k1',
                  'keySize': 256,
                  'standards': ['ANSI X9.63'],
                  'implementation': 'src/cpu/src/ct_ecdh.cpp',
                  'constantTime': True
              },
              {
                  'name': 'SHA-256',
                  'type': 'hash',
                  'outputSize': 256,
                  'standards': ['FIPS 180-4', 'RFC 6234'],
                  'implementation': 'src/cpu/src/sha256.cpp',
                  'constantTime': True
              },
              {
                  'name': 'SHA-512',
                  'type': 'hash',
                  'outputSize': 512,
                  'standards': ['FIPS 180-4'],
                  'implementation': 'src/cpu/src/sha512.cpp',
                  'constantTime': True
              },
              {
                  'name': 'RIPEMD-160',
                  'type': 'hash',
                  'outputSize': 160,
                  'standards': ['ISO/IEC 10118-3'],
                  'implementation': 'src/cpu/src/ripemd160.cpp',
                  'constantTime': True
              },
              {
                  'name': 'Keccak-256',
                  'type': 'hash',
                  'outputSize': 256,
                  'standards': ['FIPS 202'],
                  'implementation': 'src/cpu/src/keccak256.cpp',
                  'constantTime': True
              },
              {
                  'name': 'HMAC-SHA512',
                  'type': 'mac',
                  'outputSize': 512,
                  'standards': ['RFC 2104'],
                  'implementation': 'src/cpu/src/hmac.cpp',
                  'constantTime': True
              },
              {
                  'name': 'RFC-6979',
                  'type': 'nonce-generation',
                  'standards': ['RFC 6979'],
                  'implementation': 'src/cpu/src/rfc6979.cpp',
                  'constantTime': True
              },
              {
                  'name': 'ChaCha20-Poly1305',
                  'type': 'aead',
                  'keySize': 256,
                  'standards': ['RFC 8439'],
                  'implementation': 'src/cpu/src/chacha20_poly1305.cpp',
                  'constantTime': True
              },
              {
                  'name': 'HKDF-SHA256',
                  'type': 'kdf',
                  'standards': ['RFC 5869'],
                  'implementation': 'src/cpu/src/hkdf.cpp',
                  'constantTime': True
              },
              {
                  'name': 'PBKDF2-HMAC-SHA512',
                  'type': 'kdf',
                  'standards': ['RFC 2898', 'BIP-39'],
                  'implementation': 'src/cpu/src/pbkdf2.cpp',
                  'constantTime': True
              },
              {
                  'name': 'MuSig2',
                  'type': 'multi-signature',
                  'curve': 'secp256k1',
                  'standards': ['BIP-327'],
                  'implementation': 'src/cpu/src/musig2.cpp',
                  'constantTime': False,
                  'ctGap': 'Known Gap — MuSig2 CT audit pending'
              },
              {
                  'name': 'FROST',
                  'type': 'threshold-signature',
                  'curve': 'secp256k1',
                  'standards': ['RFC 9591'],
                  'implementation': 'src/cpu/src/frost.cpp',
                  'constantTime': False,
                  'ctGap': 'Known Gap — FROST CT audit pending'
              },
              {
                  'name': 'BIP-352 Silent Payments',
                  'type': 'payment-protocol',
                  'curve': 'secp256k1',
                  'standards': ['BIP-352'],
                  'implementation': 'kernels/secp256k1_bip352.cl',
                  'constantTime': True
              },
              {
                  'name': 'ElligatorSwift (BIP-324)',
                  'type': 'encoding',
                  'curve': 'secp256k1',
                  'standards': ['BIP-324'],
                  'implementation': 'src/cpu/src/ellswift.cpp',
                  'constantTime': True
              },
              {
                  'name': 'Pedersen Commitment',
                  'type': 'commitment',
                  'curve': 'secp256k1',
                  'implementation': 'src/cpu/src/pedersen.cpp',
                  'constantTime': True
              },
              {
                  'name': 'Bulletproof Range Proof',
                  'type': 'zero-knowledge-proof',
                  'curve': 'secp256k1',
                  'implementation': 'src/cpu/src/bulletproof.cpp',
                  'constantTime': True
              }
          ]

          for alg in algorithms:
              comp = {
                  'type': 'cryptographic-asset',
                  'name': alg['name'],
                  'properties': []
              }
              for key, val in alg.items():
                  if key != 'name':
                      comp['properties'].append({'name': key, 'value': str(val)})
              cbom['components'].append(comp)

          with open('cbom.json', 'w') as f:
              json.dump(cbom, f, indent=2)

          print(f'CBOM generated with {len(algorithms)} cryptographic components')
          print('Output: cbom.json')
          "

      - name: Validate CBOM
        run: |
          cd libs/UltrafastSecp256k1
          python3 -c "
          import json
          with open('cbom.json') as f:
              cbom = json.load(f)
          assert cbom['bomFormat'] == 'CycloneDX'
          assert cbom['specVersion'] == '1.6'
          assert len(cbom['components']) > 0
          print(f'CBOM valid: {len(cbom[\"components\"])} components')
          # Check all components have name and type
          for c in cbom['components']:
              assert 'name' in c, f'Component missing name: {c}'
              assert 'type' in c, f'Component missing type: {c}'
          print('All components have required fields')

          # Report CT gaps
          gaps = [c for c in cbom['components']
                  if any(p['name'] == 'constantTime' and p['value'] == 'False'
                         for p in c.get('properties', []))]
          if gaps:
              print(f'\\nWARNING: {len(gaps)} components lack CT guarantee:')
              for g in gaps:
                  print(f'  - {g[\"name\"]}')
          "

      - name: Upload CBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cbom
          path: libs/UltrafastSecp256k1/cbom.json
          retention-days: 90
