name: CodeQL

# Runs on push to main/dev, PRs, weekly schedule, and manual dispatch.
# CodeQL is the GitHub-native static analysis / SAST tool.
on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'include/**'
      - 'audit/**'
      - 'ci/**'
      - 'compat/**'
      - 'CMakeLists.txt'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'workingdocs/**'
  schedule:
    - cron: '0 12 * * 1'   # every Monday at 12:00 UTC
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (C/C++)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install compiler and tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 lld-17 ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a379b61f35f85b # v4.2.3
        with:
          path: ~/.cache/ccache
          key: ccache-codeql-${{ hashFiles('src/cpu/src/**', 'src/cpu/include/**', 'include/**') }}
          restore-keys: |
            ccache-codeql-

      - name: Configure ccache
        run: |
          CCACHE=$(command -v ccache || true)
          if [ -n "$CCACHE" ]; then
            "$CCACHE" --set-config=max_size=200M
            "$CCACHE" --set-config=compression=true
            "$CCACHE" -z
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Build for analysis
        env:
          CC:  clang-17
          CXX: clang++-17
        run: |
          CCACHE=$(command -v ccache || true)
          LAUNCHER_ARGS=()
          if [ -n "$CCACHE" ]; then
            LAUNCHER_ARGS=(
              "-DCMAKE_C_COMPILER_LAUNCHER=${CCACHE}"
              "-DCMAKE_CXX_COMPILER_LAUNCHER=${CCACHE}"
            )
          fi
          JOBS=$(nproc 2>/dev/null || echo 4)
          cmake -S . -B build/codeql -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            "${LAUNCHER_ARGS[@]}" \
            -DSECP256K1_MARCH=x86-64-v3 \
            -DSECP256K1_BUILD_TESTS=OFF \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_USE_ASM=OFF
          cmake --build build/codeql -j"$JOBS"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:c-cpp"
