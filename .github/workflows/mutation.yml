name: Mutation Testing

on:
  # Local-first policy: heavy mutation testing is not part of push/PR CI.
  # Use local pre-release execution as the strict default.
  workflow_dispatch:
    inputs:
      targets:
        description: 'Manual fallback only. Prefer local mutation runs before release.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Mutation Testing (Mull)
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 lld-17 ninja-build wget

      - name: Install Mull
        run: |
          # Mull mutator -- LLVM-based mutation testing for C/C++
          # https://github.com/mull-project/mull
          wget -qO- https://github.com/mull-project/mull/releases/latest/download/Mull-17-Ubuntu-22.04.deb \
            -O /tmp/mull.deb 2>/dev/null || {
            # Fallback: try building a minimal mutation runner
            echo "::warning::Mull .deb not available, trying pip package"
            pip3 install --require-hashes --no-deps -r .github/requirements/mutation.txt 2>/dev/null || true
          }
          if [ -f /tmp/mull.deb ]; then
            sudo dpkg -i /tmp/mull.deb 2>/dev/null || sudo apt-get install -f -y
          fi

      - name: Configure (instrumented build for mutation)
        run: |
          export CC=clang-17 CXX=clang++-17
          cmake -S . -B build-mut -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_C_COMPILER=clang-17 \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_BUILD_CABI=OFF \
            -DSECP256K1_BUILD_JAVA=OFF \
            -DSECP256K1_BUILD_ETHEREUM=OFF \
            -DSECP256K1_BUILD_METAL=OFF \
            -DSECP256K1_USE_ASM=OFF \
            -DSECP256K1_USE_LTO=OFF \
            -DUFSECP_REFRESH_SOURCE_GRAPH=OFF

      - name: Build core mutation targets
        run: |
          cmake --build build-mut -j"$(nproc)" \
            --target run_selftest test_bip340_vectors_standalone

      - name: Run mutation testing
        id: mutate
        run: |
          # Mutation scope: core cryptographic sources
          # These are the files where a missed mutation = potential vulnerability
          CORE_SOURCES=(
            "src/cpu/src/field.cpp"
            "src/cpu/src/scalar.cpp"
            "src/cpu/src/point.cpp"
            "src/cpu/src/ecdsa.cpp"
            "src/cpu/src/schnorr.cpp"
            "src/cpu/src/ct_field.cpp"
            "src/cpu/src/ct_scalar.cpp"
            "src/cpu/src/ct_point.cpp"
            "src/cpu/src/ct_sign.cpp"
          )

          echo "=== Mutation Testing: UltrafastSecp256k1 ==="
          echo "Scope: ${#CORE_SOURCES[@]} core source files"
          echo ""

          # Strategy: compile-time mutation via Mull LLVM plugin
          if command -v mull-runner-17 &>/dev/null; then
            echo "Using Mull LLVM mutation engine"

            # Generate mull config
            cat > mull.yml <<'EOF'
          mutators:
            - cxx_add_to_sub        # + -> -
            - cxx_sub_to_add        # - -> +
            - cxx_mul_to_div        # * -> /
            - cxx_div_to_mul        # / -> *
            - cxx_eq_to_ne          # == -> !=
            - cxx_ne_to_eq          # != -> ==
            - cxx_gt_to_lt          # > -> <
            - cxx_lt_to_gt          # < -> >
            - cxx_ge_to_lt          # >= -> <
            - cxx_le_to_gt          # <= -> >
            - cxx_and_to_or         # && -> ||
            - cxx_or_to_and         # || -> &&
            - cxx_assign_const      # x = expr -> x = 0
            - cxx_init_const        # int x = expr -> int x = 0
            - cxx_remove_void_call  # remove void function calls
          timeout: 30
          reporters:
            - Elements
            - SQLite
          EOF

            # Re-build with Mull plugin
            cmake -S . -B build-mull -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_CXX_COMPILER=clang++-17 \
              -DCMAKE_CXX_FLAGS="-fpass-plugin=/usr/lib/mull-ir-frontend-17 -g -O0" \
              -DSECP256K1_BUILD_TESTS=ON \
              -DSECP256K1_BUILD_BENCH=OFF \
              -DSECP256K1_BUILD_EXAMPLES=OFF \
              -DSECP256K1_BUILD_CABI=OFF \
              -DSECP256K1_BUILD_JAVA=OFF \
              -DSECP256K1_BUILD_ETHEREUM=OFF \
              -DSECP256K1_BUILD_METAL=OFF \
              -DSECP256K1_USE_ASM=OFF \
              -DSECP256K1_USE_LTO=OFF \
              -DUFSECP_REFRESH_SOURCE_GRAPH=OFF

            cmake --build build-mull -j"$(nproc)" --target run_selftest 2>&1 || true

            # Run Mull against selftest
            mull-runner-17 \
              --reporters=Elements \
              --report-dir=mutation-report \
              build-mull/src/cpu/run_selftest 2>&1 | tee mutation-log.txt || true

          else
            echo "::warning::Mull not available, running manual mutation testing"
            echo ""

            # Fallback: manual compile-time mutation testing
            # For each core source, inject mutations and check if tests catch them
            TOTAL=0
            KILLED=0
            SURVIVED=0
            ERRORS=0
            MUTATION_MAX_FILES="${MUTATION_MAX_FILES:-4}"
            MUTATED_FILES=0

            run_core_mutation_checks() {
              cmake --build build-mut -j"$(nproc)" \
                --target run_selftest test_bip340_vectors_standalone >/dev/null 2>&1 || return 1
              ./build-mut/cpu/run_selftest smoke >/dev/null 2>&1 || return 1
              ./build-mut/cpu/test_bip340_vectors_standalone >/dev/null 2>&1 || return 1
              return 0
            }

            for src in "${CORE_SOURCES[@]}"; do
              if [ "$MUTATED_FILES" -ge "$MUTATION_MAX_FILES" ]; then
                echo "[INFO] Reached MUTATION_MAX_FILES=$MUTATION_MAX_FILES, stopping fallback sweep"
                break
              fi

              if [ ! -f "$src" ]; then
                echo "[SKIP] $src (not found)"
                continue
              fi

              MUTATED_FILES=$((MUTATED_FILES + 1))
              echo "--- Mutating: $src ---"

              # Backup
              cp "$src" "$src.bak"

              # Mutation 1: flip + to - in arithmetic
              if grep -q ' + ' "$src"; then
                # Apply first arithmetic mutation
                sed -i '0,/ + /{s/ + / - /}' "$src"
                TOTAL=$((TOTAL + 1))

                if run_core_mutation_checks; then
                  SURVIVED=$((SURVIVED + 1))
                  echo "  [!] SURVIVED: +->- mutation in $src"
                else
                  KILLED=$((KILLED + 1))
                  echo "  [OK] KILLED: +->- mutation in $src"
                fi

                # Restore
                cp "$src.bak" "$src"
              fi

              # Mutation 2: flip == to !=
              if grep -q ' == ' "$src"; then
                sed -i '0,/ == /{s/ == / != /}' "$src"
                TOTAL=$((TOTAL + 1))

                if run_core_mutation_checks; then
                  SURVIVED=$((SURVIVED + 1))
                  echo "  [!] SURVIVED: ==->!= mutation in $src"
                else
                  KILLED=$((KILLED + 1))
                  echo "  [OK] KILLED: ==->!= mutation in $src"
                fi

                cp "$src.bak" "$src"
              fi

              # Mutation 3: replace return value with 0
              if grep -qE 'return [^;]+;' "$src"; then
                sed -i '0,/return [^;]\+;/{s/return [^;]\+;/return {};/}' "$src"
                TOTAL=$((TOTAL + 1))

                if run_core_mutation_checks; then
                  SURVIVED=$((SURVIVED + 1))
                  echo "  [!] SURVIVED: return->return{} mutation in $src"
                else
                  KILLED=$((KILLED + 1))
                  echo "  [OK] KILLED: return->return{} mutation in $src"
                fi

                cp "$src.bak" "$src"
              fi

              # Cleanup
              rm -f "$src.bak"
              echo ""
            done

            # Summary
            SCORE=0
            if [ "$TOTAL" -gt 0 ]; then
              SCORE=$((KILLED * 100 / TOTAL))
            fi

            echo "=============================================="
            echo "  MUTATION TESTING SUMMARY"
            echo "=============================================="
            echo "  Total mutations:  $TOTAL"
            echo "  Files processed:  $MUTATED_FILES (max $MUTATION_MAX_FILES)"
            echo "  Killed:           $KILLED"
            echo "  Survived:         $SURVIVED"
            echo "  Mutation score:   ${SCORE}%"
            echo "=============================================="

            # Write JSON report
            cat > mutation-report.json <<ENDJSON
          {
            "tool": "manual-mutation",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "scope": "${CORE_SOURCES[*]}",
            "total_mutations": $TOTAL,
            "killed": $KILLED,
            "survived": $SURVIVED,
            "score_percent": $SCORE
          }
          ENDJSON

            # Fail if mutation score drops below 70%
            if [ "$SCORE" -lt 70 ] && [ "$TOTAL" -gt 0 ]; then
              echo "::error::Mutation score ${SCORE}% is below 70% threshold"
              exit 1
            fi
          fi

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: |
            mutation-report.json
            mutation-report/
            mutation-log.txt
          retention-days: 90
          if-no-files-found: ignore
