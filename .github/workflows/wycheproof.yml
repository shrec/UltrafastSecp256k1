# wycheproof.yml -- Dedicated Wycheproof test vector CI workflow
#
# Runs all test_wycheproof_* targets independently and uploads a
# named JSON report artifact for audit trail visibility.
#
# Tests covered:
#   wycheproof_ecdsa                -- secp256k1 ECDSA + DER (89 groups)
#   wycheproof_ecdh                 -- secp256k1 ECDH (36 groups)
#   wycheproof_ecdsa_bitcoin        -- Bitcoin ECDSA quirk vectors (27 groups)
#   wycheproof_ecdsa_sha256         -- ECDSA/SHA-256 secp256k1 (65 groups)
#   wycheproof_ecdsa_extended       -- Extended edge-case DER vectors (1084 groups)
#   wycheproof_ecdsa_sha256_p1363   -- ECDSA P1363 format (32 groups)
#   wycheproof_ecdsa_sha512         -- ECDSA/SHA-512 (174 groups)
#   wycheproof_ecdsa_sha512_p1363   -- ECDSA/SHA-512 P1363 format (86 groups)
#   wycheproof_hmac_sha256          -- HMAC-SHA-256 (544 groups)
#   wycheproof_hkdf_sha256          -- HKDF-SHA-256 vectors
#   wycheproof_chacha20_poly1305    -- ChaCha20-Poly1305 AEAD

name: Wycheproof

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Weekly Wednesday 05:00 UTC
    - cron: '0 5 * * 3'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wycheproof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wycheproof:
    name: Wycheproof test vectors
    runs-on: ubuntu-24.04

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++-13 ninja-build ccache python3

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-wycheproof-${{ hashFiles('cpu/src/**', 'cpu/include/**', 'audit/**/*.cpp', 'audit/**/*.h') }}
          restore-keys: |
            ccache-wycheproof-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=400M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure (Release, no sanitizers)
        run: |
          cmake -S . -B build-wyche \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_BUILD_CUDA=OFF \
            -DSECP256K1_BUILD_OPENCL=OFF \
            -DBUILD_AUDIT=ON \
            -DUFSECP_BITCOIN_STRICT=OFF

      - name: Build wycheproof targets
        run: |
          cmake --build build-wyche --target \
            test_wycheproof_ecdsa \
            test_wycheproof_ecdh \
            test_wycheproof_ecdsa_bitcoin_standalone \
            test_wycheproof_ecdsa_sha256_standalone \
            test_wycheproof_ecdsa_extended_standalone \
            test_wycheproof_ecdsa_sha256_p1363_standalone \
            test_wycheproof_ecdsa_sha512_standalone \
            test_wycheproof_ecdsa_sha512_p1363_standalone \
            test_wycheproof_hmac_sha256_standalone \
            test_wycheproof_hkdf_sha256_standalone \
            test_wycheproof_chacha20_poly1305_standalone \
            -- -j"$(nproc)"

      - name: Run wycheproof tests (CTest)
        id: ctest
        run: |
          ctest --test-dir build-wyche --output-on-failure -j"$(nproc)" \
            -R "^wycheproof_" --timeout 600 \
            --output-junit wycheproof-junit.xml 2>&1 | tee wycheproof-output.txt
          echo "ctest_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Generate wycheproof JSON report
        if: always()
        run: |
          python3 - <<'EOF'
          import json, re, os, sys
          from datetime import datetime, timezone

          output = ""
          if os.path.exists("wycheproof-output.txt"):
              with open("wycheproof-output.txt") as f:
                  output = f.read()

          # Parse summary line: "X tests passed, Y tests failed"
          passed = failed = 0
          m = re.search(r'(\d+) tests? passed', output)
          if m:
              passed = int(m.group(1))
          m = re.search(r'(\d+) tests? failed', output)
          if m:
              failed = int(m.group(1))

          # Parse individual test results
          tests = []
          for m in re.finditer(r'(PASSED|FAILED)\s+(wycheproof_\S+)', output):
              tests.append({"name": m.group(2), "status": m.group(1)})

          report = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "workflow": "wycheproof.yml",
              "commit": os.environ.get("GITHUB_SHA", "unknown"),
              "ref": os.environ.get("GITHUB_REF", "unknown"),
              "summary": {
                  "passed": passed,
                  "failed": failed,
                  "total": passed + failed,
              },
              "tests": tests,
              "raw_output_lines": len(output.splitlines()),
          }

          with open("wycheproof-report.json", "w") as f:
              json.dump(report, f, indent=2)

          print(f"Wycheproof report: {passed} passed, {failed} failed")
          if failed > 0:
              print(f"FAIL: {failed} wycheproof test(s) failed", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Upload wycheproof report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wycheproof-report
          path: |
            wycheproof-report.json
            wycheproof-junit.xml
            wycheproof-output.txt
          retention-days: 90
