name: Gate / PR-Push

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'workingdocs/**'
      - 'LICENSE*'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
      - '.github/copilot-instructions.md'
      - '.github/agents/**'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - 'workingdocs/**'
      - 'LICENSE*'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
      - '.github/copilot-instructions.md'
      - '.github/agents/**'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-impact:
    name: Block 0 / Detect Impact
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      gate: ${{ steps.detect.outputs.gate }}
      profiles: ${{ steps.detect.outputs.profiles }}
      reason: ${{ steps.detect.outputs.reason }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
      run_core: ${{ steps.detect.outputs.run_core }}
      run_caas: ${{ steps.detect.outputs.run_caas }}
      run_bindings: ${{ steps.detect.outputs.run_bindings }}
      run_wasm: ${{ steps.detect.outputs.run_wasm }}
      run_gpu: ${{ steps.detect.outputs.run_gpu }}
      run_compat: ${{ steps.detect.outputs.run_compat }}
      run_deep: ${{ steps.detect.outputs.run_deep }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed profiles
        id: detect
        shell: bash
        run: |
          set +e
          BASE_REF="origin/${{ github.event.pull_request.base.ref || 'dev' }}"
          BEFORE_SHA="${{ github.event.before }}"
          python3 ci/ci_gate_detect.py \
            --base "$BASE_REF" \
            ${BEFORE_SHA:+--before-sha "$BEFORE_SHA"} \
            --github-output "$GITHUB_OUTPUT" \
            > ci-impact.json
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            exit "$rc"
          fi
          # M-2 fix: if ci_gate_detect.py crashed (exit 1 = Python exception OR
          # "changes detected"), verify that the expected output keys were actually
          # written to GITHUB_OUTPUT. A crash producing partial output can leave
          # run_caas=false, silently skipping security gates on security-critical PRs.
          for key in gate run_caas; do
            if ! grep -q "^${key}=" "$GITHUB_OUTPUT" 2>/dev/null; then
              echo "::error::ci_gate_detect.py did not write '${key}' to GITHUB_OUTPUT" \
                   "(exit rc=${rc}); impact detection failed — cannot safely skip gates"
              exit 2
            fi
          done
          echo "## Block 0 / Detect Impact" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat ci-impact.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload impact report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gate-impact-${{ github.run_id }}
          path: ci-impact.json
          retention-days: 30

  fast-gates:
    name: Block 1 / Fast CAAS Gates
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    needs: detect-impact
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Validate CI path references
        # Best-effort static CI path scan: catches most explicit path references in
        # workflow YAML. Does not cover inline-bash, variable-interpolated, or
        # subprocess paths. Runtime positive-path steps provide remaining coverage.
        # Prevents "No such file or directory" breakage after common refactors.
        run: python3 ci/check_ci_paths.py

      - name: Fast deterministic gates
        # Single source of truth — same script as ci_local.sh runs.
        # local passes → GitHub passes. No divergence.
        run: bash ci/run_fast_gates.sh

  # ---------------------------------------------------------------------------
  # Security Gate — aggregates all Block 3 static/security jobs.
  # Block 2 (build + unit tests) starts ONLY after this passes.
  # Runs unconditionally (if: always()) so build-test is never blocked by a
  # skipped dependency; evaluates each Block 3 result and propagates failures.
  # ---------------------------------------------------------------------------
  caas-gate:
    name: Block 3 / Security Gate (aggregator)
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: [fast-gates, caas-security, bindings-smoke, gpu-wasm-smoke]
    if: always()
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Evaluate security phase
        run: |
          FG="${{ needs.fast-gates.result }}"
          CG="${{ needs.caas-security.result }}"
          BS="${{ needs.bindings-smoke.result }}"
          GW="${{ needs.gpu-wasm-smoke.result }}"

          FAILED=0
          for label_result in "fast-gates:$FG" "caas-security:$CG" \
                              "bindings-smoke:$BS" "gpu-wasm-smoke:$GW"; do
            label="${label_result%%:*}"
            result="${label_result##*:}"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::$label → $result — blocking build phase"
              FAILED=1
            else
              echo "$label → $result"
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1
          echo "::notice::Security phase passed — build phase may proceed"
        shell: bash

  build-test:
    name: Block 2 / Build + Unit Tests
    runs-on: ubuntu-24.04
    # Library-only build: ~5 min warm, ~15 min cold.
    # Full tests only run when src/ changed (run_core=true); ~25 min cold.
    # Starts ONLY after the security gate (Block 3) has completed.
    timeout-minutes: 30
    needs: [detect-impact, caas-gate]
    if: needs.detect-impact.outputs.docs_only != 'true'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends clang-17 lld-17 ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-gate-${{ hashFiles('src/cpu/src/**', 'src/cpu/include/**', 'include/**', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-gate-
            ccache-gate-release-

      - name: Configure (library + selftest only)
        run: |
          cmake -S . -B out/ci-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v3 \
            -DSECP256K1_BUILD_TESTS=OFF \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_BUILD_FUZZ_TESTS=OFF \
            -DSECP256K1_BUILD_PROTOCOL_TESTS=OFF

      - name: Build library
        run: cmake --build out/ci-release -j"$(nproc)"

      - name: Selftest smoke
        run: |
          if [ -f out/ci-release/selftest ]; then
            ./out/ci-release/selftest
          elif [ -f out/ci-release/run_selftest ]; then
            ./out/ci-release/run_selftest
          else
            echo "selftest binary not found — skipping smoke (library built OK)"
          fi

      - name: Determinism gate (RFC 6979 + ECDH + BIP32)
        env:
          UFSECP_LIB_PATH: ${{ github.workspace }}/out/ci-release
        run: python3 ci/check_determinism_gate.py

      - name: Full unit tests (src changed only)
        if: needs.detect-impact.outputs.run_core == 'true'
        run: |
          cmake -S . -B out/ci-tests -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v3 \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_BUILD_FUZZ_TESTS=OFF \
            -DSECP256K1_BUILD_PROTOCOL_TESTS=ON
          cmake --build out/ci-tests -j"$(nproc)"
          ctest --test-dir out/ci-tests --output-on-failure -j"$(nproc)" \
            -E "^(ct_sidechannel|.*fuzz.*|exploit_gpu_secret_erase|exploit_gpu_memory_safety)$" \
            --timeout 420

  caas-security:
    name: Block 3 / CAAS Security Gates
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [detect-impact, fast-gates]
    if: >-
      needs.detect-impact.outputs.run_caas == 'true' ||
      needs.detect-impact.outputs.run_core == 'true' ||
      needs.detect-impact.outputs.run_compat == 'true' ||
      needs.detect-impact.outputs.run_bindings == 'true' ||
      needs.detect-impact.outputs.run_gpu == 'true' ||
      needs.detect-impact.outputs.run_wasm == 'true'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends g++-13 ninja-build

      - name: Build audit shared library
        run: |
          cmake -S . -B out/ci-audit -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DBUILD_TESTING=OFF \
            -DSECP256K1_BUILD_PROTOCOL_TESTS=OFF \
            -DSECP256K1_BUILD_FUZZ_TESTS=OFF
          cmake --build out/ci-audit --target ufsecp_shared -j"$(nproc)"

      - name: Build graphs
        run: |
          python3 ci/build_project_graph.py --rebuild
          python3 tools/source_graph_kit/source_graph.py build -i

      - name: Audit gate (P0–P18)
        id: audit_gate
        run: python3 ci/audit_gate.py --json -o caas_audit_gate.json

      - name: Security autonomy check (100/100 required)
        id: security_autonomy
        if: always()
        run: |
          python3 ci/security_autonomy_check.py --json -o caas_autonomy.json; rc=$?
          [ $rc -eq 77 ] && { echo "::notice::security_autonomy advisory-skip (exit 77 — GPU/infrastructure absent)"; exit 0; } || exit $rc

      - name: Source graph quality check
        id: source_graph_quality
        if: always()
        run: python3 ci/check_source_graph_quality.py

      - name: Libsecp shim parity check
        id: shim_parity
        if: always()
        run: python3 ci/check_libsecp_shim_parity.py

      - name: Core build mode check
        id: core_build_mode
        if: always()
        run: python3 ci/check_core_build_mode.py

      - name: Export assurance report
        id: export_assurance
        if: always()
        run: python3 ci/export_assurance.py -o assurance_report.json

      - name: Bundle integrity verify (F-02 fix)
        # SW-01/F-02 fix: verify the existing evidence bundle on every push/PR
        # so a regression in verify_external_audit_bundle.py is caught immediately.
        # Bundle regeneration (Stage 4) is still manual/nightly; this only checks
        # that the committed bundle passes integrity verification.
        # Audit-fix: removed || true + continue-on-error so a bundle with
        # mismatched hashes actually blocks the gate (was silently passing).
        id: bundle_verify
        if: always()
        run: |
          if [ -f docs/EXTERNAL_AUDIT_BUNDLE.json ]; then
            python3 ci/verify_external_audit_bundle.py --json --allow-commit-mismatch \
              > caas_bundle_verify.json
          else
            echo "::error::docs/EXTERNAL_AUDIT_BUNDLE.json not present — bundle integrity cannot be verified"
            exit 1
          fi

      - name: Evidence chain integrity check (SW-01 fix)
        # SW-01 fix: validate the evidence chain on every PR.
        # exit 77 = ADVISORY_SKIP_CODE: CAAS_HMAC_KEY not set on this runner
        # (public key only) — treat as advisory skip, not hard failure.
        if: always()
        shell: bash
        run: |
          set +e   # we capture exit code from python3 explicitly; set -e would
                  # kill the step before we can branch on the advisory-skip code
          if [ -f docs/EVIDENCE_CHAIN.json ]; then
            python3 ci/evidence_governance.py validate
            RC=$?
            if [ "$RC" -eq 77 ]; then
              echo "::notice::Evidence chain: advisory skip (CAAS_HMAC_KEY not provisioned)"
              exit 0
            elif [ "$RC" -ne 0 ]; then
              echo "::error::Evidence chain validation failed — EVIDENCE_CHAIN.json may be corrupted or tampered"
              exit 1
            fi
          else
            echo "::error::docs/EVIDENCE_CHAIN.json not found — run ci/evidence_governance.py record to bootstrap."
            exit 1
          fi

      - name: Secret path change gate (blocking)
        # Placed here so CPU secret-bearing changes (ecdsa.cpp, schnorr.cpp,
        # scalar.cpp, ecdh.cpp, etc.) that trigger run_core but NOT run_gpu/run_wasm
        # are still checked.  caas-security runs for run_core|run_compat|run_bindings
        # |run_gpu|run_wasm — full coverage of all secret-bearing profiles.
        if: always()
        run: |
          BASE_REF="origin/${{ github.event.pull_request.base.ref || 'dev' }}"
          BEFORE_SHA="${{ github.event.before }}"
          python3 ci/check_secret_path_changes.py \
            --base "$BASE_REF" \
            ${BEFORE_SHA:+--before-sha "$BEFORE_SHA"}

      - name: Upload CAAS evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gate-caas-evidence-${{ github.run_id }}
          path: |
            caas_audit_gate.json
            caas_autonomy.json
            caas_bundle_verify.json
            assurance_report.json
          # M-4 fix: error so a gate failure that prevents JSON generation is
          # visible as a hard artifact failure, not a silent empty-upload warning.
          if-no-files-found: error
          retention-days: 90

  bindings-smoke:
    name: Block 3 / Bindings Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [detect-impact, fast-gates]
    if: needs.detect-impact.outputs.run_bindings == 'true'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Build C API and Python smoke
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ninja-build g++-13
          cmake -S bindings/c_api -B out/ci-bindings-capi -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build out/ci-bindings-capi -j"$(nproc)"
          python3 -m py_compile bindings/python/ultrafast_secp256k1/__init__.py

  gpu-wasm-smoke:
    name: Block 3 / GPU-WASM Routing Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    needs: [detect-impact, fast-gates]
    if: needs.detect-impact.outputs.run_gpu == 'true' || needs.detect-impact.outputs.run_wasm == 'true'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: API contract checks
        # H-1 fix: hard gate. A crypto engine has no low-priority API problems —
        # any API contract violation is a blocking failure.
        run: python3 ci/check_api_contracts.py --json

      - name: CUDA/MSVC preflight
        run: python3 ci/preflight.py --cuda-msvc

  final-verdict:
    name: Gate / Final Verdict
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs:
      - detect-impact
      - fast-gates
      - caas-gate
      - build-test
      - caas-security
      - bindings-smoke
      - gpu-wasm-smoke
    if: always()
    steps:
      - name: Evaluate block results
        run: |
          echo "## Gate / Final Verdict" >> "$GITHUB_STEP_SUMMARY"
          echo "- Gate: ${{ needs.detect-impact.outputs.gate }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Profiles: ${{ needs.detect-impact.outputs.profiles }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Reason: ${{ needs.detect-impact.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Block | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| detect-impact | ${{ needs.detect-impact.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| fast-gates | ${{ needs.fast-gates.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| build-test | ${{ needs.build-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| caas-security | ${{ needs.caas-security.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| bindings-smoke | ${{ needs.bindings-smoke.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| gpu-wasm-smoke | ${{ needs.gpu-wasm-smoke.result }} |" >> "$GITHUB_STEP_SUMMARY"

          # caas-security must never be silently skipped for non-docs changes.
          # docs_only=true is the only legitimate skip path (all changed files
          # fell into docs-only profile, so no security-relevant code changed).
          if [ "${{ needs.caas-security.result }}" = "skipped" ]; then
            if [ "${{ needs.detect-impact.outputs.docs_only }}" != "true" ]; then
              echo "::error::caas-security was skipped — security gates must always run for non-docs changes"
              exit 1
            fi
          fi

          # Verdict: failures and cancellations always fail the gate.
          # Each block's job-level `if:` clause already governs WHEN it
          # legitimately skips (build-test on docs_only, bindings-smoke when
          # run_bindings=false, etc.). The only block where "skipped" must
          # be specifically explained is caas-security — security gates must
          # never be silently skipped on non-docs changes (already enforced
          # by the explicit caas-security check above this loop).
          #
          # detect-impact and fast-gates must always run (no `if:` clause
          # that allows skipping); skipped here = workflow misconfiguration.
          for entry in \
            "detect-impact:${{ needs.detect-impact.result }}:never" \
            "fast-gates:${{ needs.fast-gates.result }}:never" \
            "build-test:${{ needs.build-test.result }}:may_skip" \
            "caas-security:${{ needs.caas-security.result }}:may_skip" \
            "bindings-smoke:${{ needs.bindings-smoke.result }}:may_skip" \
            "gpu-wasm-smoke:${{ needs.gpu-wasm-smoke.result }}:may_skip"; do
            block="${entry%%:*}"
            rest="${entry#*:}"
            result="${rest%%:*}"
            skip_policy="${rest#*:}"

            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Gate block '$block' → $result"
              exit 1
            fi
            if [ "$result" = "skipped" ] && [ "$skip_policy" = "never" ]; then
              echo "::error::Gate block '$block' was skipped — this block must never be skipped"
              exit 1
            fi
          done

          echo "::notice::All selected gate blocks passed"
