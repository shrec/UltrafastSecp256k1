# ============================================================================
# GPU Self-Hosted CI -- CUDA/OpenCL Validation on Real Hardware
# ============================================================================
# Runs GPU C ABI tests, unified audit, and benchmarks on a self-hosted
# NVIDIA runner (parking-gpu / RTX 5060 Ti).
#
# Triggers:
#   - Push to dev/main (GPU-affecting paths)
#   - Pull request to dev/main
#   - Nightly schedule (04:00 UTC) -- full GPU validation
#   - Manual dispatch
#
# Artifacts:
#   - GPU environment manifest (driver, CUDA, compiler, GPU model)
#   - ctest output log
#   - GPU audit reports (JSON + TXT)
#   - Benchmark results (raw + JSON)
#   - Per-commit proof summary
# ============================================================================

name: GPU CI (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      run_benchmarks:
        description: 'Run GPU benchmarks (adds ~5 min)'
        required: false
        default: 'true'
        type: boolean
      full_audit:
        description: 'Run full unified audit (adds ~2 min)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read

concurrency:
  group: gpu-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Job 1: GPU Environment Manifest + Build + Test
  # ==========================================================================
  gpu-validation:
    name: GPU Validation (CUDA + OpenCL)
    runs-on: [self-hosted, linux, x64, cuda, rtx5060ti]
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false

    # -- CUDA 13 toolchain selection (mandatory preflight) --------------------
    # This runner's default `nvcc` on PATH resolves to CUDA 12.0 (ceiling
    # compute_90 -- see cmake/CUDA_ARCHITECTURE_POLICY.md). Every configure
    # step below selects SECP256K1_CUDA_ARCH_PROFILE=ci-bounded-recent, which
    # requires nvcc >= 13.0 for compute_120/sm_120 real-target codegen. Select
    # the real installed CUDA 13 toolkit explicitly here, before anything else
    # runs, so a missing/too-old toolkit fails loudly at this ONE step instead
    # of a confusing FATAL_ERROR deep inside a later cmake configure -- and so
    # every later step (manifest, policy gate, both configures) reports and
    # uses the exact SAME resolved compiler, never a silently re-derived one.
    - name: Select CUDA 13 toolchain (preflight)
      id: cuda-toolchain
      run: |
        set -euo pipefail
        CANDIDATE="${UFSECP_CUDA13_NVCC:-/usr/local/cuda-13.2/bin/nvcc}"
        if [ ! -x "${CANDIDATE}" ]; then
          echo "::error::CUDA 13 nvcc not found (or not executable) at '${CANDIDATE}'. This self-hosted RTX 5060 Ti runner requires an installed CUDA >= 13.0 toolkit for sm_120 codegen -- see cmake/CUDA_ARCHITECTURE_POLICY.md. Set UFSECP_CUDA13_NVCC to override the path if it moved; never fall back to the default (nvcc 12.0) PATH compiler."
          exit 1
        fi
        RAW_MAJOR="$("${CANDIDATE}" --version | grep -oP 'release \K[0-9]+' || true)"
        if [ -z "${RAW_MAJOR}" ]; then
          echo "::error::Could not parse a major version out of '${CANDIDATE} --version' output. Refusing to guess."
          exit 1
        fi
        if [ "${RAW_MAJOR}" -lt 13 ]; then
          echo "::error::${CANDIDATE} reports major version ${RAW_MAJOR}, expected >= 13. Refusing to silently use a compiler that cannot satisfy the ci-bounded-recent profile guard."
          exit 1
        fi
        echo "CUDACXX=${CANDIDATE}" >> "$GITHUB_ENV"
        echo "cudacxx=${CANDIDATE}" >> "$GITHUB_OUTPUT"
        echo "Selected CUDA toolchain: ${CANDIDATE}"
        "${CANDIDATE}" --version

    # -- CUDA architecture policy gate (real CI gate; wired here so this is
    #    actually exercised on every run, not a standalone script nobody
    #    invokes). Runs AFTER toolchain selection so the policy gate's static
    #    coherence checks can see the resolved CUDACXX. Exercises the fail-
    #    fast/named-profile precedence, all four named profiles, every
    #    version guard (including legacy-compat's lower AND upper bound), and
    #    static proof that this workflow + the 5060 Ti presets cannot resolve
    #    an nvcc13-only profile without an explicit nvcc13 compiler pin. See
    #    cmake/CUDA_ARCHITECTURE_POLICY.md.
    - name: CUDA architecture policy gate
      env:
        UFSECP_CI_NVCC13: ${{ steps.cuda-toolchain.outputs.cudacxx }}
      run: python3 ci/check_cuda_arch_policy.py

    # -- P0 #3: Environment manifest ------------------------------------------
    - name: Emit GPU environment manifest
      id: env-manifest
      run: |
        mkdir -p /tmp/gpu-ci-artifacts

        cat > /tmp/gpu-ci-artifacts/gpu_environment.json << ENVEOF
        {
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "commit_sha": "${{ github.sha }}",
          "ref": "${{ github.ref }}",
          "event": "${{ github.event_name }}",
          "runner": "$(hostname)",
          "gpu": {
            "model": "$(nvidia-smi --query-gpu=name --format=csv,noheader 2>/dev/null || echo 'N/A')",
            "driver": "$(nvidia-smi --query-gpu=driver_version --format=csv,noheader 2>/dev/null || echo 'N/A')",
            "compute_cap": "$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader 2>/dev/null || echo 'N/A')",
            "memory_mb": "$(nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits 2>/dev/null || echo 'N/A')",
            "cuda_version": "$("${CUDACXX}" --version 2>/dev/null | grep -oP 'release \K[0-9.]+' || echo 'N/A')"
          },
          "compiler": {
            "cxx": "$(g++ --version 2>/dev/null | head -1 || echo 'N/A')",
            "cmake": "$(cmake --version 2>/dev/null | head -1 || echo 'N/A')",
            "ninja": "$(ninja --version 2>/dev/null || echo 'N/A')",
            "cuda_cxx": "${CUDACXX}"
          },
          "os": {
            "kernel": "$(uname -r)",
            "distro": "$(lsb_release -ds 2>/dev/null || cat /etc/os-release 2>/dev/null | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"' || echo 'N/A')",
            "arch": "$(uname -m)"
          }
        }
        ENVEOF

        cat /tmp/gpu-ci-artifacts/gpu_environment.json
        echo "gpu_model=$(nvidia-smi --query-gpu=name --format=csv,noheader 2>/dev/null)" >> "$GITHUB_OUTPUT"

    # -- Configure + Build ----------------------------------------------------
    - name: Configure (CUDA + OpenCL Release)
      run: |
        # ci-bounded-recent named profile: 89-real;89-virtual;120-real;120-virtual
        # (requires nvcc >= 13.0; this self-hosted runner's RTX 5060 Ti is
        # sm_120/Blackwell -- see cmake/CUDA_ARCHITECTURE_POLICY.md). Selected
        # explicitly by name, never a silent default. CMAKE_CUDA_COMPILER is
        # passed explicitly (not left to env-only auto-detection) using the
        # exact compiler the preflight step resolved and validated above.
        cmake -S . -B out/gpu-ci \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DSECP256K1_BUILD_CPU=ON \
          -DSECP256K1_BUILD_CUDA=ON \
          -DSECP256K1_BUILD_TESTS=ON \
          -DSECP256K1_BUILD_BENCH=ON \
          -DSECP256K1_BUILD_EXAMPLES=ON \
          -DSECP256K1_CUDA_ARCH_PROFILE=ci-bounded-recent \
          -DCMAKE_CUDA_COMPILER="${CUDACXX}"

    - name: Build (all targets)
      run: cmake --build out/gpu-ci -j$(nproc)

    # -- P0 #2: GPU C ABI test slice -----------------------------------------
    - name: GPU C ABI tests
      id: gpu-tests
      run: |
        ctest --test-dir out/gpu-ci \
          --output-on-failure \
          -j$(nproc) \
          -R "^(gpu_abi_gate|gpu_ops_equivalence|gpu_host_api_negative|gpu_backend_matrix|gpu_zk_prove_verify_differential)$" \
          2>&1 | tee /tmp/gpu-ci-artifacts/gpu_ctest_output.txt

    # -- CPU core tests (sanity) ----------------------------------------------
    - name: CPU core tests
      run: |
        ctest --test-dir out/gpu-ci \
          --output-on-failure \
          -j$(nproc) \
          -E "^(ct_sidechannel|gpu_)" \
          2>&1 | tee -a /tmp/gpu-ci-artifacts/cpu_ctest_output.txt

    # -- libbitcoin GPU/CPU consensus differential (local-only gate) ----------
    # Consensus-bearing: for block validation the GPU verdict on every script
    # signature MUST match the CPU reference bit-for-bit (the CPU path is itself
    # gated against libsecp256k1, so GPU==CPU here means GPU==libsecp). Built
    # from the libbitcoin object-mode profile — the exact surface integrators
    # link — in an isolated build dir so the main gpu-ci targets are untouched.
    # Self-hosted GPU only; never runs on GitHub-hosted CI. Exit 77 = no GPU =
    # ctest "skipped" (SKIP_RETURN_CODE), not a failure. A verdict divergence
    # fails the job.
    - name: libbitcoin GPU/CPU consensus differential
      run: |
        cmake -S . -B out/lbtc-consensus \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DSECP256K1_BUILD_LIBBITCOIN=ON \
          -DSECP256K1_BUILD_LIBBITCOIN_TESTS=ON \
          -DSECP256K1_BUILD_CUDA=ON \
          -DSECP256K1_CUDA_ARCH_PROFILE=ci-bounded-recent \
          -DCMAKE_CUDA_COMPILER="${CUDACXX}"
        cmake --build out/lbtc-consensus --target test_lbtc_consensus_diff -j$(nproc)
        ctest --test-dir out/lbtc-consensus/include/ufsecp \
          -R "^lbtc_consensus_diff$" \
          --output-on-failure \
          2>&1 | tee /tmp/gpu-ci-artifacts/lbtc_consensus_diff.txt

    # -- P1 #4: Unified audit ------------------------------------------------
    - name: Unified audit
      if: >-
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' && inputs.full_audit == 'true' ||
        github.event_name == 'push'
      run: |
        AUDIT_BIN=$(find out/gpu-ci -name unified_audit_runner -type f | head -1)
        if [ -n "$AUDIT_BIN" ] && [ -x "$AUDIT_BIN" ]; then
          "$AUDIT_BIN" --report-dir /tmp/gpu-ci-artifacts 2>&1 | tee /tmp/gpu-ci-artifacts/audit_stdout.txt
        else
          echo "::warning::unified_audit_runner not found in out"
        fi

    # -- P1 #5: Benchmarks ---------------------------------------------------
    - name: Run benchmarks
      if: >-
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' && inputs.run_benchmarks == 'true' ||
        github.event_name == 'push'
      run: |
        BENCH_BIN=$(find out/gpu-ci -name bench_unified -type f | head -1)
        if [ -n "$BENCH_BIN" ] && [ -x "$BENCH_BIN" ]; then
          "$BENCH_BIN" --quick 2>&1 | tee /tmp/gpu-ci-artifacts/benchmark_raw.txt

          # Parse to JSON if parser exists
          if [ -f .github/scripts/parse_benchmark.py ]; then
            python3 .github/scripts/parse_benchmark.py \
              /tmp/gpu-ci-artifacts/benchmark_raw.txt \
              /tmp/gpu-ci-artifacts/benchmark_gpu.json || true
          fi
        else
          echo "::warning::bench_unified not found in build"
        fi

    # -- P3 #11: Nightly backend matrix validation ----------------------------
    - name: Backend matrix validation (nightly)
      if: github.event_name == 'schedule'
      run: |
        echo "=== Backend Discovery ===" | tee /tmp/gpu-ci-artifacts/backend_matrix.txt

        # CUDA device info
        nvidia-smi 2>&1 | tee -a /tmp/gpu-ci-artifacts/backend_matrix.txt
        echo "" >> /tmp/gpu-ci-artifacts/backend_matrix.txt

        # OpenCL device info (if clinfo available)
        if command -v clinfo &>/dev/null; then
          echo "=== OpenCL Devices ===" >> /tmp/gpu-ci-artifacts/backend_matrix.txt
          clinfo --list 2>&1 | tee -a /tmp/gpu-ci-artifacts/backend_matrix.txt
        fi

        # Run backend matrix test specifically
        ctest --test-dir out/gpu-ci \
          --output-on-failure \
          -R "gpu_backend_matrix" \
          2>&1 | tee -a /tmp/gpu-ci-artifacts/backend_matrix.txt

    # -- P1 #6: Per-commit proof summary --------------------------------------
    - name: Generate proof summary
      if: always()
      run: |
        GPU_TESTS="${{ steps.gpu-tests.outcome }}"
        cat > /tmp/gpu-ci-artifacts/proof_summary.json << PROOFEOF
        {
          "commit": "${{ github.sha }}",
          "ref": "${{ github.ref }}",
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "event": "${{ github.event_name }}",
          "runner": "$(hostname)",
          "gpu_model": "${{ steps.env-manifest.outputs.gpu_model }}",
          "results": {
            "gpu_tests": "${GPU_TESTS}",
            "cpu_tests": "$([ -f /tmp/gpu-ci-artifacts/cpu_ctest_output.txt ] && grep -c 'Passed' /tmp/gpu-ci-artifacts/cpu_ctest_output.txt || echo 'N/A')",
            "audit": "$([ -f /tmp/gpu-ci-artifacts/audit_report.json ] && echo 'present' || echo 'not_run')",
            "benchmark": "$([ -f /tmp/gpu-ci-artifacts/benchmark_raw.txt ] && echo 'present' || echo 'not_run')"
          },
          "artifacts": [
            "gpu_environment.json",
            "gpu_ctest_output.txt",
            "cpu_ctest_output.txt",
            "lbtc_consensus_diff.txt",
            "audit_report.json",
            "audit_report.txt",
            "benchmark_raw.txt",
            "benchmark_gpu.json",
            "proof_summary.json"
          ]
        }
        PROOFEOF

        cat /tmp/gpu-ci-artifacts/proof_summary.json

    # -- Step Summary ---------------------------------------------------------
    - name: Job summary
      if: always()
      run: |
        echo "## GPU CI Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| GPU Model | ${{ steps.env-manifest.outputs.gpu_model }} |" >> $GITHUB_STEP_SUMMARY
        echo "| GPU Tests | ${{ steps.gpu-tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ -f /tmp/gpu-ci-artifacts/gpu_ctest_output.txt ]; then
          echo "### GPU Test Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/gpu-ci-artifacts/gpu_ctest_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

        if [ -f /tmp/gpu-ci-artifacts/benchmark_raw.txt ]; then
          echo "### Benchmark (quick)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -60 /tmp/gpu-ci-artifacts/benchmark_raw.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

    # -- Upload all artifacts -------------------------------------------------
    - name: Upload GPU CI artifacts
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: gpu-ci-${{ github.sha }}
        path: /tmp/gpu-ci-artifacts/
        retention-days: 90
