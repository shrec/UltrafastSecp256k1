# =============================================================================
# platform-chain.yml — Reusable sequential platform chain
# =============================================================================
#
# ONE flow for every platform.  Three stages, each starts only after the
# previous one completes:
#
#   [build] ──needs──▶ [audit] ──needs──▶ [collect]
#
# Platform-specific behaviour is controlled via inputs, not separate workflows.
# All tool paths are resolved from PATH at runtime — no hardcoded /usr/bin/*.
# =============================================================================

name: Platform Chain (Reusable)

on:
  workflow_call:
    inputs:

      # ── Identity ─────────────────────────────────────────────────────────────
      platform:
        description: 'Platform label (used in job names and artifact names)'
        type: string
        required: true
      os:
        description: 'GitHub Actions runner label'
        type: string
        required: true

      # ── Toolchain ─────────────────────────────────────────────────────────────
      install_cmd:
        description: 'Bash script to install toolchain (empty = no-op)'
        type: string
        default: ''
      cc:
        description: 'CC env var (empty = system default)'
        type: string
        default: ''
      cxx:
        description: 'CXX env var (empty = system default)'
        type: string
        default: ''
      sanitizer:
        description: |
          Sanitizer to enable: none | asan | tsan | msan
          Flags are injected via CMAKE_C_FLAGS / CMAKE_CXX_FLAGS / CMAKE_EXE_LINKER_FLAGS.
        type: string
        default: 'none'

      # ── CMake ─────────────────────────────────────────────────────────────────
      cmake_src:
        description: 'Source dir passed to cmake -S (default: repo root)'
        type: string
        default: '.'
      cmake_generator:
        description: 'CMake generator (default: Ninja)'
        type: string
        default: 'Ninja'
      cmake_extra:
        description: 'Extra cmake -D… flags (no flags with internal spaces — use sanitizer input instead)'
        type: string
        default: ''
      build_type:
        description: 'CMAKE_BUILD_TYPE'
        type: string
        default: 'Release'
      cmake_targets:
        description: 'Space-separated cmake --target list (empty = build all)'
        type: string
        default: ''

      # ── Audit mode ─────────────────────────────────────────────────────────────
      # Controls what the [audit] stage executes.
      #
      #   full          ctest + unified_audit_runner + all Python gate scripts
      #   ctest         ctest only (macOS, Windows, sanitizers)
      #   coverage      ctest with LLVM source coverage + Codecov upload
      #   qemu-arm64    QEMU aarch64 smoke (cross-compile)
      #   qemu-riscv64  QEMU riscv64 smoke
      #   node          WASM: node KAT equivalence + bench
      #   verify        Check compiled binaries exist (Android, iOS — no execution)
      audit_mode:
        description: 'Audit procedure: full|ctest|coverage|qemu-arm64|qemu-riscv64|node|verify'
        type: string
        default: 'full'

      # ── ctest tuning ──────────────────────────────────────────────────────────
      ctest_exclude:
        description: 'Regex passed to ctest -E (empty = no exclusion)'
        type: string
        default: '^(ct_sidechannel|py_|exploit_gpu_)'
      ctest_include:
        description: 'Regex passed to ctest -R (empty = no filter; use for whitelist / MSan)'
        type: string
        default: ''
      ctest_timeout:
        description: 'Per-test timeout in seconds (raise to 900 for sanitizers)'
        type: number
        default: 300
      ctest_config:
        description: 'ctest --build-config value (for multi-config generators like VS)'
        type: string
        default: ''

      # ── Coverage (audit_mode: coverage) ────────────────────────────────────────
      codecov_flags:
        description: 'Flags passed to the Codecov upload action'
        type: string
        default: 'cpu'

    outputs:
      build_result:
        value: ${{ jobs.build.result }}
      audit_result:
        value: ${{ jobs.audit.result }}
      collect_result:
        value: ${{ jobs.collect.result }}

jobs:
  # =============================================================================
  # STAGE 1 — BUILD
  # =============================================================================
  build:
    name: "[${{ inputs.platform }}] Build"
    runs-on: ${{ inputs.os }}
    timeout-minutes: 40

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # ── Toolchain install ─────────────────────────────────────────────────────
      - name: Install toolchain
        if: inputs.install_cmd != ''
        run: ${{ inputs.install_cmd }}
        shell: bash

      # ── Special SDKs (handled via Actions — cannot be expressed as install_cmd)
      - name: Setup Android NDK
        if: startsWith(inputs.platform, 'android-')
        id: ndk
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1
        with:
          ndk-version: r27c

      - name: Setup Emscripten SDK
        if: inputs.platform == 'wasm'
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: 3.1.51
          actions-cache-folder: emsdk-cache

      # ── Sanitizer flag injection via GITHUB_ENV ────────────────────────────────
      # Flags are set as env vars so cmake can quote them correctly as single args.
      - name: Inject sanitizer flags into env
        if: inputs.sanitizer != 'none' && inputs.sanitizer != ''
        run: |
          case "${{ inputs.sanitizer }}" in
            asan)
              SAN="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
              LINK="-fsanitize=address,undefined"
              ;;
            tsan)
              SAN="-fsanitize=thread -fno-omit-frame-pointer"
              LINK="-fsanitize=thread"
              ;;
            msan)
              SAN="-fsanitize=memory -fno-omit-frame-pointer -fsanitize-memory-track-origins=2"
              CXXEXTRA=" -stdlib=libc++"
              LINK="-fsanitize=memory -stdlib=libc++ -lc++abi"
              ;;
            *)
              echo "::error::Unknown sanitizer: ${{ inputs.sanitizer }}"
              exit 1
              ;;
          esac
          {
            echo "SAN_CFLAGS=${SAN}"
            echo "SAN_CXXFLAGS=${SAN}${CXXEXTRA:-}"
            echo "SAN_LDFLAGS=${LINK}"
          } >> "$GITHUB_ENV"
        shell: bash

      # ── ccache (Linux/macOS) ──────────────────────────────────────────────────
      - name: Cache ccache
        if: runner.os != 'Windows' && inputs.platform != 'wasm'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: chain-cc-${{ inputs.platform }}-${{ inputs.build_type }}-${{ hashFiles('src/cpu/src/**', 'src/cpu/include/**', 'include/**') }}
          restore-keys: |
            chain-cc-${{ inputs.platform }}-${{ inputs.build_type }}-
            chain-cc-${{ inputs.platform }}-

      - name: Configure ccache
        if: runner.os != 'Windows' && inputs.platform != 'wasm'
        run: |
          CCACHE=$(command -v ccache || true)
          if [ -z "$CCACHE" ]; then
            echo "::warning::ccache not found on PATH — build will proceed without it"
          else
            "$CCACHE" --set-config=max_size=400M
            "$CCACHE" --set-config=compression=true
            "$CCACHE" -z
          fi
        shell: bash

      # ── CMake Configure ────────────────────────────────────────────────────────
      - name: CMake Configure (standard)
        if: "!startsWith(inputs.platform, 'android-') && inputs.platform != 'wasm'"
        env:
          CC:  ${{ inputs.cc }}
          CXX: ${{ inputs.cxx }}
        run: |
          # Launcher (ccache if available)
          LAUNCHER_ARGS=()
          CCACHE=$(command -v ccache || true)
          if [ -n "$CCACHE" ] && [ "$RUNNER_OS" != "Windows" ]; then
            LAUNCHER_ARGS=(
              "-DCMAKE_C_COMPILER_LAUNCHER=${CCACHE}"
              "-DCMAKE_CXX_COMPILER_LAUNCHER=${CCACHE}"
            )
          fi

          # x86-64-v2 march only for native Linux (not cross-compile)
          MARCH_ARGS=()
          if [ "$RUNNER_OS" = "Linux" ] && \
             [[ "${{ inputs.cmake_extra }}" != *"CMAKE_SYSTEM_PROCESSOR"* ]] && \
             [[ "${{ inputs.cmake_extra }}" != *"TOOLCHAIN"* ]]; then
            MARCH_ARGS=("-DSECP256K1_MARCH=x86-64-v2")
          fi

          # Sanitizer flags (set as quoted args so spaces are preserved correctly)
          SAN_ARGS=()
          if [ -n "${SAN_CFLAGS:-}" ]; then
            SAN_ARGS=(
              "-DCMAKE_C_FLAGS=${SAN_CFLAGS}"
              "-DCMAKE_CXX_FLAGS=${SAN_CXXFLAGS}"
              "-DCMAKE_EXE_LINKER_FLAGS=${SAN_LDFLAGS}"
            )
          fi

          # Coverage flags
          COV_ARGS=()
          if [ "${{ inputs.audit_mode }}" = "coverage" ]; then
            COV_ARGS=(
              "-DCMAKE_C_FLAGS=-fprofile-instr-generate -fcoverage-mapping"
              "-DCMAKE_CXX_FLAGS=-fprofile-instr-generate -fcoverage-mapping"
              "-DCMAKE_EXE_LINKER_FLAGS=-fprofile-instr-generate"
            )
          fi

          cmake -S "${{ inputs.cmake_src }}" -B out/build \
            -G "${{ inputs.cmake_generator }}" \
            -DCMAKE_BUILD_TYPE="${{ inputs.build_type }}" \
            "${LAUNCHER_ARGS[@]}" \
            "${MARCH_ARGS[@]}" \
            "${SAN_ARGS[@]}" \
            "${COV_ARGS[@]}" \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=ON \
            -DSECP256K1_BUILD_EXAMPLES=ON \
            -DSECP256K1_BUILD_FUZZ_TESTS=ON \
            -DSECP256K1_BUILD_PROTOCOL_TESTS=ON \
            ${{ inputs.cmake_extra }}
        shell: bash

      - name: CMake Configure (Android NDK)
        if: startsWith(inputs.platform, 'android-')
        run: |
          # Strip the "android-" prefix to get the NDK ABI string
          ABI="${{ inputs.platform }}"
          ABI="${ABI#android-}"
          NDK_PATH="${{ steps.ndk.outputs.ndk-path }}"
          cmake -S bindings/android -B out/build \
            -G Ninja \
            "-DCMAKE_TOOLCHAIN_FILE=${NDK_PATH}/build/cmake/android.toolchain.cmake" \
            "-DANDROID_ABI=${ABI}" \
            -DANDROID_PLATFORM=android-24 \
            "-DCMAKE_BUILD_TYPE=${{ inputs.build_type }}" \
            ${{ inputs.cmake_extra }}
        shell: bash

      - name: CMake Configure (WASM/Emscripten)
        if: inputs.platform == 'wasm'
        run: |
          emcmake cmake -S bindings/wasm -B out/build \
            "-DCMAKE_BUILD_TYPE=${{ inputs.build_type }}" \
            ${{ inputs.cmake_extra }}
        shell: bash

      # ── Build ──────────────────────────────────────────────────────────────────
      - name: Build
        run: |
          TARGET_ARGS=()
          for t in ${{ inputs.cmake_targets }}; do
            TARGET_ARGS+=(--target "$t")
          done
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)
          cmake --build out/build \
            --config "${{ inputs.build_type }}" \
            -j"$JOBS" \
            "${TARGET_ARGS[@]}"
        shell: bash

      # ── Upload compiled output (ephemeral — audit stage downloads this) ─────────
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-${{ inputs.platform }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: out/build/
          retention-days: 1
          if-no-files-found: error

  # =============================================================================
  # STAGE 2 — AUDIT   (needs: build)
  # =============================================================================
  audit:
    name: "[${{ inputs.platform }}] Audit"
    needs: [build]
    runs-on: ${{ inputs.os }}
    timeout-minutes: 60

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # ── Download build from stage 1 ────────────────────────────────────────────
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-${{ inputs.platform }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: out/build/

      - name: Restore executable permissions
        if: runner.os != 'Windows'
        run: |
          find out/build \( -name '*.so' -o -name '*.dylib' \) -exec chmod +x {} + 2>/dev/null || true
          find out/build -maxdepth 5 -type f ! -name '*.*' -exec chmod +x {} + 2>/dev/null || true
        shell: bash

      # ── Toolchain runtime (for test execution) ─────────────────────────────────
      - name: Install toolchain (runtime)
        if: inputs.install_cmd != '' && inputs.audit_mode != 'verify'
        run: ${{ inputs.install_cmd }}
        shell: bash

      # ── QEMU ─────────────────────────────────────────────────────────────────
      - name: Install QEMU
        if: startsWith(inputs.audit_mode, 'qemu-')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-user-static
        shell: bash

      # ── Python ────────────────────────────────────────────────────────────────
      - name: Set up Python
        if: inputs.audit_mode == 'full' || inputs.audit_mode == 'coverage'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python audit deps
        if: inputs.audit_mode == 'full' || inputs.audit_mode == 'ctest' || inputs.audit_mode == 'coverage'
        run: |
          PYTHON=$(command -v python3 || command -v python)
          "$PYTHON" -m pip install --require-hashes -r .github/requirements/audit-deps.txt
        shell: bash

      # ── Node.js (WASM) ────────────────────────────────────────────────────────
      - name: Setup Node.js
        if: inputs.audit_mode == 'node'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20

      # ── Create report directory ────────────────────────────────────────────────
      - name: Create audit_reports directory
        if: always()
        run: mkdir -p audit_reports
        shell: bash

      # =========================================================================
      # audit_mode: full
      # Linux native — ctest + unified_audit_runner + all Python gate scripts
      # =========================================================================
      - name: "[full] ctest"
        if: inputs.audit_mode == 'full'
        run: |
          JOBS=$(nproc 2>/dev/null || echo 4)
          CTEST=$(command -v ctest)

          EXCLUDE_ARGS=()
          if [ -n "${{ inputs.ctest_exclude }}" ]; then
            EXCLUDE_ARGS=("-E" "${{ inputs.ctest_exclude }}")
          fi
          INCLUDE_ARGS=()
          if [ -n "${{ inputs.ctest_include }}" ]; then
            INCLUDE_ARGS=("-R" "${{ inputs.ctest_include }}")
          fi
          CONFIG_ARGS=()
          if [ -n "${{ inputs.ctest_config }}" ]; then
            CONFIG_ARGS=("--build-config" "${{ inputs.ctest_config }}")
          fi

          "$CTEST" --test-dir out/build \
            --output-on-failure \
            -j"$JOBS" \
            --timeout "${{ inputs.ctest_timeout }}" \
            "${EXCLUDE_ARGS[@]}" \
            "${INCLUDE_ARGS[@]}" \
            "${CONFIG_ARGS[@]}"
        shell: bash

      - name: "[full] unified_audit_runner"
        if: inputs.audit_mode == 'full'
        run: |
          RUNNER=$(find out/build -name unified_audit_runner -type f | head -1)
          if [ -z "$RUNNER" ]; then
            echo "::error::unified_audit_runner not found in out/build — ensure cmake built it"
            exit 1
          fi
          chmod +x "$RUNNER"
          "$RUNNER" --report-dir audit_reports/
        shell: bash

      - name: "[full] Audit gate P0–P18"
        if: inputs.audit_mode == 'full'
        run: |
          PYTHON=$(command -v python3 || command -v python)
          # Guard: if the unified_audit_runner failed to produce audit_report.json,
          # the gate reads from stale graph state and may falsely pass.
          if [ ! -f "audit_reports/audit_report.json" ]; then
            echo "::error::audit_reports/audit_report.json missing — unified_audit_runner did not complete successfully"
            exit 1
          fi
          set +e
          "$PYTHON" ci/audit_gate.py --json -o audit_reports/gate_report.json
          GATE_EXIT=$?
          set -e
          "$PYTHON" - <<'PYEOF'
          import json, sys
          try:
              d = json.load(open("audit_reports/gate_report.json"))
              v = d.get("audit_verdict", "unknown")
              s = d.get("summary", {})
              print(f"verdict={v}  blocking={s.get('blocking',0)}  advisory={s.get('advisory',0)}")
              for c in d.get("checks", []):
                  if c.get("status") == "FAIL":
                      print(f"  FAIL: {c.get('name','<unnamed>')}")
          except Exception as e:
              print(f"(could not parse gate report: {e})", file=sys.stderr)
          PYEOF
          if [ "$GATE_EXIT" -ne 0 ]; then
            echo "::error::Audit gate failed on ${{ inputs.platform }} (exit=${GATE_EXIT})"
            exit "$GATE_EXIT"
          fi
        shell: bash

      - name: "[full] Security autonomy check"
        if: inputs.audit_mode == 'full'
        run: |
          PYTHON=$(command -v python3 || command -v python)
          "$PYTHON" ci/security_autonomy_check.py \
            --json -o audit_reports/autonomy_report.json
          rc=$?
          # Exit 77 = ADVISORY_SKIP_CODE: all gates absent (no GPU/infra) → advisory skip, not failure
          if [ $rc -eq 77 ]; then
            echo "::notice::security_autonomy advisory-skip (exit 77 — GPU/infrastructure absent)"
            exit 0
          fi
          [ $rc -ne 0 ] && exit $rc
          "$PYTHON" - <<'PYEOF'
          import json, sys
          d = json.load(open("audit_reports/autonomy_report.json"))
          ready = d.get("autonomy_ready", d.get("passed", False))
          score = d.get("autonomy_score", d.get("score", 0))
          if not ready or score < 100:
              print(f"::error::Autonomy failed (ready={ready} score={score})")
              sys.exit(1)
          PYEOF
        shell: bash

      - name: "[full] Exploit traceability join"
        if: inputs.audit_mode == 'full'
        run: |
          PYTHON=$(command -v python3 || command -v python)
          "$PYTHON" ci/exploit_traceability_join.py \
            --json -o audit_reports/traceability_report.json
        shell: bash

      - name: "[full] External audit bundle"
        if: inputs.audit_mode == 'full'
        run: |
          PYTHON=$(command -v python3 || command -v python)
          "$PYTHON" ci/external_audit_bundle.py \
            -o audit_reports/external_audit_bundle.json
        shell: bash

      - name: "[full] Job summary"
        if: inputs.audit_mode == 'full' && always()
        run: |
          PYTHON=$(command -v python3 || command -v python)
          "$PYTHON" - <<'PYEOF'
          import json, pathlib, sys
          rep = pathlib.Path("audit_reports/audit_report.json")
          if not rep.exists():
              print("::error::audit_reports/audit_report.json not found — unified_audit_runner did not complete")
              sys.exit(1)
          else:
              d = json.load(rep.open())
              s = d.get("summary", d)
              passed  = s.get("passed", "?")
              failed  = s.get("failed", "?")
              skipped = s.get("advisory_skipped", "?")
              print(f"## Audit — ${{ inputs.platform }}")
              print(f"| Passed | Failed | Advisory-skipped |")
              print(f"|--------|--------|-----------------|")
              print(f"| {passed} | {failed} | {skipped} |")
          PYEOF
        shell: bash

      # =========================================================================
      # audit_mode: ctest   (macOS, Windows, sanitizers)
      # =========================================================================
      - name: "[ctest] Run tests"
        if: inputs.audit_mode == 'ctest'
        run: |
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)
          CTEST=$(command -v ctest)

          EXCLUDE_ARGS=()
          if [ -n "${{ inputs.ctest_exclude }}" ]; then
            EXCLUDE_ARGS=("-E" "${{ inputs.ctest_exclude }}")
          fi
          INCLUDE_ARGS=()
          if [ -n "${{ inputs.ctest_include }}" ]; then
            INCLUDE_ARGS=("-R" "${{ inputs.ctest_include }}")
          fi
          CONFIG_ARGS=()
          if [ -n "${{ inputs.ctest_config }}" ]; then
            CONFIG_ARGS=("--build-config" "${{ inputs.ctest_config }}")
          fi

          "$CTEST" --test-dir out/build \
            --output-on-failure \
            -j"$JOBS" \
            --timeout "${{ inputs.ctest_timeout }}" \
            "${EXCLUDE_ARGS[@]}" \
            "${INCLUDE_ARGS[@]}" \
            "${CONFIG_ARGS[@]}"

          echo "{\"platform\":\"${{ inputs.platform }}\",\"mode\":\"ctest\",\"result\":\"pass\"}" \
            > audit_reports/ctest_summary.json
        shell: bash

      # =========================================================================
      # audit_mode: coverage   (LLVM source-based coverage + Codecov)
      # =========================================================================
      - name: "[coverage] Run tests with profiling"
        if: inputs.audit_mode == 'coverage'
        env:
          LLVM_PROFILE_FILE: "out/build/%p-%m.profraw"
        run: |
          JOBS=$(nproc 2>/dev/null || echo 4)
          CTEST=$(command -v ctest)

          EXCLUDE_ARGS=()
          if [ -n "${{ inputs.ctest_exclude }}" ]; then
            EXCLUDE_ARGS=("-E" "${{ inputs.ctest_exclude }}")
          fi

          "$CTEST" --test-dir out/build \
            --output-on-failure \
            -j"$JOBS" \
            --timeout "${{ inputs.ctest_timeout }}" \
            "${EXCLUDE_ARGS[@]}"
        shell: bash

      - name: "[coverage] Collect LLVM coverage"
        if: inputs.audit_mode == 'coverage'
        run: |
          # Resolve llvm tools from the PATH — prefer versioned, fall back to unversioned
          CXX_BIN="${{ inputs.cxx }}"
          LLVM_VER=$(${CXX_BIN:-clang++} --version 2>/dev/null \
            | awk '/version/{for(i=1;i<=NF;i++) if($i~/^[0-9]+\.[0-9]+/) {print $i; exit}}' \
            | cut -d. -f1 \
            || echo "17")

          LLVM_PROFDATA=$(command -v "llvm-profdata-${LLVM_VER}" \
            || command -v llvm-profdata \
            || { echo "::error::llvm-profdata not found on PATH"; exit 1; })

          LLVM_COV=$(command -v "llvm-cov-${LLVM_VER}" \
            || command -v llvm-cov \
            || { echo "::error::llvm-cov not found on PATH"; exit 1; })

          echo "Using: $LLVM_PROFDATA  $LLVM_COV"

          # Merge raw profiles
          find out/build -name '*.profraw' -print0 \
            | xargs -0 "$LLVM_PROFDATA" merge -sparse -o coverage.profdata

          # Find instrumented binaries
          OBJECTS=()
          while IFS= read -r bin; do
            if "$LLVM_COV" show \
                --instr-profile=coverage.profdata "$bin" \
                >/dev/null 2>&1; then
              OBJECTS+=("-object=$bin")
            fi
          done < <(find out/build -maxdepth 8 -type f -executable 2>/dev/null)

          # Export lcov
          "$LLVM_COV" export \
            --format=lcov \
            --instr-profile=coverage.profdata \
            "${OBJECTS[@]}" \
            --ignore-filename-regex='(tests/|bench/|examples/|audit/|compat/|/usr/)' \
            > coverage.lcov

          # Human-readable summary
          "$LLVM_COV" report \
            --instr-profile=coverage.profdata \
            "${OBJECTS[@]}" \
            --ignore-filename-regex='(tests/|bench/|examples/|audit/|compat/|/usr/)' \
            | tail -5

          cp coverage.lcov audit_reports/coverage.lcov
        shell: bash

      - name: "[coverage] Upload to Codecov"
        if: inputs.audit_mode == 'coverage'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage.lcov
          flags: ${{ inputs.codecov_flags }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # =========================================================================
      # audit_mode: qemu-arm64
      # =========================================================================
      - name: "[qemu-arm64] Smoke test"
        if: inputs.audit_mode == 'qemu-arm64'
        run: |
          QEMU=$(command -v qemu-aarch64-static \
            || command -v qemu-aarch64 \
            || { echo "::error::qemu-aarch64 not found on PATH"; exit 1; })
          SYSROOT="/usr/aarch64-linux-gnu"
          SELFTEST=$(find out/build -name run_selftest -type f | head -1)
          [ -n "$SELFTEST" ] || { echo "::error::run_selftest not found"; exit 1; }

          timeout 360 "$QEMU" -L "$SYSROOT" "$SELFTEST" smoke

          BENCH_KP=$(find out/build -name bench_kP -type f | head -1)
          if [ -n "$BENCH_KP" ]; then
            timeout 180 "$QEMU" -L "$SYSROOT" "$BENCH_KP" \
              | tee audit_reports/bench_kP.txt
          fi

          echo "{\"platform\":\"${{ inputs.platform }}\",\"mode\":\"qemu-arm64\",\"result\":\"pass\"}" \
            > audit_reports/qemu_summary.json
        shell: bash

      # =========================================================================
      # audit_mode: qemu-riscv64
      # =========================================================================
      - name: "[qemu-riscv64] Smoke test"
        if: inputs.audit_mode == 'qemu-riscv64'
        run: |
          QEMU=$(command -v qemu-riscv64-static \
            || command -v qemu-riscv64 \
            || { echo "::error::qemu-riscv64 not found on PATH"; exit 1; })
          SYSROOT="/usr/riscv64-linux-gnu"
          SELFTEST=$(find out/build -name run_selftest -type f | head -1)
          [ -n "$SELFTEST" ] || { echo "::error::run_selftest not found"; exit 1; }

          timeout 180 "$QEMU" -L "$SYSROOT" "$SELFTEST" smoke

          echo "{\"platform\":\"${{ inputs.platform }}\",\"mode\":\"qemu-riscv64\",\"result\":\"pass\"}" \
            > audit_reports/qemu_summary.json
        shell: bash

      # =========================================================================
      # audit_mode: node   (WASM)
      # =========================================================================
      - name: "[node] WASM KAT equivalence test"
        if: inputs.audit_mode == 'node'
        run: |
          NODE=$(command -v node \
            || { echo "::error::node not found on PATH"; exit 1; })
          "$NODE" out/build/kat/wasm_kat_test.js
          echo "{\"platform\":\"${{ inputs.platform }}\",\"mode\":\"node\",\"result\":\"pass\"}" \
            > audit_reports/wasm_summary.json
        shell: bash

      - name: "[node] WASM benchmark"
        if: inputs.audit_mode == 'node'
        run: |
          NODE=$(command -v node)
          cd out/build/dist
          "$NODE" ../../../bindings/wasm/bench_wasm.mjs \
            | tee ../../../audit_reports/wasm_bench.txt
        shell: bash

      # =========================================================================
      # audit_mode: verify   (Android, iOS — no execution)
      # =========================================================================
      - name: "[verify] Check compiled artifacts"
        if: inputs.audit_mode == 'verify'
        run: |
          echo "=== Artifacts for ${{ inputs.platform }} ==="
          find out/build \( -name "*.a" -o -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) \
            | head -20 | tee audit_reports/binary_list.txt
          LIB=$(find out/build -name "libfastsecp256k1.a" | head -1)
          if [ -z "$LIB" ]; then
            echo "::error::libfastsecp256k1.a not found — build may have failed"
            exit 1
          fi
          echo "Library: $LIB  size=$(du -h "$LIB" | cut -f1)"
          echo "{\"platform\":\"${{ inputs.platform }}\",\"mode\":\"verify\",\"result\":\"pass\"}" \
            > audit_reports/verify_summary.json
        shell: bash

      # ── Upload ctest JUnit results (forensic data even when audit_reports/ is empty)
      - name: Upload ctest results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ctest-results-${{ inputs.platform }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            build/Testing/
            build-audit/Testing/
          retention-days: 7
          # warn (not error) because some audit modes (verify, node, qemu-*) don't produce ctest XML
          if-no-files-found: warn

      # ── Upload raw audit reports (so [collect] on a different runner can pull them)
      - name: Upload raw audit reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-raw-${{ inputs.platform }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: audit_reports/
          retention-days: 1
          # M-3 fix: error so an audit stage that produces no reports is visible
          # as a hard upload failure rather than a silent empty artifact.
          if-no-files-found: error

  # =============================================================================
  # STAGE 3 — COLLECT   (needs: audit)
  # Downloads raw reports, adds chain metadata, archives at 90-day retention.
  # =============================================================================
  collect:
    name: "[${{ inputs.platform }}] Collect"
    needs: [audit]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Download raw audit reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: audit-raw-${{ inputs.platform }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: collected/

      - name: Write chain metadata
        run: |
          mkdir -p collected
          cat > collected/chain_meta.json <<EOF
          {
            "platform":     "${{ inputs.platform }}",
            "os":           "${{ inputs.os }}",
            "audit_mode":   "${{ inputs.audit_mode }}",
            "sanitizer":    "${{ inputs.sanitizer }}",
            "run_id":       "${{ github.run_id }}",
            "run_attempt":  "${{ github.run_attempt }}",
            "sha":          "${{ github.sha }}",
            "ref":          "${{ github.ref }}",
            "audit_result": "${{ needs.audit.result }}"
          }
          EOF
        shell: bash

      - name: Upload platform artifact (90-day archive)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: platform-${{ inputs.platform }}-${{ github.run_id }}
          path: collected/
          retention-days: 90
          # L-3 fix: error so an entirely empty collect is a hard failure, not silent.
          if-no-files-found: error
