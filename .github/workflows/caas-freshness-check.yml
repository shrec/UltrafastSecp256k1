# ===========================================================================
# CAAS Freshness Check — T10 Mitigation
# ===========================================================================
#
# Runs on a 6-hour schedule independently of push-triggered pipelines.
# Delegates freshness policy to the authoritative B3/B19 gates:
#   - ci/audit_sla_check.py for measurable freshness SLOs.
#   - ci/check_evidence_refresh_coverage.py for the B19 refresh-disposition
#     ledger that distinguishes auto-produced evidence from documented
#     residual/manual/authored/golden evidence.
#
# T10 mitigation: ensures the freshness check fires even when no commits
# are pushed, so stale evidence is detected within 6 hours of expiry.
#
# Fails if a blocking freshness SLO is violated, a tracked artifact has no
# refresh disposition, an auto producer is unverifiable, or a documented residual
# no longer resolves.
# ===========================================================================

name: CAAS Freshness Check

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours — T10 mitigation
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    name: CAAS / Evidence Freshness
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # CAAS-08: full history. A shallow clone (was fetch-depth: 10) cannot
          # reach the last commit that touched an evidence file when it is older
          # than the window (e.g. AUDIT_DASHBOARD.md, refreshed nightly, can be
          # hundreds of commits back). `git log -1 --format=%cI -- <file>` then
          # returns empty → the fail-closed "no timestamp" branch fired → this
          # scheduled gate was permanently red, masking real staleness.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Check evidence freshness and refresh coverage (T10 mitigation)
        run: |
          python3 ci/audit_sla_check.py --json -o audit_sla_report.json
          python3 ci/check_evidence_refresh_coverage.py --json -o evidence_refresh_coverage.json

      - name: Step summary
        if: always()
        run: |
          echo "## CAAS Evidence Freshness Check (T10 Mitigation)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f audit_sla_report.json ]; then
            python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json
          d = json.load(open("audit_sla_report.json"))
          print(f"- Audit SLA release_ready: `{d.get('release_ready')}`")
          print(f"- Blocking violations: `{d.get('blocking_violations')}`")
          print(f"- Warning violations: `{d.get('warning_violations')}`")
          print(f"- Minimum days until block: `{d.get('min_days_until_block')}`")
          EOF
          fi
          if [ -f evidence_refresh_coverage.json ]; then
            python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json
          d = json.load(open("evidence_refresh_coverage.json"))
          print(f"- Refresh coverage: `{d.get('overall_pass')}`")
          print(f"- Tracked artifacts: `{d.get('tracked_total')}`")
          print(f"- Auto/residual: `{d.get('auto_count')}` / `{d.get('residual_count')}`")
          EOF
          fi
