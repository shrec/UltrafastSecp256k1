# ===========================================================================
# CAAS Freshness Check — T10 Mitigation
# ===========================================================================
#
# Runs on a 6-hour schedule independently of push-triggered pipelines.
# Evaluates evidence age against the 7-day expiry threshold.
#
# T10 mitigation: ensures the freshness check fires even when no commits
# are pushed, so stale evidence is detected within 6 hours of expiry.
#
# Fails if:
#   - docs/EXTERNAL_AUDIT_BUNDLE.json has not been updated in >7 days
#   - The bundle is missing or malformed
# ===========================================================================

name: CAAS Freshness Check

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours — T10 mitigation
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    name: CAAS / Evidence Freshness
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Check evidence bundle freshness (T10 mitigation)
        run: |
          python3 - <<'EOF'
          import json, sys, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          MAX_AGE_DAYS = 7
          failed = False

          def check_file(path_str, label, parse_json=True):
              nonlocal failed
              p = Path(path_str)
              if not p.exists():
                  print(f"::error::{label} not found — evidence missing")
                  failed = True
                  return
              if parse_json:
                  try:
                      json.loads(p.read_text())
                  except Exception as e:
                      print(f"::error::{label} parse error: {e}")
                      failed = True
                      return
              result = subprocess.run(
                  ["git", "log", "-1", "--format=%cI", "--", path_str],
                  capture_output=True, text=True, check=True
              )
              commit_date_str = result.stdout.strip()
              if not commit_date_str:
                  print(f"::error::{label}: no git history — cannot verify evidence age (fail-closed)")
                  failed = True
                  return
              commit_date = datetime.fromisoformat(commit_date_str)
              now = datetime.now(timezone.utc)
              age_days = (now - commit_date).total_seconds() / 86400
              print(f"{label}: last updated {commit_date_str} ({age_days:.1f}d ago)")
              if age_days > MAX_AGE_DAYS:
                  print(f"::error::{label} STALE — {age_days:.1f} days old (max {MAX_AGE_DAYS})")
                  failed = True
              else:
                  print(f"::notice::{label} FRESH — {age_days:.1f} days old")

          check_file("docs/EXTERNAL_AUDIT_BUNDLE.json",   "EXTERNAL_AUDIT_BUNDLE.json")
          check_file("docs/SECURITY_AUTONOMY_KPI.json",   "SECURITY_AUTONOMY_KPI.json")

          sys.exit(1 if failed else 0)
          EOF

      - name: Step summary
        if: always()
        run: |
          echo "## CAAS Evidence Freshness Check (T10 Mitigation)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          BUNDLE="docs/EXTERNAL_AUDIT_BUNDLE.json"
          if [ -f "$BUNDLE" ]; then
            LAST=$(git log -1 --format="%cI %s" -- "$BUNDLE")
            echo "Last bundle update: \`$LAST\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**MISSING**: docs/EXTERNAL_AUDIT_BUNDLE.json not found" >> $GITHUB_STEP_SUMMARY
          fi
