# Consolidated static analysis — Cppcheck + GCC -fanalyzer
# Runs both tools in parallel via matrix.
# Tools with unique external integrations run in their own files:
#   clang-sa.yml (scan-build), clang-tidy.yml, codeql.yml,
#   infer.yml, semgrep.yml, sonarcloud.yml

name: Static Analysis

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    permissions:
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        tool: [cppcheck, gcc-analyzer]
        include:
          - tool: cppcheck
            name: "Static Analysis (Cppcheck)"
            timeout: 30
          - tool: gcc-analyzer
            name: "Static Analysis (GCC -fanalyzer)"
            timeout: 60

    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ matrix.timeout }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── Cppcheck ─────────────────────────────────────────────────────────────
      - name: Install Cppcheck
        if: matrix.tool == 'cppcheck'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck ninja-build python3-pip
          pip3 install --require-hashes --no-deps -r .github/requirements/cppcheck.txt 2>/dev/null || true

      - name: Configure (Cppcheck)
        if: matrix.tool == 'cppcheck'
        run: |
          cmake -S . -B out/cppcheck -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DSECP256K1_BUILD_TESTS=OFF -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF

      - name: Run Cppcheck
        if: matrix.tool == 'cppcheck'
        run: |
          cppcheck \
            --project=out/cppcheck/compile_commands.json \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --suppress=unusedFunction \
            --suppressions-list=ci/cppcheck-suppressions \
            --inline-suppr \
            --error-exitcode=0 \
            --std=c++20 \
            --xml 2> cppcheck-results.xml
          cppcheck \
            --project=out/cppcheck/compile_commands.json \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --suppress=unusedFunction \
            --suppressions-list=ci/cppcheck-suppressions \
            --inline-suppr \
            --error-exitcode=0 \
            --std=c++20 \
            --output-file=cppcheck-results.sarif \
            --output-format=sarif 2>/dev/null \
          || python3 .github/scripts/xml2sarif.py cppcheck-results.xml cppcheck-results.sarif

      - name: Upload Cppcheck SARIF
        if: matrix.tool == 'cppcheck' && always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: cppcheck-results.sarif
          category: cppcheck
        continue-on-error: true

      - name: Upload Cppcheck report
        if: matrix.tool == 'cppcheck' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cppcheck-report
          path: |
            cppcheck-results.xml
            cppcheck-results.sarif
          retention-days: 30

      # ── GCC -fanalyzer ───────────────────────────────────────────────────────
      - name: Install GCC 14
        if: matrix.tool == 'gcc-analyzer'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-14 g++-14 ninja-build

      - name: Configure (GCC -fanalyzer)
        if: matrix.tool == 'gcc-analyzer'
        run: |
          cmake -S . -B out/analyzer -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_FLAGS="-fanalyzer -fanalyzer-verbosity=2" \
            -DCMAKE_CXX_FLAGS="-fanalyzer -fanalyzer-verbosity=2" \
            -DSECP256K1_BUILD_TESTS=OFF -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF -DSECP256K1_USE_ASM=OFF

      - name: Build with GCC -fanalyzer
        if: matrix.tool == 'gcc-analyzer'
        run: |
          cmake --build out/analyzer -j$(nproc) 2>&1 \
            | grep -E "(warning|error|note):.*analyzer" \
            | grep -v "Wno-analyzer" \
            | tee analyzer-warnings.txt
          wc -l analyzer-warnings.txt
          if grep -q "warning:.*\[CWE\|warning:.*-Wanalyzer-" analyzer-warnings.txt 2>/dev/null; then
            echo "::error::GCC -fanalyzer found issues"
            exit 1
          fi
          echo "GCC -fanalyzer: clean"

      - name: Upload GCC analyzer report
        if: matrix.tool == 'gcc-analyzer' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gcc-analyzer-warnings
          path: analyzer-warnings.txt
          if-no-files-found: ignore
          retention-days: 14
