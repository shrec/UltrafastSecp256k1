name: SonarCloud

# Runs on push to main/dev, non-fork PRs, and manual dispatch.
# Fork PRs are excluded at job level (GitHub blocks secrets for fork PRs).
on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'include/**'
      - 'audit/**'
      - 'ci/**'
      - 'compat/**'
      - 'CMakeLists.txt'
      - '.github/workflows/sonarcloud.yml'
      - 'sonar-project.properties'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'workingdocs/**'
  workflow_dispatch:

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    # Skip fork PRs: GitHub blocks secrets on pull_request from forks.
    # Fork contributors see results after the PR is merged.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.owner.login == github.repository_owner)
    runs-on: ubuntu-24.04

    env:
      BUILD_WRAPPER_OUT_DIR: build-wrapper-output

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # full history for blame / new-code detection

      - name: Install compiler and tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 lld-17 llvm-17 ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-sonar-${{ hashFiles('src/cpu/src/**', 'src/cpu/include/**', 'include/**') }}
          restore-keys: |
            ccache-sonar-

      - name: Configure ccache
        run: |
          CCACHE=$(command -v ccache || true)
          if [ -n "$CCACHE" ]; then
            "$CCACHE" --set-config=max_size=200M
            "$CCACHE" --set-config=compression=true
            "$CCACHE" -z
          fi

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python audit dependencies
        run: |
          PYTHON=$(command -v python3 || command -v python)
          "$PYTHON" -m pip install --require-hashes \
            -r .github/requirements/audit-deps.txt

      - name: Install SonarCloud build-wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0

      - name: Build with build-wrapper (coverage-instrumented)
        env:
          CC:  clang-17
          CXX: clang++-17
        run: |
          CCACHE=$(command -v ccache || true)
          LAUNCHER_ARGS=""
          if [ -n "$CCACHE" ]; then
            LAUNCHER_ARGS="-DCMAKE_C_COMPILER_LAUNCHER=${CCACHE} -DCMAKE_CXX_COMPILER_LAUNCHER=${CCACHE}"
          fi
          cmake -S . -B build/sonar -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            $LAUNCHER_ARGS \
            -DSECP256K1_MARCH=x86-64-v2 \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_USE_ASM=OFF \
            "-DCMAKE_C_FLAGS=-fprofile-instr-generate -fcoverage-mapping" \
            "-DCMAKE_CXX_FLAGS=-fprofile-instr-generate -fcoverage-mapping"

          JOBS=$(nproc 2>/dev/null || echo 4)
          build-wrapper-linux-x86-64 \
            --out-dir "${{ env.BUILD_WRAPPER_OUT_DIR }}" \
            cmake --build build/sonar -j"$JOBS"

      - name: Run tests (generate coverage data)
        env:
          LLVM_PROFILE_FILE: "${{ github.workspace }}/build/sonar/%p.profraw"
        run: |
          CTEST=$(command -v ctest)
          JOBS=$(nproc 2>/dev/null || echo 4)
          "$CTEST" --test-dir build/sonar \
            --output-on-failure \
            -j"$JOBS" \
            -E "^ct_sidechannel"

      - name: Collect coverage (llvm-cov)
        run: |
          # Resolve llvm tools from PATH — prefer versioned, fall back to unversioned
          LLVM_PROFDATA=$(command -v llvm-profdata-17 \
            || command -v llvm-profdata \
            || { echo "::error::llvm-profdata not found on PATH"; exit 1; })
          LLVM_COV=$(command -v llvm-cov-17 \
            || command -v llvm-cov \
            || { echo "::error::llvm-cov not found on PATH"; exit 1; })

          echo "Using: $LLVM_PROFDATA  $LLVM_COV"

          # Merge raw profiles
          PROFRAW=$(find build/sonar -name '*.profraw' 2>/dev/null)
          if [ -z "$PROFRAW" ]; then
            echo "::warning::No profraw files found — skipping coverage collection"
            exit 0
          fi
          # shellcheck disable=SC2086
          "$LLVM_PROFDATA" merge -sparse $PROFRAW \
            -o build/sonar/merged.profdata

          # Primary binary (links full library)
          MAIN_BIN=$(find build/sonar -name 'run_selftest' -type f | head -1)
          if [ -z "$MAIN_BIN" ]; then
            echo "::error::run_selftest binary not found"
            exit 1
          fi

          # Additional standalone test binaries
          OBJECT_ARGS=()
          while IFS= read -r bin; do
            OBJECT_ARGS+=("-object" "$bin")
          done < <(find build/sonar -name 'test_*_standalone' -type f 2>/dev/null)

          "$LLVM_COV" show \
            "$MAIN_BIN" \
            "${OBJECT_ARGS[@]}" \
            -instr-profile=build/sonar/merged.profdata \
            --show-line-counts-or-regions \
            > build/sonar/llvm-cov-report.txt

          LINES=$(wc -l < build/sonar/llvm-cov-report.txt)
          echo "Coverage report: $LINES lines"
          if [ "$LINES" -lt 10 ]; then
            echo "::warning::Coverage report suspiciously small ($LINES lines)"
          fi

      - name: Run SonarCloud scan
        continue-on-error: true   # Quality Gate failures are advisory
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            -Dsonar.cfamily.llvm-cov.reportPath=build/sonar/llvm-cov-report.txt
            -Dsonar.host.url=https://sonarcloud.io

      - name: Quality Gate diagnostic
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          REPORT_TASK=".scannerwork/report-task.txt"
          if [ ! -f "$REPORT_TASK" ]; then
            echo "report-task.txt not found — scan may have been skipped"
            exit 0
          fi
          TASK_ID=$(grep ceTaskId "$REPORT_TASK" | cut -d= -f2)
          echo "CE Task ID: $TASK_ID"
          CURL=$(command -v curl || { echo "::warning::curl not found"; exit 0; })
          for i in $(seq 1 60); do
            TASK_JSON=$("$CURL" -sf \
              -H "Authorization: Bearer $SONAR_TOKEN" \
              "https://sonarcloud.io/api/ce/task?id=${TASK_ID}&additionalFields=warnings")
            STATUS=$(echo "$TASK_JSON" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d.get('task',{}).get('status','UNKNOWN'))" \
              2>/dev/null || echo "UNKNOWN")
            echo "  Attempt $i: status=$STATUS"
            if [ "$STATUS" = "SUCCESS" ] || [ "$STATUS" = "FAILED" ]; then
              ANALYSIS_ID=$(echo "$TASK_JSON" | python3 -c \
                "import json,sys; d=json.load(sys.stdin); print(d.get('task',{}).get('analysisId',''))" \
                2>/dev/null || true)
              if [ -n "$ANALYSIS_ID" ]; then
                "$CURL" -sf \
                  -H "Authorization: Bearer $SONAR_TOKEN" \
                  "https://sonarcloud.io/api/qualitygates/project_status?analysisId=${ANALYSIS_ID}" \
                  | python3 -m json.tool 2>/dev/null \
                  || echo "(quality gate query blocked by free plan)"
              fi
              break
            fi
            sleep 5
          done
