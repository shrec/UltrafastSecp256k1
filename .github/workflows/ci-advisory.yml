# =============================================================================
# CI Advisory — non-blocking platforms with known math/portability divergences.
# Not dispatched by ci-orchestrator.yml. Manual + weekly schedule trigger.
# =============================================================================
name: CI Advisory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-advisory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Linux Sanitizers (ASan/TSan/MSan)
  # ===========================================================================
  linux-sanitizers:
    name: "Linux / ${{ matrix.sanitizer }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: asan
            san_flags: "-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
            link_flags: "-fsanitize=address,undefined"
          - sanitizer: tsan
            san_flags: "-fsanitize=thread -fno-omit-frame-pointer"
            link_flags: "-fsanitize=thread"
          - sanitizer: msan
            san_flags: "-fsanitize=memory -fno-omit-frame-pointer -fsanitize-memory-track-origins=2 -stdlib=libc++"
            link_flags: "-fsanitize=memory -stdlib=libc++ -lc++abi"
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 lld-17 libc++-17-dev libc++abi-17-dev ccache ninja-build
      - name: CMake configure
        env:
          CC: clang-17
          CXX: clang++-17
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="${{ matrix.san_flags }}" \
            -DCMAKE_CXX_FLAGS="${{ matrix.san_flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.link_flags }}" \
            -DSECP256K1_USE_ASM=OFF \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j$(nproc) --timeout 900 -E '^(ct_sidechannel|unified_audit|selftest|batch_randomness|py_)'

  # ===========================================================================
  # Linux ARM64 (cross-compile)
  # ===========================================================================
  linux-arm64:
    name: "Linux / arm64 (cross)"
    # Advisory: ARM64 portable arithmetic path hits the same scalar-mul bug.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++-13-aarch64-linux-gnu libc6-arm64-cross libc6-dev-arm64-cross \
            qemu-user-static ninja-build ccache
      - name: CMake configure
        env:
          CC: aarch64-linux-gnu-gcc-13
          CXX: aarch64-linux-gnu-g++-13
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DSECP256K1_BUILD_METAL=OFF \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=ON \
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Smoke test (QEMU)
        run: |
          SELFTEST=$(find out/build -name run_selftest -type f | head -1)
          if [ -n "$SELFTEST" ]; then
            timeout 360 qemu-aarch64-static -L /usr/aarch64-linux-gnu "$SELFTEST" smoke
          else
            echo "::warning::run_selftest not found — skipping QEMU smoke test"
          fi

  # ===========================================================================
  # Windows (MSVC)
  # ===========================================================================
  windows:
    name: "Windows / MSVC"
    # Advisory: MSVC __int128 portability + scalar-mul math bug compound here.
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: CMake configure
        run: |
          cmake -S . -B out/build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DSECP256K1_BUILD_TESTS=ON `
            -DSECP256K1_BUILD_BENCH=ON `
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build --config Release -j $env:NUMBER_OF_PROCESSORS
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j $env:NUMBER_OF_PROCESSORS --timeout 300 --build-config Release -E '^ct_sidechannel'

  # ===========================================================================
  # macOS (apple-clang)
  # ===========================================================================
  macos:
    name: "macOS / apple-clang"
    # Advisory: Apple Silicon ARM64 portable arithmetic path hits the same
    # scalar-mul KAT divergence as Linux ARM64 / WASM / sanitizers.
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: CMake configure
        run: |
          cmake -S . -B out/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSECP256K1_BUILD_TESTS=ON \
            -DSECP256K1_BUILD_BENCH=ON \
            -DSECP256K1_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build out/build -j$(sysctl -n hw.logicalcpu)
      - name: Test
        run: ctest --test-dir out/build --output-on-failure -j$(sysctl -n hw.logicalcpu) --timeout 300 -E '^(ct_sidechannel|secp256k1_metal_audit|gpu_ops_equivalence|gpu_ecdsa_snark_witness|gpu_bip352_scan)'

  # ===========================================================================
  # WASM (Emscripten)
  # ===========================================================================
  wasm:
    name: "WASM / Emscripten"
    # Advisory: WASM lacks x86-64 asm so it uses portable arithmetic; recent
    # perf work introduced a 2G/3G KAT mismatch under investigation. Mark
    # advisory so it does not block the rest of the platform matrix.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021
        with:
          version: 3.1.51
          actions-cache-folder: emsdk-cache
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
      - name: CMake configure
        run: |
          emcmake cmake -S bindings/wasm -B out/build \
            -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build out/build -j$(nproc)
      - name: Test (KAT equivalence)
        run: |
          if [ -f out/build/kat/wasm_kat_test.js ]; then
            node out/build/kat/wasm_kat_test.js
          else
            echo "::warning::wasm_kat_test.js not found — skipping KAT test"
          fi
